        await showRankingMenu();
      };
    }
  }

  const showRankingMenuBeforeRefreshFix = showRankingMenu;
  showRankingMenu = async function(){
    const result = await showRankingMenuBeforeRefreshFix.apply(this, arguments);
    setTimeout(bindRankingRefreshButton, 0);
    return result;
  };
  if($('rankingMenuBtn')) $('rankingMenuBtn').onclick = showRankingMenu;
})();

        combat_power:Number(rec.combatPower || 0),
        score:Number(rec.score || 0),
        updated_at:new Date().toISOString()
      });

    try{
      if(rows.length){
        const {error} = await client.from(PUBLIC_RANKING_TABLE).upsert(rows, {onConflict:'rank_id'});
        if(error) throw error;
      }
      for(let i=0;i<3;i++){

        }
      }

      return false;
    }
  };

function fullAutoResetFloorState(){
  if(!S || !S.player) return;
  if(S.fullAutoFloor !== S.player.floor){
    S.fullAutoFloor = S.player.floor;
    S.fullAutoPhase = 'hunt';
    S.fullAutoHpTrace = [];
    S.fullAutoLastPlan = null;
    S.autoTargetUid = null;
    S.autoGoal = null;
    S.autoRoamTicks = 0;
    S.autoRoamReason = '';
    S.autoStuckScore = 0;
    S.autoPathLog = [];
    S.autoForbiddenCells = {};
  }
}
function fullAutoHpRatio(st){
  if(!S || !S.player || !st || !st.maxHp) return 1;
  return clamp(S.player.hp / st.maxHp, 0, 1);
}
function fullAutoRecordHp(st){
  if(!S || !S.player || !st || !st.maxHp) return;
  if(!Array.isArray(S.fullAutoHpTrace)) S.fullAutoHpTrace = [];
  const p=S.player;
  const last=S.fullAutoHpTrace[S.fullAutoHpTrace.length-1];
  if(!last || last.turn !== p.turn){
    S.fullAutoHpTrace.push({turn:p.turn, hp:p.hp, maxHp:st.maxHp});
    if(S.fullAutoHpTrace.length > 10) S.fullAutoHpTrace.shift();
  }else{
    last.hp=p.hp; last.maxHp=st.maxHp;
  }
}
function fullAutoRecentHpLossRatio(turnSpan, st){
  if(!S || !S.player || !Array.isArray(S.fullAutoHpTrace) || !S.fullAutoHpTrace.length || !st || !st.maxHp) return 0;
  const nowTurn=S.player.turn || 0;
  const nowHp=S.player.hp;
  let base=S.fullAutoHpTrace[0];
  for(const row of S.fullAutoHpTrace){
    if(row.turn <= nowTurn - turnSpan) base=row;
  }
  return Math.max(0, (base.hp - nowHp) / st.maxHp);
}
function fullAutoPotionThreshold(st, enemies){
  const loss2 = fullAutoRecentHpLossRatio(2, st);
  const loss4 = fullAutoRecentHpLossRatio(4, st);
  const danger = (enemies||[]).filter(e=>e.hp>0 && (dist(e,S.player)<=2 || (e.ranged && dist(e,S.player)<=5 && clearLine(e.x,e.y,S.player.x,S.player.y)))).length;
  let threshold = .38;
  if(loss2 >= .26 || loss4 >= .36) threshold = .82;
  else if(loss2 >= .18 || loss4 >= .28) threshold = .72;
  else if(loss2 >= .11 || loss4 >= .20) threshold = .62;
  else if(loss2 >= .06 || loss4 >= .12) threshold = .52;
  else if(loss4 >= .06) threshold = .44;
  if(danger >= 3) threshold += .08;
  else if(danger >= 1) threshold += .04;
  return clamp(threshold, .34, .86);
}
function fullAutoShouldUsePotion(st, enemies){
  const p=S.player;
  if(!p || p.potions<=0 || p.cd.potion>0) return false;
  const ratio=fullAutoHpRatio(st);
  const threshold=fullAutoPotionThreshold(st, enemies);
  return ratio <= threshold;
}
function fullAutoEnemyPower(e){
  if(!e) return 0;
  return (e.boss?10000:0) + (e.elite?2500:0) + (e.ranged?420:0) + (e.fast?320:0) +
    Math.max(0,e.atk||0)*38 + Math.max(0,e.maxHp||e.hp||0)*4 + Math.max(0,e.def||0)*28 + Math.max(0,e.tier||0)*70;
}
function fullAutoLockedCell(x,y){
  try{
    if(typeof lockedDoorAt === 'function' && lockedDoorAt(x,y,false)) return true;
    if(typeof lockedRoomCellAt === 'function' && lockedRoomCellAt(x,y)) return true;
  }catch(e){}
  return false;
}
function fullAutoPassableNoEnemy(x,y){
  return inMap(x,y) && S.map[y][x] !== '#' && !fullAutoLockedCell(x,y) && !enemyAt(x,y);
}
function fullAutoLineClear(x1,y1,x2,y2){
  if(x1!==x2 && y1!==y2) return false;
  const dx=Math.sign(x2-x1), dy=Math.sign(y2-y1);
  let x=x1+dx, y=y1+dy;
  while(x!==x2 || y!==y2){
    if(!inMap(x,y) || S.map[y][x]==='#' || fullAutoLockedCell(x,y)) return false;
    x+=dx; y+=dy;
  }
  return true;
}
function fullAutoBasicAttackRangeForClass(){
  if(!S || !S.player) return 1;
  const r = basicRangedRange();
  return r || 1;
}
function fullAutoCanBasicAttackFrom(x,y,e){
  if(!e || e.hp<=0) return false;
  const p=S.player;
  const range=fullAutoBasicAttackRangeForClass();
  const d=Math.abs(x-e.x)+Math.abs(y-e.y);
  if(range<=1) return d===1;
  return d>0 && d<=range && fullAutoLineClear(x,y,e.x,e.y);
}
function fullAutoCanSkillAttackFromCurrent(e){
  if(!S || !S.player || !e || e.hp<=0) return false;
  const p=S.player;
  if(p.cd.smash<=0){
    if(p.classId==='warrior' && p.mp>=actualSkillMpCost('warrior','smash') && dist(e,p)<=1) return true;
    if(p.classId==='rogue' && p.mp>=actualSkillMpCost('rogue','smash') && dist(e,p)<=1) return true;
    if(p.classId==='mage' && p.mp>=5 && dist(e,p)<=4+skillRangeBonus('smash') && fullAutoLineClear(p.x,p.y,e.x,e.y)) return true;
    if(p.classId==='hunter' && p.mp>=actualSkillMpCost('hunter','smash') && dist(e,p)<=5+skillRangeBonus('smash') && fullAutoLineClear(p.x,p.y,e.x,e.y)) return true;
  }
  if(p.cd.dash<=0){
    if(p.classId==='mage' && p.mp>=10 && dist(e,p)<=2 && hasLocalAoePath(p.x,p.y,e.x,e.y)) return true;
    if(p.classId==='warrior' && p.mp>=actualSkillMpCost('warrior','dash') && dist(e,p)>1 && dist(e,p)<=3) return true;
    if(p.classId==='rogue' && p.mp>=actualSkillMpCost('rogue','dash') && dist(e,p)>1 && dist(e,p)<=3) return true;
  }
  if(p.cd.heal<=0){
    if(p.classId==='hunter' && p.mp>=10 && dist(e,p)<=3+skillRangeBonus('heal') && fullAutoLineClear(p.x,p.y,e.x,e.y)) return true;
  }
  return false;
}
function fullAutoDirOrder(tx=null, ty=null){
  const p=S.player;
  return DIRS.slice().sort((a,b)=>{
    const ar=(S.autoPrevX===p.x+a[0] && S.autoPrevY===p.y+a[1])?1:0;
    const br=(S.autoPrevX===p.x+b[0] && S.autoPrevY===p.y+b[1])?1:0;
    const ad=tx==null?0:Math.abs(p.x+a[0]-tx)+Math.abs(p.y+a[1]-ty);
    const bd=tx==null?0:Math.abs(p.x+b[0]-tx)+Math.abs(p.y+b[1]-ty);
    const av=autoRecentVisitPenalty(p.x+a[0],p.y+a[1],8);
    const bv=autoRecentVisitPenalty(p.x+b[0],p.y+b[1],8);
    return ar-br || av-bv || ad-bd;
  });
}
function fullAutoPathToGoal(goalFn, opts={}){
  if(!S || !S.player || typeof goalFn !== 'function') return null;
  const p=S.player;
  if(goalFn(p.x,p.y)) return {step:null, dist:0, x:p.x, y:p.y};
  const dirs=fullAutoDirOrder(opts.tx, opts.ty);
  const q=[{x:p.x,y:p.y,first:null,dist:0}];
  const seen=new Set([key(p.x,p.y)]);
  const limit=MAPW*MAPH + 16;
  for(let qi=0; qi<q.length && qi<limit; qi++){
    const cur=q[qi];
    for(const [dx,dy] of dirs){
      const nx=cur.x+dx, ny=cur.y+dy, k=key(nx,ny);
      if(seen.has(k)) continue;
      if(!fullAutoPassableNoEnemy(nx,ny)) continue;
      if(opts.avoidRecent && autoRecentVisitPenalty(nx,ny,opts.avoidRecent)>0 && !goalFn(nx,ny)) continue;
      seen.add(k);
      const node={x:nx,y:ny,first:cur.first||{dx,dy},dist:cur.dist+1};
      if(goalFn(nx,ny)) return {step:node.first, dist:node.dist, x:nx, y:ny};
      q.push(node);
    }
  }
  if(opts.avoidRecent) return fullAutoPathToGoal(goalFn, Object.assign({}, opts, {avoidRecent:0}));
  return null;
}
function fullAutoPathToCell(tx,ty){
  return fullAutoPathToGoal((x,y)=>x===tx && y===ty, {tx,ty});
}
function fullAutoPathToEnemy(e){
  if(!e || e.hp<=0) return null;
  const p=S.player;
  if(fullAutoCanBasicAttackFrom(p.x,p.y,e)) return {step:null, dist:0, x:p.x, y:p.y};
  let path = fullAutoPathToGoal((x,y)=>fullAutoCanBasicAttackFrom(x,y,e), {tx:e.x, ty:e.y, avoidRecent:10});
  if(path) return path;
  // 원거리 위치를 못 잡는 구조나 벽 지형이면 인접칸으로 접근한다.
  return fullAutoPathToGoal((x,y)=>Math.abs(x-e.x)+Math.abs(y-e.y)===1, {tx:e.x, ty:e.y, avoidRecent:10});
}
function fullAutoItemPriority(it){
  if(!it) return 0;
  const table={potion:980, relic:930, skillgem:900, chest:850, shrine:780, camp:760, vault:740, oracle:720, soul:700, gold:600, merchant:520};
  return table[it.type] || 500;
}
function fullAutoReachableItemInfo(it){
  if(!it) return null;
  if(fullAutoLockedCell(it.x,it.y)) return null;
  const path=fullAutoPathToCell(it.x,it.y);
  if(!path) return null;
  return {item:it, path, priority:fullAutoItemPriority(it)};
}
function fullAutoReachableItems(items){
  return (items||S.items||[]).map(fullAutoReachableItemInfo).filter(Boolean);
}
function fullAutoSelectNearbyItem(maxPath=5){
  const p=S.player;
  const infos=fullAutoReachableItems(S.items).filter(info=>info.path.dist<=maxPath || dist(info.item,p)<=3);
  if(!infos.length) return null;
  infos.sort((a,b)=>b.priority-a.priority || a.path.dist-b.path.dist || dist(a.item,p)-dist(b.item,p));
  return infos[0];
}
function fullAutoSelectAnyItem(){
  const infos=fullAutoReachableItems(S.items);
  if(!infos.length) return null;
  infos.sort((a,b)=>a.path.dist-b.path.dist || b.priority-a.priority || dist(a.item,S.player)-dist(b.item,S.player));
  return infos[0];
}
function fullAutoReachableEnemyInfo(e){
  if(!e || e.hp<=0) return null;
  const path=fullAutoPathToEnemy(e);
  if(!path && !fullAutoCanSkillAttackFromCurrent(e)) return null;
  const pathDist=path ? path.dist : 0;
  const power=fullAutoEnemyPower(e);
  const visible=S.seen?.[e.y]?.[e.x] ? 1 : 0;
  const near=dist(e,S.player)<=7 ? 1 : 0;
  const score=power - pathDist*12 + visible*420 + near*520;
  return {enemy:e, path, pathDist, power, score, uid:autoEnemyUid(e)};
}
function fullAutoSelectEnemyTarget(enemies){
  const infos=(enemies||[]).map(fullAutoReachableEnemyInfo).filter(Boolean);
  if(!infos.length) return null;
  infos.sort((a,b)=>b.score-a.score || b.power-a.power || a.pathDist-b.pathDist || String(a.uid).localeCompare(String(b.uid)));
  const current=S.autoTargetUid ? infos.find(info=>info.uid===S.autoTargetUid) : null;
  if(current && current.enemy.hp>0){
    const best=infos[0];
    // 너무 자주 타깃을 바꾸면 좌우에 적이 있을 때 버벅인다. 단, 더 강한 적이 확실하면 교체한다.
    if(best.uid===current.uid || best.score <= current.score + 650) return current;
  }
  return infos[0];
}
function fullAutoSetTarget(info){
  if(!S || !info || !info.enemy) return;

  if(S.autoTargetUid !== uid) S.autoGoal=null;

function fullAutoResolveAwaitAim(enemies){
  if(!S || !S.player || !S.player.awaitAim) return false;
  const p=S.player;
  let t = S.autoTargetUid ? (enemies||[]).find(e=>autoEnemyUid(e)===S.autoTargetUid) : null;
  if(!t){
    const info=fullAutoSelectEnemyTarget(enemies||S.enemies.filter(e=>e.hp>0));
    t=info?.enemy || null;
  }
  if(t){
    const ax=t.x-p.x, ay=t.y-p.y;
    const dx=Math.abs(ax)>=Math.abs(ay) ? Math.sign(ax) : 0;
    const dy=Math.abs(ay)>Math.abs(ax) ? Math.sign(ay) : 0;
    if(dx || dy) resolveAimedSkill(dx,dy);

  }else{
    p.awaitAim=''; renderAll(); saveRun();

}
function fullAutoTryCombat(info){

function fullAutoExitReady(){
  if(isBossFloor() && livingBossEnemy()) return false;

function fullAutoNearestFrontierPath(){
  return fullAutoPathToGoal((x,y)=>{
    if(!inMap(x,y) || S.map[y][x]==='#' || fullAutoLockedCell(x,y)) return false;
    return DIRS.some(([dx,dy])=>inMap(x+dx,y+dy) && S.map[y+dy][x+dx] !== '#' && !fullAutoLockedCell(x+dx,y+dy) && !S.seen[y+dy][x+dx]);
  }, {avoidRecent:8});
}
function autoFullExplore(){
  if(!canAct()) return;
  ensureRunFields();
  fullAutoResetFloorState();
  const p=S.player;
  const st=calcStats();
  const enemies=S.enemies.filter(e=>e.hp>0);
  fullAutoRecordHp(st);

  const targetInfo=fullAutoSelectEnemyTarget(enemies);
  if(targetInfo) fullAutoSetTarget(targetInfo);

  if(fullAutoResolveAwaitAim(enemies)) return;

  if(fullAutoShouldUsePotion(st, enemies)){
    S.fullAutoPhase='potion';
    clearAutoRoam();
    usePotion();
    return;
  }

  // 1) 몬스터 처리 중 공격 가능하면 스킬 우선, 그 다음 일반공격.
  if(targetInfo && fullAutoTryCombat(targetInfo)) return;

  // 2) 몬스터 사냥 이동 중 근처 드랍/이벤트가 있으면 먼저 줍고 지나간다.
  const nearbyLoot=fullAutoSelectNearbyItem(targetInfo ? 5 : 999);
  if(nearbyLoot && (targetInfo ? nearbyLoot.path.dist<=5 : true)){
    if(fullAutoMoveToItem(nearbyLoot)) return;
  }

  // 3) 층의 몬스터를 우선 제거한다. 양쪽에 있으면 점수상 더 강한 적을 고정 타깃으로 잡는다.
  if(targetInfo && targetInfo.enemy && targetInfo.enemy.hp>0){
    fullAutoSetTarget(targetInfo);
    if(fullAutoMoveByPath(targetInfo.path || fullAutoPathToEnemy(targetInfo.enemy), 'hunt')) return;
    // 길이 막혔으면 같은 방 안 네모 배회 대신 미탐색 통로/문 방향을 먼저 찾는다.
    const frontier=fullAutoNearestFrontierPath();
    if(fullAutoMoveByPath(frontier, 'explore')) return;
    enterAutoRoam('enemyPathMissing');
    if(autoTryRoamMove()) return;
    waitTurn();
    return;
  }

  // 4) 접근 가능한 몬스터가 없으면 남은 드랍/이벤트템을 정리한다. 잠긴문 안쪽은 경로가 없으므로 제외된다.
  const anyLoot=fullAutoSelectAnyItem();
  if(anyLoot){
    if(fullAutoMoveToItem(anyLoot)) return;
  }

  // 5) 접근 가능한 몬스터/템이 끝났으면 다음 층으로 이동한다. 잠긴문 뒤 대상은 제외한다.
  if(S.exit && fullAutoExitReady()){
    if(p.x===S.exit.x && p.y===S.exit.y){
      clearAutoRoam();
      nextFloor();
      return;
    }
    const exitPath=fullAutoPathToCell(S.exit.x,S.exit.y);
    if(fullAutoMoveByPath(exitPath, 'exit')) return;
  }

  // 6) 아직 안 본 공간이 있으면 방 안에서 돌지 말고 가장 가까운 프론티어로 간다.
  const frontier=fullAutoNearestFrontierPath();
  if(fullAutoMoveByPath(frontier, 'explore')) return;

  // 7) 그래도 없으면 마지막 보정 이동. 기존 네모 루프 기록은 여기서만 사용한다.
  enterAutoRoam('noReachablePlan');
  if(autoTryRoamMove()) return;
  waitTurn();
}

  async function ensureServerChatSubscription(){

  /* 2) 서버 온라인 목록: presence + DB heartbeat 병행 */
  let serverOnlineRows = [];
  let serverOnlineLastFetch = 0;

  function onlineRowToUser(row){

      id: row.online_id || row.client_id || row.user_id || Math.random(),

  /* 3) 서버 랭킹: RPC 우선, 직접 테이블 fallback. direct upsert에도 provider 포함. */
  function serverRankPayloadFromCharacter(userId, ch, slotIndex, mode){
    const rec = buildRankRecordFromCharacter(ch, meta);
    if(!rec) return null;
    return {
      rank_id:publicRankIdFor(userId, slotIndex, mode),
      user_id:userId,
      provider:mode,
      slot_index:Number(slotIndex || 0),
      nickname:String(rec.nickname || '이름 없음'),
      class_name:String(rec.className || '-'),
      level:Number(rec.level || 1),
      floor:Number(rec.floor || 1),
      combat_power:Number(rec.combatPower || 0),
      score:Number(rec.score || 0),
      updated_at:new Date().toISOString()
    };
  }
  async function upsertRankingRowRobust(client, row){
    try{
      const {error} = await client.rpc('upsert_game_ranking', {
        p_provider:row.provider,
        p_slot_index:row.slot_index,
        p_nickname:row.nickname,
        p_class_name:row.class_name,

        p_combat_power:row.combat_power,
        p_score:row.score
      });
      if(!error) return true;
      console.warn('ranking rpc upsert fallback:', error.message);
    }catch(e){
      console.warn('ranking rpc upsert unavailable:', e && e.message ? e.message : e);
    }
    const {error:directError} = await client.from(PUBLIC_RANKING_TABLE).upsert(row, {onConflict:'rank_id'});
    if(directError) throw directError;
    return true;
  }
  syncPublicRankingRowsForCurrentUser = async function(){

    });

  collectRankingRecords = async function(){
    if(!isServerLogin()) return [];
    const client = getCloudClient && getCloudClient();

    if(!client || !user) throw new Error('로그인 세션 또는 Supabase 클라이언트를 확인할 수 없습니다.');
    await syncPublicRankingRowsForCurrentUser();

    let rows = [];
    try{
      const {data,error} = await client.rpc('get_game_rankings', {p_limit:100});
      if(error) throw error;
      rows = Array.isArray(data) ? data : [];
    }catch(e){
      console.warn('ranking rpc select fallback:', e && e.message ? e.message : e);
      const {data,error} = await client
        .from(PUBLIC_RANKING_TABLE)
        .select('rank_id,user_id,provider,slot_index,nickname,class_name,level,floor,combat_power,score,updated_at')
        .order('score', {ascending:false})
        .limit(1000);
      if(error) throw new Error(`서버 랭킹 테이블(${PUBLIC_RANKING_TABLE}) 조회 실패: ${error.message}`);
      rows = Array.isArray(data) ? data : [];
    }
    const dedup = new Map();
    rows.forEach(row=>{
      const rec = rankRecordFromServerRow(row);
      if(!rec) return;
      const key = rec.rankId || `${rec.userId}_${rec.provider}_${rec.slotIndex}`;
      const prev = dedup.get(key);
      if(!prev || compareRankRecords(rec, prev) > 0) dedup.set(key, rec);
    });
    const result = Array.from(dedup.values())
      .sort((a,b)=>(b.floor-a.floor)||(b.level-a.level)||(b.combatPower-a.combatPower)||(b.score-a.score))
      .slice(0,50);
    result._usedPublicTable = true;
    result._serverOnly = true;
    return result;
  };

  if($('rankingMenuBtn')) $('rankingMenuBtn').onclick = showRankingMenu;

  ensureServerChatSubscription();
  ensureServerOnlineSubscription();
  fetchServerChat(true);
  upsertServerOnlineRow(true);
})();


(function(){

  const SERVER_RANKING_REFRESH_MS_V2 = 6000;
  let serverRankingSyncTimerV2 = null;
  let serverRankingChannelV2 = null;
  let serverRankingChannelSigV2 = '';
  let serverRankingRefreshTimerV2 = null;
  let serverRankingRenderingV2 = false;

  function v2IsCloud(){
    try{ return typeof isCloudLoginMode === 'function' && isCloudLoginMode(activeLoginMode || (S && S.loginMode)); }
    catch(e){ return false; }
  }
  function v2Mode(){
    try{ return cloudProviderModeKey(activeLoginMode || (S && S.loginMode) || 'kakao'); }
    catch(e){ return (activeLoginMode === 'naver') ? 'naver' : 'kakao'; }
  }
  function v2Slot(){
    const n = Number(activeCharacterSlot == null ? 0 : activeCharacterSlot);
    return Number.isFinite(n) && n >= 0 ? Math.floor(n) : 0;
  }
  function v2RankId(userId, slot, mode){
    try{ return publicRankIdFor(userId, slot, mode); }
    catch(e){ return `${userId}_${mode || v2Mode()}_${slot}`; }
  }
  function v2RankUpdatedTime(rec){
    const t = Date.parse(rec && (rec.updatedAt || rec.updated_at) || '');
    return Number.isFinite(t) ? t : 0;
  }
  function v2RankPriorityCompare(a,b){
    const ar = a || {};
    const br = b || {};
    return (Number(ar.floor || 0) - Number(br.floor || 0))
      || (Number(ar.level || 0) - Number(br.level || 0))
      || (Number(ar.combatPower || ar.combat_power || 0) - Number(br.combatPower || br.combat_power || 0))
      || (Number(ar.score || 0) - Number(br.score || 0))
      || (v2RankUpdatedTime(ar) - v2RankUpdatedTime(br));
  }
  try{
    compareRankRecords = function(a,b){
      const ar = normalizeStoredRankRecord(a) || a || {floor:0,level:0,combatPower:0,score:0};
      const br = normalizeStoredRankRecord(b) || b || {floor:0,level:0,combatPower:0,score:0};
      return v2RankPriorityCompare(ar, br);
    };
  }catch(e){}
  function v2CharacterForActiveSlot(mode){
    try{
      if(S && S.player && typeof syncActiveCharacterFromRun === 'function') syncActiveCharacterFromRun();
    }catch(e){}
    const slots = normalizeCharacterSlots(getSlotsForMode(mode), 3);
    let ch = slots[v2Slot()] || null;
    if(!ch && S && S.player){
      const p = S.player;
      ch = {
        nickname:p.name || S.characterNickname || p.className || '이름 없음',
        classId:p.classId || S.characterClassId || 'warrior',
        className:p.className || ((classes[p.classId]||classes.warrior).name),
        level:Number(p.level || 1),
        floor:Number(p.floor || 1),
        run:deepClone(S),
        updatedAt:new Date().toISOString()
      };

  function v2RankRowFromCharacter(userId, ch, slot, mode){
    if(!ch) return null;

      try{ rec = rankRecordFromRun(ch.run, meta || {}, ch.nickname || '이름 없음'); }catch(e){}
    }
    if(!rec) return null;
    return {
      rank_id:v2RankId(userId, slot, mode),
      user_id:userId,
      provider:mode,
      slot_index:Number(slot || 0),
      nickname:String(rec.nickname || ch.nickname || '이름 없음').slice(0,32),
      class_name:String(rec.className || ch.className || '-').slice(0,32),
      level:Number(rec.level || ch.level || 1),
      floor:Number(rec.floor || ch.floor || 1),
      combat_power:Number(rec.combatPower || ch.combatPower || 0),
      score:Number(rec.score || ch.score || 0),
      updated_at:new Date().toISOString()
    };
  }
  async function v2UpsertRankRow(client, row){
    if(!client || !row) return false;
    try{
      const {error} = await client.rpc('upsert_game_ranking', {
        p_provider:row.provider,
        p_slot_index:row.slot_index,
        p_nickname:row.nickname,
        p_class_name:row.class_name,
        p_level:row.level,
        p_floor:row.floor,
        p_combat_power:row.combat_power,
        p_score:row.score
      });
      if(!error) return true;
      console.warn('ranking v2 rpc upsert fallback:', error.message);
    }catch(e){
      console.warn('ranking v2 rpc upsert unavailable:', e && e.message ? e.message : e);
    }
    const {error:directError} = await client.from(SERVER_RANKING_TABLE_V2).upsert(row, {onConflict:'rank_id'});
    if(directError) throw directError;
    return true;
  }
  async function v2SyncActiveRankingNow(reason='auto'){
    if(!v2IsCloud()) return false;
    const client = getCloudClient && getCloudClient();
    const user = await currentCloudUser();
    if(!client || !user) return false;
    const mode = v2Mode();
    const slot = v2Slot();
    const ch = v2CharacterForActiveSlot(mode);
    const row = v2RankRowFromCharacter(user.id, ch, slot, mode);
    if(!row) return false;
    try{
      await v2UpsertRankRow(client, row);
      S._lastRankingSyncAt = Date.now();
      S._lastRankingSyncReason = reason;
      return true;
    }catch(e){
      console.warn('active ranking sync failed:', e && e.message ? e.message : e);
      return false;
    }
  }
  function v2QueueRankingSync(reason='queued'){
    if(!v2IsCloud()) return;
    clearTimeout(serverRankingSyncTimerV2);
    serverRankingSyncTimerV2 = setTimeout(()=>{
      v2SyncActiveRankingNow(reason).catch(e=>console.warn('ranking queued sync failed:', e && e.message ? e.message : e));
    }, 500);
  }

  const saveRunBeforeRankingV2 = saveRun;
  saveRun = function(){
    const result = saveRunBeforeRankingV2.apply(this, arguments);
    v2QueueRankingSync('saveRun');
    return result;

  const saveMetaBeforeRankingV2 = saveMeta;

  };

  saveCloudCharacterProfile = async function(){

  };

  async function v2FetchRankingRows(client){
    const out = [];
    try{
      const {data,error} = await client.rpc('get_game_rankings', {p_limit:500});
      if(!error && Array.isArray(data)) out.push(...data);

        .from(SERVER_RANKING_TABLE_V2)
        .select('rank_id,user_id,provider,slot_index,nickname,class_name,level,floor,combat_power,score,updated_at')
        .order('score', {ascending:false})
        .limit(1000);
      if(error) throw error;
      if(Array.isArray(data)) out.push(...data);
    }catch(e){
      if(!out.length) throw new Error(`서버 랭킹 직접 조회 실패: ${e && e.message ? e.message : e}`);
      console.warn('ranking v2 direct select failed:', e && e.message ? e.message : e);
    }
    return out;
  }

  collectRankingRecords = async function(){
    if(!v2IsCloud()) return [];
    const client = getCloudClient && getCloudClient();
    const user = await currentCloudUser();
    if(!client || !user) throw new Error('로그인 세션 또는 Supabase 클라이언트를 확인할 수 없습니다.');
    await v2SyncActiveRankingNow('rankingOpen');
    const rows = await v2FetchRankingRows(client);
    const dedup = new Map();
    rows.forEach(row=>{
      const rec = rankRecordFromPublicRow(row);
      if(!rec) return;
      rec.rankNo = Number(row.rank_no || 0);
      rec.rankId = row.rank_id || `${row.user_id || 'user'}_${row.provider || 'unknown'}_${row.slot_index || 0}`;
      rec.userId = row.user_id || '';
      rec.provider = row.provider || 'unknown';
      rec.slotIndex = Number(row.slot_index || 0);
      const key = rec.rankId;
      const prev = dedup.get(key);
      if(!prev || compareRankRecords(rec, prev) > 0) dedup.set(key, rec);
    });
    const result = Array.from(dedup.values())
      .sort((a,b)=>v2RankPriorityCompare(b,a))
      .slice(0,100);
    result._usedPublicTable = true;
    result._serverOnly = true;
    return result;
  };

  showRankingMenu = async function(){

    if(!v2IsCloud()){
      showModal(`<h2>랭킹</h2>
        <p class="muted">게스트 로그인은 서버 랭킹에 등록되지 않습니다. 카카오/네이버 로그인 후 이용하세요.</p>

    try{

      </tr>`).join('');
      showModal(`<h2>랭킹</h2>
        <p class="muted">기준: <b>층 → 레벨 → 전투력 → 점수 → 최근 갱신</b></p>
        <div class="grid2" style="margin:8px 0 4px">
          <button class="btn smallbtn" id="rankingRefreshBtn">랭킹 새로고침</button>
          <span></span>
        </div>
        <table class="rankingTable">
          <thead><tr><th>순위</th><th>닉네임</th><th>직업</th><th>Lv</th><th>층</th><th>전투력</th><th>점수</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="7" style="text-align:center" class="muted">서버에 등록된 랭킹이 없습니다.</td></tr>'}</tbody>
        </table>
        ${makeCloseBar()}`, false);
      const btn = $('rankingRefreshBtn');
      if(btn){
        btn.onclick = async ()=>{
          btn.disabled = true;
          btn.textContent = '새로고침 중...';
          await v2SyncActiveRankingNow('manualRefresh');
          serverRankingRenderingV2 = false;
          await showRankingMenu();
        };
      }
      bindCloseOnly();
      try{ wrapRankingTableIfNeeded(); }catch(e){}
    }catch(e){
      showModal(`<h2>랭킹</h2>
        <p class="muted">랭킹은 서버 테이블 기준으로만 표시합니다.</p>
        <p class="muted badtxt">${escapeText(e && e.message ? e.message : String(e))}</p>
        <p class="muted">Supabase의 <b>${escapeText(SERVER_RANKING_TABLE_V2)}</b> 테이블/RLS/RPC를 확인하세요.</p>
        ${makeCloseBar()}`, false);
      bindCloseOnly();
    }finally{
      serverRankingRenderingV2 = false;
    }
  };
  if($('rankingMenuBtn')) $('rankingMenuBtn').onclick = showRankingMenu;

  function ensureRankingRealtimeV2(){
    if(!v2IsCloud()) return;
    const client = getCloudClient && getCloudClient();
    if(!client || typeof client.channel !== 'function') return;
    const sig = (cloudClientSignature || '') + '|' + SERVER_RANKING_CHANNEL_V2;
    if(serverRankingChannelV2 && serverRankingChannelSigV2 === sig) return;
    try{
      if(serverRankingChannelV2 && typeof client.removeChannel === 'function') client.removeChannel(serverRankingChannelV2);
    }catch(e){}
    serverRankingChannelSigV2 = sig;
    try{
      serverRankingChannelV2 = client.channel(SERVER_RANKING_CHANNEL_V2)
        .on('postgres_changes', {event:'*', schema:'public', table:SERVER_RANKING_TABLE_V2}, ()=>{
          /* 랭킹 화면은 자동 새로고침하지 않는다. 유저가 버튼을 누를 때만 다시 조회한다. */
        })

      ensureRankingRealtimeV2();
      v2SyncActiveRankingNow('heartbeat').catch(()=>{});

    }, SERVER_RANKING_SYNC_MS_V2);
  }catch(e){}
  ensureRankingRealtimeV2();
  v2QueueRankingSync('init');
})();


(function(){
  const SCORE_WEIGHT_FLOOR = 10000;
  const SCORE_WEIGHT_LEVEL = 100;
  const SCORE_WEIGHT_POWER = 0.01;
  const SCORE_WEIGHT_KILL = 2;
  const SCORE_WEIGHT_SOUL = 1;
  const SCORE_WEIGHT_OPENED = 0.5;
  const SCORE_WEIGHT_RELIC = 25;
  const SCORE_WEIGHT_SKILL = 5;

  function safeNum(v, def=0){
    const n = Number(v);
    return Number.isFinite(n) ? n : def;
  }
  function positiveInt(v, def=0){
    return Math.max(def, Math.floor(safeNum(v, def)));
  }
  function sumNumberValues(obj){
    if(!obj || typeof obj !== 'object') return 0;
    return Object.values(obj).reduce((a,b)=>a+positiveInt(b,0),0);
  }
  function finalRankingScoreFromFields(floor, level, combatPower, extras={}){
    const f = positiveInt(floor,1);
    const lv = positiveInt(level,1);
    const power = Math.max(0, Math.floor(safeNum(combatPower,0)));
    const kills = positiveInt(extras.kills,0);
    const souls = positiveInt(extras.souls,0);
    const opened = positiveInt(extras.opened,0);
    const relics = positiveInt(extras.relics,0);
    const skillTotal = positiveInt(extras.skillTotal,0);
    return Math.max(0, Math.floor(
      f * SCORE_WEIGHT_FLOOR +
      lv * SCORE_WEIGHT_LEVEL +
      power * SCORE_WEIGHT_POWER +
      kills * SCORE_WEIGHT_KILL +
      souls * SCORE_WEIGHT_SOUL +
      opened * SCORE_WEIGHT_OPENED +
      relics * SCORE_WEIGHT_RELIC +
      skillTotal * SCORE_WEIGHT_SKILL
    ));
  }
  window.finalRankingScoreFromFields = finalRankingScoreFromFields;
  window.rankingScoreFormulaText = '층×10,000 + 레벨×100 + 전투력÷100 + 처치×2 + 영혼×1 + 상호작용×0.5 + 유물×25 + 스킬강화×5';

  const oldCombatPowerForRun = combatPowerForRun;
  combatPowerForRun = function(run, metaObj){
    const p = run && run.player ? run.player : null;
    if(!p) return 0;
    const st = calcStatsForRun(run, metaObj || meta || {});
    const skillTotal = sumNumberValues(p.skillEnhance) + sumNumberValues(p.skillLv);
    return Math.max(0, Math.floor(
      positiveInt(p.level,1) * 120 +
      positiveInt(p.floor,1) * 180 +
      safeNum(st.maxHp,0) * 2.0 +
      safeNum(st.maxMp,0) * 1.2 +
      safeNum(st.atk,0) * 22 +
      safeNum(st.def,0) * 18 +
      safeNum(st.crit,0) * 10 +
      safeNum(st.eva,0) * 8 +
      (Array.isArray(p.relics) ? p.relics.length : 0) * 90 +
      skillTotal * 35
    ));
  };

  rankingScoreForRun = function(run, metaObj){
    const p = run && run.player ? run.player : null;
    if(!p) return 0;
    const power = combatPowerForRun(run, metaObj || meta || {});
    const skillTotal = sumNumberValues(p.skillEnhance) + sumNumberValues(p.skillLv);
    return finalRankingScoreFromFields(p.floor || 1, p.level || 1, power, {
      kills:p.kills || 0,
      souls:p.soulsRun || 0,
      opened:p.opened || 0,
      relics:Array.isArray(p.relics) ? p.relics.length : 0,
      skillTotal
    });
  };
  currentCombatPower = function(){
    return S && S.player ? combatPowerForRun(S, meta) : 0;
  };
  currentRankingScore = function(){
    return S && S.player ? rankingScoreForRun(S, meta) : 0;
  };

  const oldNormalizeStoredRankRecord = normalizeStoredRankRecord;
  normalizeStoredRankRecord = function(rec, fallbackNick){
    const r = oldNormalizeStoredRankRecord(rec, fallbackNick);
    if(!r) return r;
    r.score = finalRankingScoreFromFields(r.floor || 1, r.level || 1, r.combatPower || 0);
    return r;
  };

  rankRecordFromRun = function(run, metaObj, fallbackNick){
    const p = run && run.player ? run.player : null;
    if(!p) return null;
    return {
      nickname:String(fallbackNick || p.name || p.className || '이름 없음'),
      className:String(p.className || (classes[p.classId]||classes.warrior).name),
      level:clamp(Number(p.level || 1), 1, MAX_LEVEL),
      floor:Number(p.floor || 1),
      combatPower:Number(combatPowerForRun(run, metaObj || meta || {})),
      score:Number(rankingScoreForRun(run, metaObj || meta || {})),
      updatedAt:new Date().toISOString()
    };
  };

  try{
    const oldRankRecordFromPublicRow = rankRecordFromPublicRow;
    rankRecordFromPublicRow = function(row){
      const rec = oldRankRecordFromPublicRow(row);
      if(!rec) return rec;
      rec.score = finalRankingScoreFromFields(rec.floor || 1, rec.level || 1, rec.combatPower || 0);
      return rec;
    };
  }catch(e){}
})();


function ensureOpenDoorCooldownField(){
  if(!S || !S.player) return;
  S.player.cd = Object.assign({smash:0,dash:0,heal:0,potion:0,openDoor:0}, S.player.cd || {});
}
const ensureRunFieldsBeforeOpenDoorCooldown = ensureRunFields;
ensureRunFields = function(){
  ensureRunFieldsBeforeOpenDoorCooldown();
  ensureOpenDoorCooldownField();
};
function openDoorCooldownTurns(){
  const lv = clamp(Number(skillLv('openDoor') || 0), 0, 20);
  const rogueBonus = S && S.player && S.player.classId === 'rogue' ? 5 : 0;
  return Math.max(5, 30 - lv - rogueBonus);
}
const skillCooldownByKeyBeforeOpenDoorCooldown = skillCooldownByKey;

useOpenDoorSkill = function(){
  if(!S || !S.player) return;
  if(!canAct()) return;
  ensureOpenDoorCooldownField();
  const p = S.player;
  if(p.cd.openDoor > 0){
    toast(`문열기 재사용 ${p.cd.openDoor}턴`);
    return;
  }
  const room = adjacentLockedDoor();
  if(!room){
    toast('사거리 1칸 안에 잠긴 문이 없습니다.');
    return;
  }
  const doorDistance = Math.abs(p.x - room.door.x) + Math.abs(p.y - room.door.y);
  if(doorDistance !== 1){
    toast('문열기 사거리는 1칸입니다.');
    return;
  }
  hideModal();
  const pct = openDoorChance();
  const ok = rand(100) < pct;
  if(ok){
    revealLockedRoom(room);
    addFx({kind:'ring', x:room.door.x, y:room.door.y, color:'#facc15', dur:380});
    addLog(`<span class="legend">문열기 성공</span>. 잠긴 방의 어둠장막이 걷혔다. (${pct}%)`);
  }else{
    addFx({kind:'hit', x:room.door.x, y:room.door.y, color:'#64748b', spark:'#cbd5e1', dur:220});
    addLog(`문열기 실패. 잠긴 문이 버텼다. (${pct}%)`);
  }
  p.cd.openDoor = openDoorCooldownTurns() + 1;
  afterPlayerAction();
};

function warriorSkillLevel(k){ return clamp(Number(skillLv(k)||0),0,20); }
function warriorChargeGuardTurns(){ return 3 + Math.floor(warriorSkillLevel('dash')/10); }
function warriorBattleCryTurns(){ return 4 + Math.floor(warriorSkillLevel('heal')/5); }
function warriorBattleCryAtkBonus(){ return 3 + Math.floor(warriorSkillLevel('heal')/10); }
function warriorChargeGuardDefBonus(){ return 2 + Math.floor(warriorSkillLevel('dash')/10); }
function isWarriorSkillMaster(k){ return warriorSkillLevel(k) >= 20; }

const calcStatsBeforeWarriorSkillBalance = calcStats;
calcStats = function(){
  const st = calcStatsBeforeWarriorSkillBalance();
  const p = S && S.player;
  if(p && p.classId === 'warrior' && p.effects){

function shieldChargeReachableEnemies(cx, cy, sourceEnemy){
  if(!S || !S.map) return [];
  const q=[{x:cx,y:cy,d:0}], seen=new Set([cx+','+cy]), result=[];
  for(let qi=0; qi<q.length; qi++){
    const cur=q[qi];
    if(cur.d >= 4) continue;
    for(const [dx,dy] of DIRS){
      const nx=cur.x+dx, ny=cur.y+dy, key=nx+','+ny;
      if(seen.has(key) || !inMap(nx,ny)) continue;
      if(S.map[ny][nx] === '#' || lockedDoorAt(nx,ny,false) || lockedRoomCellAt(nx,ny)) continue;
      seen.add(key);
      const nd=cur.d+1;
      const e=enemyAt(nx,ny);
      if(e && e !== sourceEnemy && e.hp > 0 && nd >= 1 && nd <= 4) result.push(e);
      q.push({x:nx,y:ny,d:nd});
    }
  }
  return Array.from(new Set(result));
}
function applyShieldChargeMasterReflect(sourceEnemy, baseDamage, impactX, impactY){
  if(!isWarriorSkillMaster('dash')) return;
  const dmg=Math.max(3, Math.floor((Number(baseDamage)||0)*0.35));
  const victims=shieldChargeReachableEnemies(impactX, impactY, sourceEnemy).slice(0,6);
  if(!victims.length) return;
  victims.forEach(e=>{
    e.hp -= dmg;
    addFx({kind:'burst', x:e.x, y:e.y, color:'#93c5fd', spark:'#dbeafe', dur:220});
    addMonsterHitFx(e, false);
    addLog(`방패 반사 충격이 ${e.name}에게 <b>${dmg}</b> 피해.`);
    if(e.hp <= 0) killEnemy(e);
  });
}

function masterSkillInfo(cls,k){ return ALL_MASTER_SKILLS?.[cls]?.[k] || null; }
function tryMasterChain(cls,k){ const info=masterSkillInfo(cls,k); return !!(info && skillLv(k)>=20 && chance((info.chance||0)/100)); }
function showMasterChainBanner(cls,k){ const info=masterSkillInfo(cls,k); if(!info) return; toast(`${info.name} 연계!`); addLog(`<span class="legend">${info.name}</span> 연계!`); }
function dealMasterDamage(e,dmg,label,color='#facc15'){
  if(!e || e.hp<=0 || dmg<=0) return 0;
  const n=Math.max(1,Math.floor(dmg));
  e.hp-=n;
  addFx({kind:'burst', x:e.x, y:e.y, color, spark:'#ffffff', dur:250});
  addMonsterHitFx(e,false);
  addLog(`${label} ${e.name}에게 <b>${n}</b> 피해.`);
  if(e.hp<=0) killEnemy(e);
  return n;
}
function liveEnemiesInRange(cx,cy,r,exclude){
  return S.enemies.filter(e=>e && e.hp>0 && e!==exclude && dist({x:cx,y:cy},e)<=r);
}

const calcStatsBeforeAllMasterChains = calcStats;
calcStats = function(){
  const st = calcStatsBeforeAllMasterChains();
  const p = S && S.player;
  if(!p || !p.effects) return st;
  if(p.effects.masterRoar>0) st.flatReduce += Math.max(3, Math.floor((st.def||0)*0.25));
  if(p.effects.masterSmoke>0) st.eva += 10;
  if(p.effects.masterSmokeBlock>0) st.flatReduce += Math.max(2, Math.floor((st.def||0)*0.20));
  if(p.effects.hunterReflex>0) st.eva += 15;
  if(p.effects.lifeGlyph>0) st.flatReduce += Math.max(2, Math.floor((st.def||0)*0.15));
  return st;
};

const playerAttackBeforeAllMasterChains = playerAttack;
playerAttack = function(e,strong,opts={}){
  const p=S && S.player;
  if(p && p.effects && p.effects.shadowMaster>0){
    opts = Object.assign({}, opts, {critBonus:(opts.critBonus||0)+25, mult:(opts.mult||1)*1.20});
    p.effects.shadowMaster=0;
    addLog('암영살의 그림자가 다음 공격에 실렸다.');
  }
  if(p && p.effects && p.effects.hunterMasterFocus>0 && opts && opts.ranged){
    opts = Object.assign({}, opts, {critBonus:(opts.critBonus||0)+10, mult:(opts.mult||1)*1.15});
    p.effects.hunterMasterFocus=0;
    addLog('야수의 반사신경으로 원거리 공격이 강화되었다.');
  }
  return playerAttackBeforeAllMasterChains(e,strong,opts);
};

const enemyAttackBeforeAllMasterChains = enemyAttack;
enemyAttack = function(e,st){
  const p=S && S.player;
  if(p && p.effects && p.effects.masterSmokeBlock>0){
    const oldAtk=e.atk;
    e.atk=Math.max(1,Math.floor(oldAtk*0.5));
    p.effects.masterSmokeBlock=0;
    addLog('흑무장막이 첫 공격 피해를 줄였다.');
    const ret=enemyAttackBeforeAllMasterChains(e,st);
    e.atk=oldAtk;
    return ret;
  }
  return enemyAttackBeforeAllMasterChains(e,st);
};

const tickEffectsBeforeAllMasterChains = tickEffects;
tickEffects = function(){
  const p=S && S.player;
  if(p && p.effects && p.effects.lifeGlyph>0 && !S.dead){

    const h=Math.max(1,Math.floor(st.maxHp*0.05));

  }
  tickEffectsBeforeAllMasterChains();
};

const resolveAimedSkillBeforeAllMasterChains = resolveAimedSkill;
resolveAimedSkill = function(dx,dy){
  const p=S && S.player;
  if(!p || !p.awaitAim) return resolveAimedSkillBeforeAllMasterChains(dx,dy);
  const type=p.awaitAim;
  if(type==='warriorCharge'){
    p.awaitAim='';
    const sx=p.x, sy=p.y;
    let steps=0, hit=false, impactX=p.x, impactY=p.y, chargeDmg=0, target=null;
    setPlayerDirByDelta(dx,dy);
    for(let i=0;i<2;i++){
      const nx=p.x+dx, ny=p.y+dy;
      const e=enemyAt(nx,ny);
      if(e){ target=e; impactX=e.x; impactY=e.y; chargeDmg=playerAttack(e,true,{bonusBase:2+skillPowerBonus('dash')}); hit=true; break; }
      if(!passable(nx,ny)) break;
      p.x=nx; p.y=ny; steps++;
    }
    addFx({kind:'trail', x1:sx, y1:sy, x2:p.x, y2:p.y, color:'#60a5fa', dur:260});
    if(hit){
      addFx({kind:'burst', x:impactX, y:impactY, color:'#93c5fd', spark:'#ffffff', dur:240});
      if(tryMasterChain('warrior','dash')){ showMasterChainBanner('warrior','dash'); applyShieldChargeMasterReflect(target, chargeDmg, impactX, impactY); }
    }
    p.effects.guard=warriorChargeGuardTurns();
    addLog(hit ? `방패돌진 성공. 방어 태세 ${warriorChargeGuardTurns()}턴.` : (steps ? `방패돌진 ${steps}칸 이동. 방어 태세 ${warriorChargeGuardTurns()}턴.` : '방패돌진이 막혔다.'));
    pickupCheck();
    afterPlayerAction();
    return;
  }
  if(type==='rogueStep'){
    p.awaitAim='';
    const sx=p.x, sy=p.y;
    setPlayerDirByDelta(dx,dy);
    let moved=0;
    for(let i=0;i<2;i++){ const nx=p.x+dx, ny=p.y+dy; if(!passable(nx,ny)||enemyAt(nx,ny)) break; p.x=nx; p.y=ny; moved++; }
    addFx({kind:'trail', x1:sx, y1:sy, x2:p.x, y2:p.y, color:'#c084fc', dur:280});
    p.effects.shadow=4;
    addLog(moved?`그림자 도약 ${moved}칸 이동. 다음 공격이 강화된다.`:'도약할 공간이 없다.');
    if(moved && tryMasterChain('rogue','dash')){ showMasterChainBanner('rogue','dash'); p.effects.shadowMaster=2; p.effects.smoke=Math.max(p.effects.smoke||0,1); }
    pickupCheck();
    afterPlayerAction();
    return;
  }
  if(type==='hunterRoll'){
    p.awaitAim='';
    const sx=p.x, sy=p.y;
    const beforeNearest=S.enemies.filter(e=>e.hp>0).map(e=>dist(e,p)).sort((a,b)=>a-b)[0] || 99;
    setPlayerDirByDelta(dx,dy);
    let moved=0;
    for(let i=0;i<2;i++){ const nx=p.x+dx, ny=p.y+dy; if(!passable(nx,ny)||enemyAt(nx,ny)) break; p.x=nx; p.y=ny; moved++; }
    const afterNearest=S.enemies.filter(e=>e.hp>0).map(e=>dist(e,p)).sort((a,b)=>a-b)[0] || 99;
    addFx({kind:'trail', x1:sx, y1:sy, x2:p.x, y2:p.y, color:'#84cc16', dur:260});
    p.effects.focus=4;
    addLog(moved?`구르기 ${moved}칸 이동. 다음 원거리 공격이 강화된다.`:'구를 공간이 없다.');
    if(moved && tryMasterChain('hunter','dash')){
      showMasterChainBanner('hunter','dash');
      p.effects.hunterReflex=2;
      p.effects.hunterMasterFocus=2;
      if(afterNearest>beforeNearest) reduceSkillCooldownTurn('smash',1);
    }
    pickupCheck();
    afterPlayerAction();
    return;
  }
  return resolveAimedSkillBeforeAllMasterChains(dx,dy);
};

function cleanSkillMenuEnhanceDesc(k){
  let txt = (typeof skillEnhanceDesc === 'function') ? String(skillEnhanceDesc(k) || '') : '';
  // 스킬창 카드에는 마스터 연계 줄을 별도로 표시하므로, 강화 설명 안의 마스터 문구는 제거한다.
  txt = txt
    .replace(/\s*·\s*\+20\s*마스터\s*연계:[^·<]*/g, '')
    .replace(/\s*·\s*마스터\s*연계:[^·<]*/g, '')
    .replace(/\s*·\s*\+20\s*마스터명:[^·<]*/g, '')
    .replace(/\s*·\s*마스터:[^·<]*/g, '');
  // 쿨타임이 중복으로 붙은 경우 마지막 값 하나만 남긴다.
  const cdMatches = txt.match(/쿨타임\s*\d+턴/g) || [];
  if(cdMatches.length > 1){
    const last = cdMatches[cdMatches.length - 1];
    txt = txt.replace(/\s*·?\s*쿨타임\s*\d+턴/g, '');
    txt = txt ? `${txt} · ${last}` : last;
  }
  txt = txt.replace(/\s*·\s*·\s*/g, ' · ').replace(/^\s*·\s*/, '').replace(/\s*·\s*$/, '').trim();
  return txt;
}

function skillRangeGridMaster(info, chainRange){
  const r=Math.max(2, Math.min(5, Number(info.range)||0, /1~4/.test(chainRange||'') ? 4 : 5));
  const size=r*2+1;
  let cells='';
  for(let y=-r;y<=r;y++) for(let x=-r;x<=r;x++){
    const d=Math.abs(x)+Math.abs(y); let cls='', txt='';
    if(x===0&&y===0){ cls='me'; txt='나'; }
    else if(info.shape==='melee'&&d===1) cls='range';
    else if(info.shape==='line'&&((x===0||y===0)&&d>0&&d<=Math.min(info.range,r))) cls='range';
    else if(info.shape==='radius'&&d>0&&d<=Math.min(info.range,r)) cls='range';
    if(/1~4/.test(chainRange||'')&&d>=1&&d<=4) cls=cls?cls+' chain':'chain';
    cells+=`<span class="skillRangeCell ${cls}">${txt}</span>`;
  }
  return `<div class="skillRangeGrid" style="--skill-range-grid-size:${size}">${cells}</div>`;
}

resolveAimedSkill = function(dx,dy){

      addLog('도약할 공간이 없다.');
    }
    pickupCheck();
    afterPlayerAction();
    return;
  }
  if(type==='hunterRoll'){
    p.awaitAim='';
    const sx=p.x, sy=p.y;
    const beforeNearest=S.enemies.filter(e=>e.hp>0).map(e=>dist(e,p)).sort((a,b)=>a-b)[0] || 99;

const CLASS_SKILL_COOLDOWN_BALANCE = {
  warrior:{smash:{base:10,min:7,label:'강타'},dash:{base:12,min:9,label:'방패돌진'},heal:{base:14,min:11,label:'전투함성'}},

  mage:{smash:{base:7,min:5,label:'마력탄'},dash:{base:12,min:9,label:'화염폭발'},heal:{base:14,min:11,label:'재생술'}},
  hunter:{smash:{base:8,min:6,label:'정밀사격'},dash:{base:9,min:7,label:'구르기'},heal:{base:12,min:9,label:'다발 사격'}}
};
function classSkillCooldownClass(cls){
  cls=cls || (S&&S.player&&S.player.classId) || 'warrior';
  return CLASS_SKILL_COOLDOWN_BALANCE[cls] ? cls : 'warrior';
}
function classSkillCooldownValue(cls,k){
  cls=classSkillCooldownClass(cls);
  const info=(CLASS_SKILL_COOLDOWN_BALANCE[cls]||{})[k];
  if(!info) return 0;
  let v=info.base - skillCdBonus(k);
  if(k==='dash') v += Number((typeof calcStats==='function' && calcStats().dashCd) || 0);
  return Math.max(info.min, Math.floor(v));
}
function applyClassSkillCooldownAfterUse(cls,k,beforeCd,beforeAwait){
  const p=S&&S.player;
  if(!p || !p.cd || !CLASS_SKILL_COOLDOWN_BALANCE[classSkillCooldownClass(cls)]?.[k]) return;
  const changedCd = Math.max(0, Number(p.cd[k]||0)) > 0 && Math.max(0, Number(beforeCd||0)) <= 0;
  const changedAim = k==='dash' && beforeAwait !== p.awaitAim && !!p.awaitAim;
  if(changedCd || changedAim) p.cd[k]=classSkillCooldownValue(cls,k);
}
function wrapClassSkillCooldownBalance(fnName,cls,k){
  const old=window[fnName];
  if(typeof old!=='function') return;
  window[fnName]=function(){
    const p=S&&S.player;
    const beforeCd=p&&p.cd ? Number(p.cd[k]||0) : 0;
    const beforeAwait=p ? p.awaitAim : null;
    const ret=old.apply(this,arguments);
    applyClassSkillCooldownAfterUse(cls,k,beforeCd,beforeAwait);
    return ret;
  };
}

  const FINAL_SKILL_COOLDOWNS = {
    warrior:{smash:{base:10,min:8,label:'강타'},dash:{base:12,min:10,label:'방패돌진'},heal:{base:14,min:12,label:'전투함성'}},
    rogue:{smash:{base:8,min:6,label:'급소찌르기'},dash:{base:9,min:7,label:'그림자도약'},heal:{base:13,min:11,label:'연막'}},
    mage:{smash:{base:7,min:5,label:'마력탄'},dash:{base:12,min:10,label:'화염폭발'},heal:{base:14,min:12,label:'재생술'}},
    hunter:{smash:{base:8,min:6,label:'정밀사격'},dash:{base:9,min:7,label:'구르기'},heal:{base:12,min:10,label:'다발 사격'}}
  };
  window.FINAL_SKILL_COOLDOWNS = FINAL_SKILL_COOLDOWNS;

  function finalSkillClass(cls){
    cls = cls || (S && S.player && S.player.classId) || 'warrior';
    return FINAL_SKILL_COOLDOWNS[cls] ? cls : 'warrior';
  }
  function finalEnsureCd(){
    if(!S || !S.player) return null;
    S.player.cd = Object.assign({smash:0,dash:0,heal:0,potion:0,openDoor:0}, S.player.cd || {});
    return S.player.cd;
  }
  function finalSkillCd(cls,k){
    cls = finalSkillClass(cls);
    const row = FINAL_SKILL_COOLDOWNS[cls] && FINAL_SKILL_COOLDOWNS[cls][k];
    if(!row) return 0;
    let cd = row.base - (typeof skillCdBonus === 'function' ? skillCdBonus(k) : 0);
    if(k === 'dash'){
      try{ cd += Number((typeof calcStats === 'function' && calcStats().dashCd) || 0); }catch(e){}
    }
    return Math.max(row.min, Math.floor(cd));
  }
  function finalSkillLabel(cls,k){
    cls = finalSkillClass(cls);
    return FINAL_SKILL_COOLDOWNS[cls]?.[k]?.label || '기술';
  }
  function finalGateSkill(cls,k){
    const cd = finalEnsureCd();
    if(!cd) return false;
    const left = Math.max(0, Math.floor(Number(cd[k]) || 0));
    if(left > 0){
      toast(`${finalSkillLabel(cls,k)} 재사용 ${left}턴`);
      return false;
    }
    return true;
  }
  function finalApplyCd(cls,k){
    const cd = finalEnsureCd();
    if(!cd) return;
    const turns = finalSkillCd(cls,k);
    cd[k] = turns;
    if(S && S.player && (k === 'smash' || k === 'dash' || k === 'heal')){
      S.player.skillTurnLock = Object.assign({smash:0,dash:0,heal:0}, S.player.skillTurnLock || {});
      // finalApplyCd는 스킬 실행/방향선택 처리 뒤에 호출된다. 현재 턴 기준으로 남은 턴을 그대로 저장한다.
      S.player.skillTurnLock[k] = Math.floor(Number(S.player.turn)||0) + turns;
    }
    if(typeof updateSkillButtonsFromQuickSlots === 'function') updateSkillButtonsFromQuickSlots();
    else if(typeof updateSkillButtons === 'function') updateSkillButtons();
  }
  function finalPostRenderSave(){
    try{ if(typeof renderAll === 'function') renderAll(); }catch(e){}
    try{ if(typeof saveRun === 'function') saveRun(); }catch(e){}
  }
  function finalWrapClassSkill(fn, cls, k){
    if(typeof fn !== 'function') return fn;
    return function(){
      if(!finalGateSkill(cls,k)) return;
      const p = S && S.player;
      const beforeTurn = p ? Number(p.turn || 0) : 0;
      const beforeAim = p ? p.awaitAim : null;
      const ret = fn.apply(this, arguments);
      const after = S && S.player;
      if(!after) return ret;
      const usedTurn = Number(after.turn || 0) > beforeTurn;
      const selectedAim = !!after.awaitAim && after.awaitAim !== beforeAim;
      if(usedTurn || selectedAim){
        finalApplyCd(cls,k);
        finalPostRenderSave();
      }
      return ret;
    };
  }

  if(typeof skillWarrior1 === 'function') skillWarrior1 = finalWrapClassSkill(skillWarrior1,'warrior','smash');
  if(typeof skillWarrior2 === 'function') skillWarrior2 = finalWrapClassSkill(skillWarrior2,'warrior','dash');
  if(typeof skillWarrior3 === 'function') skillWarrior3 = finalWrapClassSkill(skillWarrior3,'warrior','heal');
  if(typeof skillRogue1 === 'function') skillRogue1 = finalWrapClassSkill(skillRogue1,'rogue','smash');
  if(typeof skillRogue2 === 'function') skillRogue2 = finalWrapClassSkill(skillRogue2,'rogue','dash');
  if(typeof skillRogue3 === 'function') skillRogue3 = finalWrapClassSkill(skillRogue3,'rogue','heal');
  if(typeof skillMage1 === 'function') skillMage1 = finalWrapClassSkill(skillMage1,'mage','smash');
  if(typeof skillMage2 === 'function') skillMage2 = finalWrapClassSkill(skillMage2,'mage','dash');
  if(typeof skillMage3 === 'function') skillMage3 = finalWrapClassSkill(skillMage3,'mage','heal');
  if(typeof skillHunter1 === 'function') skillHunter1 = finalWrapClassSkill(skillHunter1,'hunter','smash');
  if(typeof skillHunter2 === 'function') skillHunter2 = finalWrapClassSkill(skillHunter2,'hunter','dash');
  if(typeof skillHunter3 === 'function') skillHunter3 = finalWrapClassSkill(skillHunter3,'hunter','heal');

  skillSmash = function(){
    if(!canAct()) return;
    const cls = finalSkillClass(S && S.player && S.player.classId);
    if(!finalGateSkill(cls,'smash')) return;
    if(cls === 'warrior') return skillWarrior1();
    if(cls === 'rogue') return skillRogue1();
    if(cls === 'mage') return skillMage1();
    if(cls === 'hunter') return skillHunter1();
  };
  skillDash = function(){
    if(!canAct()) return;
    const cls = finalSkillClass(S && S.player && S.player.classId);
    if(!finalGateSkill(cls,'dash')) return;
    if(cls === 'warrior') return skillWarrior2();
    if(cls === 'rogue') return skillRogue2();
    if(cls === 'mage') return skillMage2();
    if(cls === 'hunter') return skillHunter2();
  };
  skillHeal = function(){
    if(!canAct()) return;
    const cls = finalSkillClass(S && S.player && S.player.classId);
    if(!finalGateSkill(cls,'heal')) return;
    if(cls === 'warrior') return skillWarrior3();
    if(cls === 'rogue') return skillRogue3();
    if(cls === 'mage') return skillMage3();
    if(cls === 'hunter') return skillHunter3();
  };

  const oldCooldownText = typeof skillCooldownText === 'function' ? skillCooldownText : null;
  skillCooldownText = function(cls,k){
    if(FINAL_SKILL_COOLDOWNS[finalSkillClass(cls)]?.[k]) return `${finalSkillCd(cls,k)}턴`;
    return oldCooldownText ? oldCooldownText(cls,k) : '-';
  };


  function skillEnhanceCostText(lv){
    const info = skillCostInfo(lv);
    if(lv >= 20) return 'MAX 강화 완료';
    return `비용 ${formatGold(info.cost)} · 성공 ${info.s}% · 유지 ${info.k}% · 하락 ${info.d}%`;
  }
  function skillEnhanceBaseEffectText(cls,k){
    const effect = {
      warrior:{smash:'피해 증가 · 쿨타임 감소',dash:'피해 증가 · 쿨타임 감소',heal:'회복량 증가 · 지속턴 증가 · 쿨타임 감소'},
      rogue:{smash:'피해 증가 · 치명 보정 증가 · 쿨타임 감소',dash:'기습 강화 · 지속턴 증가 · 쿨타임 감소',heal:'연막 지속턴 증가 · 쿨타임 감소'},
      mage:{smash:'피해 증가 · +15부터 사거리 +1 · 쿨타임 감소',dash:'광역 피해 증가 · 쿨타임 감소',heal:'회복량 증가 · 쿨타임 감소'},
      hunter:{smash:'피해 증가 · +15부터 사거리 +1 · 쿨타임 감소',dash:'집중 지속턴 증가 · 쿨타임 감소',heal:'피해 증가 · 대상 수 증가 · +15부터 사거리 +1 · 쿨타임 감소'}
    };
    return (effect[cls] && effect[cls][k]) || '피해/효과 증가 · 쿨타임 감소';
  }
  function appendFinalCooldownText(txt,cls,k){
    if(!FINAL_SKILL_COOLDOWNS[cls]?.[k]) return txt;
    const cdText = `쿨타임 ${finalSkillCd(cls,k)}턴`;
    if(/쿨타임\s*\d+턴/.test(txt)) return txt.replace(/쿨타임\s*\d+턴/g, cdText);
    return txt ? `${txt} · ${cdText}` : cdText;
  }
  function appendSkillMasterText(txt,cls,k){
    if(cls === 'warrior' && typeof warriorMasterSkillName === 'function' && typeof warriorSkillLevel === 'function'){
      const masterName = warriorMasterSkillName(k);
      if(masterName) txt += warriorSkillLevel(k) >= 20 ? ` · 마스터명: ${masterName}` : ` · +20 마스터명: ${masterName}`;
    }
    const info = typeof masterSkillInfo === 'function' ? masterSkillInfo(cls,k) : null;
    if(info){
      txt += skillLv(k) >= 20 ? ` · 마스터 연계: ${info.name} ${info.chance}%` : ` · +20 마스터 연계: ${info.name} ${info.chance}%`;
    }
    return txt;
  }
  skillEnhanceDesc = function(k){
    const p = S && S.player;
    const cls = finalSkillClass(p && p.classId);
    const lv = skillLv(k);

    if(k === 'openDoor'){
      const cost = skillEnhanceCostText(lv);
      const chance = typeof openDoorChance === 'function' ? openDoorChance() : 0;
      const cd = typeof openDoorCooldownTurns === 'function' ? openDoorCooldownTurns() : 0;
      const rogueText = p && p.classId === 'rogue' ? ' · 도적 쿨타임 -5턴' : '';
      if(lv >= 20) return `${cost} · 문 열기 확률 ${chance}% · 사거리 1칸 · 쿨타임 ${cd}턴${rogueText}`;
      return `${cost} · 현재 문 열기 확률 ${chance}% · 사거리 1칸 · 쿨타임 ${cd}턴${rogueText}`;
    }

    let txt = '';
    const cost = skillEnhanceCostText(lv);

    if(cls === 'warrior' && (k === 'smash' || k === 'dash' || k === 'heal')){
      if(k === 'smash'){
        txt = `${cost} · 추가 피해 +${skillPowerBonus('smash')}`;
      }else if(k === 'dash'){
        const master = lv >= 20 ? ' · 마스터: 돌진 성공 시 충격 지점 1~4칸 적에게 반사 피해' : '';
        txt = `${cost} · 충돌 피해 +${skillPowerBonus('dash')} · 방어 태세 ${warriorChargeGuardTurns()}턴 / 방어 +${warriorChargeGuardDefBonus()}${master}`;
      }else if(k === 'heal'){
        txt = `${cost} · 회복량 +${skillPowerBonus('heal')*2} · 공격 +${warriorBattleCryAtkBonus()} · 지속 ${warriorBattleCryTurns()}턴`;
      }
    }else{
      txt = lv >= 20 ? cost : `${cost} · ${skillEnhanceBaseEffectText(cls,k)}`;
    }

    txt = appendFinalCooldownText(txt,cls,k);
    return appendSkillMasterText(txt,cls,k);
  };


  const oldSkillCooldownByKey = typeof skillCooldownByKey === 'function' ? skillCooldownByKey : null;
  skillCooldownByKey = function(k){
    const cd = finalEnsureCd();
    if(cd && (k === 'smash' || k === 'dash' || k === 'heal')) return Math.max(0, Number(cd[k] || 0));
    return oldSkillCooldownByKey ? oldSkillCooldownByKey(k) : 0;
  };

  const previousShowSkillRangePopup = typeof showSkillRangePopup === 'function' ? showSkillRangePopup : null;
  showSkillRangePopup = function(skillKey, clsArg){
    if(typeof showSkillRangePopupMaster === 'function') return showSkillRangePopupMaster(skillKey, clsArg);
    if(previousShowSkillRangePopup) return previousShowSkillRangePopup(skillKey, clsArg);
  };
  window.showSkillRangePopup = showSkillRangePopup;



  document.addEventListener('click', ev=>{
    const card = ev.target && ev.target.closest && ev.target.closest('[data-skill-info]');
    if(!card || !modalCard || !modalCard.contains(card)) return;
    if(ev.target.closest('button')) return;
    ev.preventDefault();
    ev.stopImmediatePropagation();
    showSkillRangePopup(card.getAttribute('data-skill-info'), card.getAttribute('data-skill-class'));
  }, true);

  const oldUpdateSkillButtonsFinal = typeof updateSkillButtonsFromQuickSlots === 'function' ? updateSkillButtonsFromQuickSlots : null;
  if(oldUpdateSkillButtonsFinal){
    updateSkillButtonsFromQuickSlots = function(){
      finalEnsureCd();
      return oldUpdateSkillButtonsFinal.apply(this, arguments);
    };
  }


  const oldGenerateFloorClosedRoomWallFinal = typeof generateFloor === 'function' ? generateFloor : null;
  if(oldGenerateFloorClosedRoomWallFinal){
    generateFloor = function(){
      const ret = oldGenerateFloorClosedRoomWallFinal.apply(this, arguments);
      if(typeof normalizeClosedLockedRoomsToWalls === 'function') normalizeClosedLockedRoomsToWalls();
      return ret;
    };
  }
  const oldRenderAllClosedRoomWallFinal = typeof renderAll === 'function' ? renderAll : null;
  if(oldRenderAllClosedRoomWallFinal){
    renderAll = function(){
      if(typeof normalizeClosedLockedRoomsToWalls === 'function') normalizeClosedLockedRoomsToWalls();
      return oldRenderAllClosedRoomWallFinal.apply(this, arguments);
    };
  }


})();


(function(){
  if(typeof actualSkillMpCost !== 'function') return;
  skillMpText = function(cls,k){
    if(k==='openDoor') return '0';
    return String(actualSkillMpCost(cls,k));
  };
  window.skillMpText = skillMpText;
})();


(function(){
  const style = document.createElement('style');
  style.textContent = `
    #modal #modalCard .rankingOnline,
    #modal #modalCard .rankingOnline *,
    #modal #modalCard [data-ranking-online="1"],
    #modal #modalCard [data-ranking-online="1"] *{
      color:#ffffff!important;
    }
    #modal #modalCard .rankingOffline,
    #modal #modalCard .rankingOffline *,
    #modal #modalCard [data-ranking-online="0"],
    #modal #modalCard [data-ranking-online="0"] *{
      color:#94a3b8!important;
    }
  `;
  document.head.appendChild(style);

  function rankingTextLooksOnline(text){
    text = String(text || '');
    return /온라인|접속중|접속 중|online/i.test(text);
  }
  function rankingTextLooksOffline(text){
    text = String(text || '');
    return /오프라인|미접속|offline/i.test(text);
  }

  function normalizeRankingRowColors87(){
    if(!modalCard) return;
    const title = modalCard.querySelector('h1,h2,h3');
    if(!title || !/랭킹/.test(title.textContent || '')) return;

    const candidates = Array.from(modalCard.querySelectorAll('.choice,.metaRow,tr,li,.rankingRow,[data-ranking-row]'));
    candidates.forEach(el=>{
      const text = el.textContent || '';
      if(rankingTextLooksOnline(text)){
        el.classList.add('rankingOnline');
        el.classList.remove('rankingOffline');
        el.dataset.rankingOnline = '1';
      }else if(rankingTextLooksOffline(text)){
        el.classList.add('rankingOffline');
        el.classList.remove('rankingOnline');
        el.dataset.rankingOnline = '0';
      }
    });
  }

  const showRankingBeforeColor87 = typeof showRanking === 'function' ? showRanking : null;
  if(showRankingBeforeColor87){
    showRanking = function(){
      const ret = showRankingBeforeColor87.apply(this, arguments);
      normalizeRankingRowColors87();
      setTimeout(normalizeRankingRowColors87, 0);
      setTimeout(normalizeRankingRowColors87, 80);
      return ret;
    };
  }

  const showModalBeforeRankingColor87 = typeof showModal === 'function' ? showModal : null;
  if(showModalBeforeRankingColor87){
    showModal = function(){
      const ret = showModalBeforeRankingColor87.apply(this, arguments);
      normalizeRankingRowColors87();
      setTimeout(normalizeRankingRowColors87, 0);
      return ret;
    };
  }

  window.normalizeRankingRowColors87 = normalizeRankingRowColors87;
})();


(function(){
  /* Ranking problem fix:
     - Existing ranking rows had no online/offline text, so text-scanning could not classify rows.
     - Re-render ranking rows with row classes based on active online table/list. */
  const style = document.createElement('style');
  style.textContent = `
    #modal #modalCard .rankingTable tr.rankingOnline td,
    #modal #modalCard .rankingTable tr.rankingOnline td *,
    #modal #modalCard .rankingTable tr.rankingOnline .rankTop{color:#ffffff!important;}
    #modal #modalCard .rankingTable tr.rankingOffline td,
    #modal #modalCard .rankingTable tr.rankingOffline td *,
    #modal #modalCard .rankingTable tr.rankingOffline .rankTop{color:#94a3b8!important;}
  `;
  document.head.appendChild(style);

  function onlineKeyCandidates88(obj){
    const keys=[];
    const userId = String(obj.userId || obj.user_id || '').trim();
    const provider = String(obj.provider || obj.mode || '').trim();
    const slotRaw = obj.slotIndex != null ? obj.slotIndex : (obj.slot_index != null ? obj.slot_index : null);
    const slot0 = slotRaw == null || slotRaw === '-' ? '' : String(Number(slotRaw));
    const nick = String(obj.nickname || '').trim().toLowerCase();
    if(userId && provider && slot0 !== 'NaN' && slot0 !== '') keys.push(`u:${userId}|p:${provider}|s:${slot0}`);
    if(userId) keys.push(`u:${userId}`);
    if(nick) keys.push(`n:${nick}`);
    return keys;
  }

  async function fetchOnlineKeys88(){
    const keys = new Set();
    try{
      if(typeof normalizeOnlineList === 'function'){
        (normalizeOnlineList() || []).forEach(u=>{
          const slotNum = u.slot == null || u.slot === '-' ? null : Math.max(0, Number(u.slot)-1);
          onlineKeyCandidates88({userId:u.userId, provider:u.mode, slotIndex:slotNum, nickname:u.nickname}).forEach(k=>keys.add(k));
        });
      }
    }catch(e){}
    try{
      const client = getCloudClient && getCloudClient();
      if(client && typeof client.from === 'function'){
        const since = new Date(Date.now() - 45000).toISOString();
        const {data,error} = await client
          .from('game_online_users')
          .select('user_id,provider,nickname,slot_index,updated_at')
          .gte('updated_at', since)
          .limit(300);
        if(!error && Array.isArray(data)){
          data.forEach(row=>onlineKeyCandidates88(row).forEach(k=>keys.add(k)));
        }
      }
    }catch(e){ console.warn('ranking online color fetch failed:', e && e.message ? e.message : e); }
    return keys;
  }

  function rankingRecordOnline88(r, onlineKeys){
    return onlineKeyCandidates88(r).some(k=>onlineKeys.has(k));
  }

  showRankingMenu = async function(){
    pauseAutoForChoice();
    const client = getCloudClient && getCloudClient();
    const user = await currentCloudUser();
    if(!client || !user){
      showModal(`<h2>랭킹</h2>
        <p class="muted">게스트 로그인은 서버 랭킹에 등록되지 않습니다. 카카오/네이버 로그인 후 이용하세요.</p>
        ${makeCloseBar()}`, false);
      bindCloseOnly();
      return;
    }

    showModal(`<h2>랭킹</h2><p class="muted">기준: <b>층 → 레벨 → 전투력 → 점수 → 최근 갱신</b></p>`, false);
    try{
      if(typeof syncPublicRankingRowsForCurrentUser === 'function'){
        try{ await syncPublicRankingRowsForCurrentUser(); }catch(e){}
      }
      const records = await collectRankingRecords();
      const onlineKeys = await fetchOnlineKeys88();
      const rows = records.map((r,i)=>{
        const online = rankingRecordOnline88(r, onlineKeys);
        const rowClass = online ? 'rankingOnline' : 'rankingOffline';
        return `<tr class="${rowClass}" data-ranking-online="${online?1:0}">
          <td class="${i<3?'rankTop':''}">${i+1}</td>
          <td>${escapeText(r.nickname)}</td>
          <td>${escapeText(r.className)}</td>
          <td>${Number(r.level || 1)}</td>
          <td>${Number(r.floor || 1)}</td>
          <td>${Number(r.combatPower || 0).toLocaleString()}</td>
          <td>${Number(r.score || 0).toLocaleString()}</td>
        </tr>`;
      }).join('');
      showModal(`<h2>랭킹</h2>
        <p class="muted">기준: <b>층 → 레벨 → 전투력 → 점수 → 최근 갱신</b></p>
        <div class="grid2" style="margin:8px 0 4px">
          <button class="btn smallbtn" id="rankingRefreshBtn">랭킹 새로고침</button>
          <span></span>
        </div>
        <table class="rankingTable">
          <thead><tr><th>순위</th><th>닉네임</th><th>직업</th><th>Lv</th><th>층</th><th>전투력</th><th>점수</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="7" style="text-align:center" class="muted">서버에 등록된 랭킹이 없습니다.</td></tr>'}</tbody>
        </table>
        ${makeCloseBar()}`, false);
      const btn = $('rankingRefreshBtn');
      if(btn){
        btn.onclick = async ()=>{
          btn.disabled = true;
          btn.textContent = '새로고침 중...';
          await showRankingMenu();
        };
      }
      bindCloseOnly();
      try{ wrapRankingTableIfNeeded(); }catch(e){}
    }catch(e){
      showModal(`<h2>랭킹</h2>
        <p class="muted">랭킹은 서버 테이블 기준으로만 표시합니다.</p>
        <p class="muted badtxt">${escapeText(e && e.message ? e.message : String(e))}</p>
        ${makeCloseBar()}`, false);
      bindCloseOnly();
    }
  };
  if($('rankingMenuBtn')) $('rankingMenuBtn').onclick = showRankingMenu;
})();

</script>
</body>
