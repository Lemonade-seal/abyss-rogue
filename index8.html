<style>
  :root{
    --bg:#090b10; --panel:#141925; --panel2:#1c2433; --line:#2f3b52;

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-user-drag:none;touch-action:manipulation;caret-color:transparent}

  .xpfill{background:linear-gradient(90deg,#22c55e,#86efac)}

  .main{flex:1;min-height:0;display:grid;grid-template-columns:minmax(0,1fr) 260px;gap:7px}
  .gameWrap{display:flex;flex-direction:column;min-height:0;gap:6px}
  #gamePanel{position:relative;flex:1;min-height:0;background:#0b0f19;border:1px solid var(--line);border-radius:14px;display:flex;align-items:center;justify-content:center;overflow:hidden;box-shadow:inset 0 0 40px rgba(0,0,0,.5),0 8px 30px rgba(0,0,0,.35)}
  #game{width:min(100%, calc(100dvh - 260px));max-height:100%;aspect-ratio:1/1;image-rendering:pixelated}
  .side{display:flex;flex-direction:column;min-height:0;gap:7px}
  .box{background:rgba(20,25,37,.93);border:1px solid var(--line);border-radius:12px;padding:9px;box-shadow:0 6px 18px rgba(0,0,0,.22)}
  .box h3{margin:0 0 7px;font-size:13px;color:#dbe7ff;display:flex;justify-content:space-between;align-items:center}

  .equip{font-size:12px;color:var(--muted);line-height:1.45;max-height:90px;overflow:auto}
  .relics{display:flex;gap:4px;flex-wrap:wrap;max-height:70px;overflow:auto}

  .actions{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
  .btn{background:linear-gradient(#26334b,#172033);border:1px solid #40506f;border-radius:10px;padding:9px 6px;font-size:12px;font-weight:700;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.35)}

  .btn.bad{border-color:#8a3838;background:linear-gradient(#703238,#35171a)}
  .controls{position:relative;width:160px;height:160px;margin:0;justify-self:start;align-self:start;border-radius:50%;background:radial-gradient(circle at 50% 50%,#1f2937 0 21%,#111827 22% 50%,#080d16 51% 100%);border:2px solid #52627a;box-shadow:inset 0 10px 24px rgba(255,255,255,.05),inset 0 -18px 30px rgba(0,0,0,.55),0 10px 26px rgba(0,0,0,.42);overflow:hidden}
  .controls:before{content:"";position:absolute;inset:13px;border-radius:50%;background:radial-gradient(circle at 50% 50%,rgba(148,163,184,.12) 0 33%,transparent 34% 100%);border:1px solid rgba(148,163,184,.2);box-shadow:inset 0 0 26px rgba(0,0,0,.45)}

  .controls .pad-line{position:absolute;left:50%;top:50%;width:116px;height:2px;background:rgba(148,163,184,.16);transform:translate(-50%,-50%);pointer-events:none}.controls .pad-line.v{width:2px;height:116px}
  .controls button{position:absolute;z-index:4;margin:0;padding:0;border:0;background:transparent;box-shadow:none;color:transparent;font-size:0;cursor:pointer;touch-action:none}

  .controls .down{left:50%;bottom:0;transform:translateX(-50%);width:76px;height:48px;border-radius:12px 12px 42px 42px}
  .controls .left{left:0;top:50%;transform:translateY(-50%);width:48px;height:76px;border-radius:42px 12px 12px 42px}
  .controls .right{right:0;top:50%;transform:translateY(-50%);width:48px;height:76px;border-radius:12px 42px 42px 12px}
  .controls .wait{left:50%;top:50%;width:62px;height:62px;transform:translate(-50%,-50%);border-radius:50%;z-index:5}

  .rightui{display:grid;grid-template-rows:auto auto;gap:7px;min-width:0}
  .skillbar{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
  .menubar{display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
  .menuBtn{min-height:38px;padding:8px 4px;background:linear-gradient(180deg,#202a3b,#0f1725);border:1px solid #3d4c66;border-radius:13px;font-size:12px;font-weight:800;letter-spacing:-.2px;box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 4px 0 rgba(0,0,0,.33),0 8px 18px rgba(0,0,0,.22);cursor:pointer;touch-action:none}

  .skill:before{content:"";position:absolute;left:9px;right:9px;top:6px;height:4px;border-radius:999px;background:rgba(255,255,255,.2);pointer-events:none}.skill:after{content:"";position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,0) 45%);pointer-events:none}
  .skill:active{transform:translateY(2px);box-shadow:inset 0 1px 0 rgba(255,255,255,.08),0 2px 0 rgba(0,0,0,.38),0 7px 14px rgba(0,0,0,.22)}
  .skill b{display:block;font-size:13px;line-height:1.08;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.skill small{display:block;margin-top:5px;color:#aebbd6;font-size:10px;line-height:1.15}.skill .cd{position:absolute;inset:0;background:rgba(5,8,14,.76);display:none;align-items:center;justify-content:center;font-size:20px;font-weight:900;z-index:4}.skill.cool .cd{display:flex}
  #skill1{border-color:#8b5cf6;background:linear-gradient(180deg,#422f75,#17172b)}#skill1:before{background:#a78bfa}#skill2{border-color:#f59e0b;background:linear-gradient(180deg,#684114,#18130b)}#skill2:before{background:#fbbf24}#skill3{border-color:#38bdf8;background:linear-gradient(180deg,#16556b,#111827)}#skill3:before{background:#67e8f9}#potionBtn{border-color:#22c55e;background:linear-gradient(180deg,#14532d,#0b1f18)}#potionBtn:before{background:#6ee7a8}#attackBtn{border-color:#ef4444;background:linear-gradient(180deg,#7f1d1d,#24100f)}#attackBtn:before{background:#fca5a5}#autoBtn.menuBtn.good{border-color:#2f7656;background:linear-gradient(#236146,#173b2e)}#autoBtn.menuBtn.full{border-color:#8a3838;background:linear-gradient(#703238,#35171a)}
  .modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:14px}
  .modal.show{display:flex}
  .card{position:relative;width:min(620px,100%);max-height:92dvh;overflow:auto;background:linear-gradient(180deg,rgba(27,36,54,.80),rgba(16,22,34,.68));border:1px solid rgba(148,163,184,.45);border-radius:18px;padding:16px;box-shadow:0 20px 70px rgba(0,0,0,.55);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px)}

  .modalCloseX{position:absolute;right:10px;top:10px;width:32px;height:32px;border-radius:6px;border:1px solid rgba(148,163,184,.45);background:rgba(11,15,25,.58);color:#dbe7ff;font-size:20px;line-height:1;font-weight:900;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(0,0,0,.35);z-index:3;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}.modalCloseX:active{transform:translateY(1px)}
  .muted{color:var(--muted);font-size:13px;line-height:1.45}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .choice{background:rgba(20,28,43,.56);border:1px solid rgba(122,146,184,.42);border-radius:13px;padding:11px;text-align:left;cursor:pointer;min-height:96px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
  .choice:hover{border-color:rgba(122,162,255,.9)}.choice h4{margin:0 0 6px;font-size:15px}.choice p{margin:0;color:#c8d3ea;font-size:12px;line-height:1.35}.choice .rarity{font-size:11px;margin-top:7px;display:inline-block;padding:2px 6px;border-radius:999px;background:rgba(11,15,25,.45);border:1px solid rgba(122,146,184,.42)}

  .bagItemCard{background:var(--bag-bg,rgba(20,28,43,.52))!important;border-color:var(--bag-line,rgba(122,146,184,.55))!important;color:var(--bag-text,#eef3ff);box-shadow:inset 0 1px 0 rgba(255,255,255,.14),0 8px 18px rgba(0,0,0,.20)}
  .bagItemCard h4{color:var(--bag-text,#eef3ff)}.bagItemCard .muted,.bagItemCard p{color:var(--bag-muted,#d7e2ff)!important}
  .bagGrade0{--bag-bg:rgba(255,255,255,.72);--bag-line:rgba(255,255,255,.95);--bag-text:#111827;--bag-muted:#243244}
  .bagGrade1{--bag-bg:rgba(34,197,94,.58);--bag-line:rgba(134,239,172,.95);--bag-text:#ecfdf5;--bag-muted:#dcfce7}

  .bagGrade3{--bag-bg:rgba(168,85,247,.62);--bag-line:rgba(216,180,254,.95);--bag-text:#faf5ff;--bag-muted:#f3e8ff}
  .bagGrade4{--bag-bg:rgba(250,204,21,.72);--bag-line:rgba(253,224,71,.98);--bag-text:#1f2937;--bag-muted:#374151}
  .skillChoice{position:relative;padding-bottom:46px}.skillEnhanceBtn{position:absolute;left:10px;bottom:10px;min-width:68px;padding:6px 9px;font-size:12px;border-radius:9px}
  .rare{color:var(--rare)}.epic{color:var(--epic)}.legend{color:var(--legend)}.goodtxt{color:var(--good)}.badtxt{color:var(--bad)}.warntxt{color:var(--warn)}
  .metaRow{display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center;border-top:1px solid #2d3850;padding-top:8px;margin-top:8px}.metaRow p{margin:2px 0 0;color:#aebbd6;font-size:12px}.metaRow h4{margin:0;font-size:14px}.smallbtn{padding:6px 8px;font-size:12px;border-radius:8px}
  .toast{position:absolute;top:8px;left:10px;right:10px;transform:none;z-index:12;background:rgba(16,24,39,.58);border:1px solid rgba(82,100,130,.72);border-radius:10px;padding:7px 10px;box-shadow:0 6px 18px rgba(0,0,0,.28);display:none;font-size:12px;text-align:center;backdrop-filter:blur(5px);pointer-events:none}

  .mapCell{width:7px;height:7px;background:#030712;border-radius:1px}.mapCell.wall{background:#1f2937}.mapCell.floor{background:#475569}.mapCell.player{background:#60a5fa}.mapCell.enemy{background:#ef4444}.mapCell.item{background:#22c55e}.mapCell.merchant{background:#c084fc}.mapCell.exit{background:#facc15}.mapLegend{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;color:#aebbd6;font-size:12px}.mapLegend span{display:inline-flex;align-items:center;gap:4px}.mapDot{width:9px;height:9px;border-radius:2px;display:inline-block}

  ctx.drawImage(img, x+(w-dw)/2, y+(h-dh)/2, dw, dh);
  return true;
}

  try{

      url: String(cfg.url || DEFAULT_SUPABASE_URL || '').trim(),

    };

function saveCloudConfig(cfg){
  cloudConfig = {url:String(cfg.url||'').trim(), key:String(cfg.key||'').trim()};
  if(cloudConfig.url && cloudConfig.key) localStorage.setItem(CLOUD_CONFIG_KEY, JSON.stringify(cloudConfig));
  else localStorage.removeItem(CLOUD_CONFIG_KEY);
  cloudClient = null;
  cloudClientSignature = '';

function cloudConfigured(){ return !!(cloudConfig.url && cloudConfig.key); }

function getCloudClient(){
  if(!cloudConfigured() || !window.supabase || !window.supabase.createClient) return null;
  const sig = cloudConfig.url + '|' + cloudConfig.key;
  if(!cloudClient || cloudClientSignature !== sig){
    cloudClient = window.supabase.createClient(cloudConfig.url, cloudConfig.key, {
      auth:{persistSession:true, autoRefreshToken:true, detectSessionInUrl:true}
    });
    cloudClientSignature = sig;
  }
  return cloudClient;
}
async function currentCloudUser(){
  const client = getCloudClient();
  if(!client) return null;
  const {data} = await client.auth.getUser();
  return data && data.user ? data.user : null;
}
async function ensureCloudUser(opts={}){
  const client = getCloudClient();
  if(!client) throw new Error('Supabase 설정이 필요하다.');
  let user = await currentCloudUser();
  if(user) return user;
  if(opts.anonymous){
    const {data,error} = await client.auth.signInAnonymously();
    if(error) throw error;
    return data.user;
  }
  return null;
}

    save_data:saveData || {},
    meta_data:meta || {},
    updated_at:new Date().toISOString()
  });

async function loadCloud(){
  if(!cloudConfigured()) return false;

  if(!client) return false;

  if(data.meta_data){
    meta = normalizeMeta(data.meta_data || {});

function normalizeEquipSlots(equip, clsId='warrior'){
  const src = equip || {};
  const next = {};
  Object.keys(src).forEach(slot=>{
    const mapped = LEGACY_SLOT_MAP[slot] || slot;
    if(!EQUIP_SLOTS.includes(mapped)) return;
    const it = Object.assign({}, src[slot]||{});
    it.slot = mapped;
    if(!it.job) it.job = clsId;
    if(!it.jobName) it.jobName = (classes[clsId]||classes.warrior).name;
    if(!next[mapped] || itemScore(it) > itemScore(next[mapped])) next[mapped] = it;
  });
  EQUIP_SLOTS.forEach(slot=>{ if(!next[slot]) next[slot] = starterEquip(slot, clsId); });
  return next;
}

}

function chooseFloorMod(floor){
  if(floor<=1) return deepClone(FLOOR_MODS[0]);
  if(floor%10===0) return deepClone(one(FLOOR_MODS.filter(m=>m.id==='curse'||m.id==='blood'||m.id==='hunt')));
  return deepClone(chance(.55) ? FLOOR_MODS[0] : one(FLOOR_MODS.slice(1)));
}

function maybeStartBounty(){
  if(!S || S.bounty || S.player.floor<2 || !chance(.45)) return;
  const b=deepClone(one(BOUNTY_POOL)); b.count=0; b.floor=S.player.floor;
  S.bounty=b;
  addLog(`<span class="rare">현상금</span>: ${b.name} - ${b.desc}`);
}
function updateBounty(e){
  if(!S || !S.bounty) return;
  const b=S.bounty;
  const ok = b.type==='any' || (b.type==='elite'&&e.elite) || (b.type==='ranged'&&e.ranged) || (b.type==='highTier'&&(e.tier||0)>=Math.ceil(S.player.floor/2));
  if(!ok) return;
  b.count++;
  if(b.count>=b.need){
    recordInventory('bounty', b.name, 1, b.desc||'현상금 완료', {bounty:{name:b.name, desc:b.desc, need:b.need, type:b.type, reward:b.reward}});
    addLog(`<span class="legend">현상금 완료</span>: ${b.name}`);
    if(b.reward==='gold') S.player.gold += 140 + S.player.floor*18;
    if(b.reward==='soul') S.player.soulsRun += 3 + Math.floor(S.player.floor/4);
    if(b.reward==='relic') placeItem('relic',{});
    if(b.reward==='skillgem') placeItem('skillgem',{});
    if(b.reward==='chest') placeItem('chest',{});
    S.bounty=null;
  }
}
function grantRandomSkillLevel(source='기술 파편'){
  ensureRunFields();
  const keys=['smash','dash','heal'];
  const candidates=keys.filter(k=>S.player.skillEnhance[k]<20);
  if(!candidates.length){ S.player.gold+=250; addLog(`${source}: 모든 스킬이 최대라 250G 획득.`); return; }
  const k=one(candidates); S.player.skillEnhance[k]++;
  recordInventory('skillgem', source, 1, `${skillNameByKey(k)} +${S.player.skillEnhance[k]}`, {skill:k, skillName:skillNameByKey(k), level:S.player.skillEnhance[k], desc:skillEnhanceDesc(k)});
  addLog(`<span class="rare">${source}</span>: ${skillNameByKey(k)} +${S.player.skillEnhance[k]} 강화.`);
}

function revealWide(radius=12){
  const p=S.player;
  for(let y=p.y-radius;y<=p.y+radius;y++) for(let x=p.x-radius;x<=p.x+radius;x++) if(inMap(x,y)&&Math.hypot(x-p.x,y-p.y)<=radius) S.seen[y][x]=true;
}
function floorModRewardMult(kind){
  const m=S?.floorMod; if(!m) return 1;
  if(kind==='gold') return m.gold||1;
  if(kind==='xp') return m.xp||1;
  return 1;
}

function generateFloor(floor, first=false){
  const p = S.player;
  p.floor = floor;
  S.map = Array.from({length:MAPH},()=>Array(MAPW).fill('#'));
  S.seen = Array.from({length:MAPH},()=>Array(MAPW).fill(false));
  S.rooms = []; S.enemies = []; S.items = []; S.merchants = []; S.fx = []; S.bounty = null; S.floorMod = chooseFloorMod(floor);
  const roomCount = clamp(9 + Math.floor(floor/2), 9, 18);
  for(let i=0;i<roomCount*8 && S.rooms.length<roomCount;i++){
    const w = 5 + rand(7), h = 5 + rand(7);
    const x = 2 + rand(MAPW-w-4), y = 2 + rand(MAPH-h-4);
    const room = {x,y,w,h,cx:Math.floor(x+w/2),cy:Math.floor(y+h/2)};
    if(S.rooms.some(r=> x<r.x+r.w+2 && x+w+2>r.x && y<r.y+r.h+2 && y+h+2>r.y)) continue;
    carveRoom(room); S.rooms.push(room);
  }
  for(let i=1;i<S.rooms.length;i++) connectRooms(S.rooms[i-1], S.rooms[i]);
  const start = S.rooms[0]; const end = S.rooms[S.rooms.length-1];
  p.x = start.cx; p.y = start.cy;
  S.exit = {x:end.cx,y:end.cy};
  S.map[S.exit.y][S.exit.x] = '>';
  spawnContent(floor);
  maybeStartBounty();
  reveal();
  if(!first){
    p.hp = clamp(p.hp + Math.ceil(calcStats().maxHp*.10), 1, calcStats().maxHp);
    p.mp = clamp(p.mp + 3, 0, calcStats().maxMp);
    Object.keys(p.cd).forEach(k=>p.cd[k]=Math.max(0,p.cd[k]-(hasRelic('clock')?2:1)));
    addLog(`<span class="warntxt">${floor}층</span>으로 내려왔다. ${S.floorMod.name}: ${S.floorMod.desc}`);
  }
}
function carveRoom(r){
  for(let y=r.y;y<r.y+r.h;y++) for(let x=r.x;x<r.x+r.w;x++) S.map[y][x]='.';
}
function carveLine(x1,y1,x2,y2){
  let x=x1,y=y1;
  while(x!==x2){S.map[y][x]='.'; x += x<x2?1:-1;}
  while(y!==y2){S.map[y][x]='.'; y += y<y2?1:-1;}
  S.map[y][x]='.';
}
function connectRooms(a,b){
  if(chance(.5)){carveLine(a.cx,a.cy,b.cx,a.cy); carveLine(b.cx,a.cy,b.cx,b.cy);} else {carveLine(a.cx,a.cy,a.cx,b.cy); carveLine(a.cx,b.cy,b.cx,b.cy);}
}

function spawnContent(floor){
  const rooms = S.rooms.slice(1);
  let enemyCount = clamp(12 + Math.floor(floor*2.8), 14, 72);
  for(let i=0;i<enemyCount;i++){
    const r = one(rooms); const pos = randomFloorInRoom(r);
    if(blocked(pos.x,pos.y)) continue;
    S.enemies.push(makeEnemy(pos.x,pos.y,floor, false));
  }
  if(floor%5===0){
    const r = S.rooms[S.rooms.length-1];
    const pos = freeNear(r.cx,r.cy) || {x:r.cx,y:r.cy};
    S.enemies.push(makeEnemy(pos.x,pos.y,floor,true));
    addLog(`<span class="badtxt">보스 기척</span>이 이 층을 누르고 있다.`);
  }
  const goldCount = 6 + rand(4) + Math.floor(floor/3);
  for(let i=0;i<goldCount;i++) placeItem('gold', {amount: Math.floor((6+rand(12)+floor*2) * goldRate())});
  for(let i=0;i<1+rand(2);i++) placeItem('potion', {});
  for(let i=0;i<2+Math.floor(floor/5);i++) placeItem('chest', {});
  if(chance(.52) || floor%4===0) placeItem('relic', {});
  if(chance(.18)) placeItem('shrine', {});
  if(chance(.16)) placeItem('merchant', {});
  if(chance(.20) || S.floorMod?.id==='treasure') placeItem('camp', {});
  if(chance(.15) || S.floorMod?.id==='treasure') placeItem('vault', {});
  if(chance(.13)) placeItem('oracle', {});
  if(chance(.18)) placeItem('skillgem', {});
  if(chance(.22) || S.floorMod?.id==='curse') placeItem('soul', {amount:1+Math.floor(floor/6)});
  if(S.floorMod?.extraGold) for(let i=0;i<S.floorMod.extraGold;i++) placeItem('gold',{amount:Math.floor((12+rand(22)+floor*3)*goldRate())});
  if(S.floorMod?.extraChest) for(let i=0;i<S.floorMod.extraChest;i++) placeItem('chest',{});
  if(S.floorMod?.extraRelic && chance(S.floorMod.extraRelic)) placeItem('relic',{});
}
function randomFloorInRoom(r){return {x:r.x+1+rand(Math.max(1,r.w-2)), y:r.y+1+rand(Math.max(1,r.h-2))};}
function freeNear(x,y){
  for(let rad=0;rad<5;rad++){
    for(let yy=y-rad;yy<=y+rad;yy++) for(let xx=x-rad;xx<=x+rad;xx++){
      if(inMap(xx,yy) && S.map[yy][xx]!== '#' && !blocked(xx,yy)) return {x:xx,y:yy};
    }
  }
  return null;
}
function placeItem(type, data){
  for(let tries=0;tries<120;tries++){
    const r = one(S.rooms.slice(1)); const pos = randomFloorInRoom(r);
    if(pos.x===S.exit.x && pos.y===S.exit.y) continue;
    if(blocked(pos.x,pos.y) || S.items.some(i=>i.x===pos.x&&i.y===pos.y)) continue;
    S.items.push(Object.assign({x:pos.x,y:pos.y,type},data)); return;
  }
}

function makeEnemy(x,y,floor,boss){
  let t;
  if(boss){
    const idx = (Math.max(1, Math.floor(floor/5)) - 1) % BOSS_POOL.length;
    t = deepClone(BOSS_POOL[idx]);
  } else {
    const tier = clamp(Math.ceil(floor/2),1,18);
    const candidates = MONSTER_POOL.filter(m=>m.tier>=Math.max(1,tier-2) && m.tier<=Math.min(18,tier+1));
    t = deepClone(one(candidates.length ? candidates : MONSTER_POOL));
  }
  const scale = t.boss ? (1 + floor*0.08) : (1 + floor*0.06);
  const mod=S?.floorMod||{};
  const e = {
    x,y,
    id:t.id,
    name:t.name,
    sprite:t.sprite,
    maxHp:Math.floor(t.hp*scale*1.05*(mod.enemyHp||1)),
    hp:Math.floor(t.hp*scale*1.05*(mod.enemyHp||1)),
    atk:Math.floor(t.atk*scale*1.08*(mod.enemyAtk||1)),
    def:Math.floor(t.def + floor/5 + (mod.enemyDef||0)),
    xp:Math.floor(t.xp*scale*(mod.xp||1)),
    gold:Math.floor(t.gold*scale*(mod.gold||1)),
    fast:!!t.fast,
    ranged:!!t.ranged,
    boss:!!t.boss,
    burn:0,
    tier:t.tier
  };
  if(t.boss){
    e.maxHp = Math.floor(e.maxHp*1.18); e.hp=e.maxHp; e.atk=Math.floor(e.atk*1.14); e.def+=3; e.xp=Math.floor(e.xp*1.35); e.gold=Math.floor(e.gold*1.45);
  } else if(chance(.15 + floor*.006 + (mod.eliteBonus||0))){
    e.name = '정예 ' + e.name; e.sprite='elite_' + e.sprite; e.maxHp=Math.floor(e.maxHp*2.05); e.hp=e.maxHp; e.atk=Math.floor(e.atk*1.5); e.def+=3; e.xp*=2; e.gold*=3; e.elite=true;
  }
  if(S) S.discovered = Object.assign(S.discovered||{}, {[t.id]:true});
  return e;
}

function inMap(x,y){return x>=0&&y>=0&&x<MAPW&&y<MAPH;}
function enemyAt(x,y){return S.enemies.find(e=>e.hp>0&&e.x===x&&e.y===y);}
function itemAt(x,y){return S.items.find(i=>i.x===x&&i.y===y);}
function blocked(x,y){return !inMap(x,y) || S.map[y][x]==='#' || enemyAt(x,y) || (S.player && S.player.x===x&&S.player.y===y);}
function passable(x,y){return inMap(x,y) && S.map[y][x] !== '#';}

function calcStats(){
  const p = S.player;
  let st = {maxHp:p.maxHpBase, maxMp:p.maxMpBase, atk:p.baseAtk, def:p.baseDef, crit:p.crit, eva:p.eva, taken:0, flatReduce:0, goldRate:0, xpRate:0, potionPower:0, potionCap:0, dashCd:0};
  Object.values(p.equip).forEach(it=>{
    if(!it) return; ['maxHp','maxMp','atk','def','crit','eva'].forEach(k=>st[k]=(st[k]||0)+(it[k]||0));
  });
  p.relics.forEach(r=>{ if(r.stats){Object.entries(r.stats).forEach(([k,v])=>st[k]=(st[k]||0)+v);} });
  st.xpRate += meta.upgrades.xp*.04;
  st.goldRate += meta.upgrades.gold*.05;
  if(p.classId==='hunter') st.goldRate += .15;
  if(p.effects){
    if(p.effects.guard>0) st.def += 2;
    if(p.effects.fury>0) st.atk += 3;
    if(p.effects.smoke>0) st.eva += 25;
    if(p.effects.shadow>0) st.eva += 8;
    if(p.effects.focus>0) st.crit += 8;
  }
  st.maxHp = Math.max(1, Math.floor(st.maxHp)); st.maxMp = Math.max(1, Math.floor(st.maxMp));
  st.crit = clamp(st.crit,0,75); st.eva = clamp(st.eva,0,65);
  return st;
}
function goldRate(){return 1 + calcStats().goldRate;}
function xpRate(){return 1 + calcStats().xpRate;}
function hasRelic(id){return S.player.relics.some(r=>r.id===id);}

function addLog(msg){
  if(!S) return;
  if(S.logOrder !== 'oldestFirst'){
    S.log = Array.isArray(S.log) ? S.log.reverse() : [];
    S.logOrder = 'oldestFirst';
  }
  S.log.push(`<p>${msg}</p>`);
  S.log = S.log.slice(-80);
}
function toast(msg){
  toastEl.innerHTML = msg; toastEl.classList.remove('show'); void toastEl.offsetWidth; toastEl.classList.add('show');
}

function currentLogHtml(){
  if(!S) return '';
  const logs = Array.isArray(S.log) ? S.log.join('') : '';
  return S.player && S.player.awaitAim ? logs + '<p class="rare">기술 방향을 선택.</p>' : logs;
}
function scrollLogChatToBottom(){
  const sideLog = $('logBox');
  if(sideLog) sideLog.scrollTop = sideLog.scrollHeight;
  const mapBox = $('mapLogBox');
  if(mapBox && mapPanelMode==='log') mapBox.scrollTop = mapBox.scrollHeight;
  const chatMsgs = document.querySelector('.mapChatMessages');
  if(chatMsgs) chatMsgs.scrollTop = chatMsgs.scrollHeight;
}
function updateLogChatButton(){
  const b=$('logChatBtn'); if(!b) return;
  const title=b.querySelector('b');
  b.classList.toggle('chat', mapPanelMode==='chat');
  b.classList.toggle('off', mapPanelMode==='off');
  if(title) title.textContent = mapPanelMode==='chat' ? '채팅' : '로그';
}
function setMapPanelMode(mode){
  mapPanelMode = ['log','chat','off'].includes(mode) ? mode : 'log';
  if(S) S.mapPanelMode = mapPanelMode;
  renderMapPanel();
  updateLogChatButton();
  saveRun();
}
function toggleLogChatPanel(){
  if(mapPanelMode==='log') setMapPanelMode('chat');
  else if(mapPanelMode==='chat') setMapPanelMode('off');
  else setMapPanelMode('log');
}
function chatNickname(){
  if(!S || !S.player) return '나';
  return S.player.nickname || S.player.nick || S.player.name || '나';
}
function chatLineHtml(m){
  const lv = Number(m.level || m.lv || S?.player?.level || 1);
  const nick = m.sender || m.nickname || chatNickname();
  const floor = Number(m.floor || S?.player?.floor || 1);
  return `<p class="mapChatLine"><span class="mapChatMeta">Lv.${lv}</span> <span class="mapChatNick">${escHtml(nick)}</span><span class="mapChatMeta">&lt;${floor}층&gt;</span><span class="mapChatMeta"> : </span><span class="mapChatText">${escHtml(m.text||'')}</span></p>`;
}
function renderMapPanel(logHtmlOverride, forceChatRender=false){
  const panel=$('mapLogPanel'), titleEl=document.querySelector('#mapLogPanel .mapLogTitle'), box=$('mapLogBox');
  if(!panel || !titleEl || !box) return;
  const mode = ['log','chat','off'].includes(mapPanelMode) ? mapPanelMode : 'log';
  panel.classList.toggle('chat', mode==='chat');
  panel.classList.toggle('off', mode==='off');
  updateLogChatButton();
  if(mode==='off') return;
  if(mode==='chat'){
    ensureRunFields();
    titleEl.textContent = '채팅';
    const activeInput = document.activeElement && document.activeElement.id==='mapChatInput' ? document.activeElement : null;
    if(activeInput && !forceChatRender){
      // 오토 진행 중 renderAll이 반복 호출되어도 채팅 입력 DOM을 갈아엎지 않는다.
      // 입력 포커스와 작성 중인 문장이 유지되어 오토 중에도 채팅을 칠 수 있다.
      return;
    }
    const activeDraft = activeInput ? activeInput.value : '';
    const msgs = (S.chat||[]).slice(-50).map(chatLineHtml).join('');
    box.innerHTML = `${msgs ? `<div class="mapChatMessages">${msgs}</div>` : '<div class="mapChatEmpty">채팅 내역 없음</div>'}<div class="mapChatInputRow"><input id="mapChatInput" type="text" maxlength="60" placeholder="채팅 입력" value="${escHtml(activeDraft)}"><button id="mapChatSend" type="button">전송</button></div>`;
    bindMapChatInput();
    scrollLogChatToBottom();
    return;
  }
  titleEl.textContent = '로그';
  box.innerHTML = logHtmlOverride ?? currentLogHtml();
  scrollLogChatToBottom();
}
function bindMapChatInput(){
  const input=$('mapChatInput'), send=$('mapChatSend');
  if(!input || !send) return;
  const stop=e=>e.stopPropagation();
  input.onpointerdown=stop; input.onclick=stop; input.oninput=stop; input.onkeyup=stop; input.onkeypress=stop;
  input.onfocus=stop; input.onblur=stop;
  input.onkeydown=e=>{
    e.stopPropagation();
    if(e.key==='Enter'){ e.preventDefault(); sendMapChatMessage(); }
  };
  send.onpointerdown=e=>e.stopPropagation();
  send.onclick=e=>{ e.stopPropagation(); sendMapChatMessage(); };
}
function sendMapChatMessage(){
  if(!S) return;
  ensureRunFields();
  const input=$('mapChatInput');
  const text=(input?.value||'').trim();
  if(!text) return;
  if(S.chatOrder !== 'oldestFirst'){
    S.chat = Array.isArray(S.chat) ? S.chat.reverse() : [];
    S.chatOrder = 'oldestFirst';
  }
  S.chat.push({sender:chatNickname(), level:S.player.level, text, floor:S.player.floor, turn:S.player.turn});
  S.chat = S.chat.slice(-50);
  if(input) input.value='';
  renderMapPanel(null, true);
  if(autoMode==='safe' || autoMode==='full'){ setTimeout(()=>{ const next=$('mapChatInput'); if(next) next.focus(); }, 0); }
  saveRun();
}

function reveal(){
  const p = S.player;
  const radius = clamp(7 + (S.floorMod?.vision||0), 4, 10);
  for(let y=p.y-radius;y<=p.y+radius;y++) for(let x=p.x-radius;x<=p.x+radius;x++){
    if(inMap(x,y) && Math.hypot(x-p.x,y-p.y)<=radius+.3) S.seen[y][x]=true;
  }
}

function playerMove(dx,dy){
  if(!canAct()) return;
  const p=S.player; const nx=p.x+dx, ny=p.y+dy;
  const e=enemyAt(nx,ny);
  if(e){ toast('적이 가로막고 있다. 공격 버튼을 눌러 공격.'); renderAll(); return; }
  if(!passable(nx,ny)){addLog('벽에 막혔다.'); renderAll(); return;}
  p.x=nx; p.y=ny;
  if(S.map[ny][nx]==='>'){
    if(S.enemies.some(e=>e.hp>0&&e.boss)) { addLog('층지배자를 처치해야 내려갈 수 있다.'); }
    else nextFloor();
  } else {
    pickupCheck();
  }
  afterPlayerAction();
}
function waitTurn(){ if(!canAct()) return; addLog('숨을 고른다.'); regenTick(true); afterPlayerAction(true); }
function afterPlayerAction(wait=false){
  const p=S.player;
  p.turn++;
  Object.keys(p.cd).forEach(k=>p.cd[k]=Math.max(0,p.cd[k]-1));
  if(!wait) regenTick(false);
  enemyTurn();
  cleanup();
  tickEffects();
  reveal();
  checkLevelUp();
  renderAll();
  saveRun();
}
function regenTick(wait){
  const p=S.player; const st=calcStats();
  const mpGain = wait ? p.mpRegen : Math.max(0,p.mpRegen-1);
  p.mp = clamp(p.mp + mpGain, 0, st.maxMp);
  if(wait && chance(.45)) p.hp = clamp(p.hp+1, 1, st.maxHp);
}
function canAct(){return S && !S.dead && !modalOpen;}

let resumeAutoMode = null;
let startMenuResumeClassId = null;
function pauseAutoForChoice(){
  resumeAutoMode = (autoMode==='safe'||autoMode==='full') ? autoMode : null;
  if(autoTimer){ clearInterval(autoTimer); autoTimer=null; }
  updateAutoButton();
}
function activeAutoMode(){
  return (autoMode==='safe'||autoMode==='full') ? autoMode : null;
}
function restartAutoTimer(mode){
  if(!mode || !S || S.dead) return;
  autoMode = mode;
  if(autoTimer) clearInterval(autoTimer);
  autoTimer = setInterval(mode==='full' ? autoFullExplore : autoExplore, AUTO_INTERVAL_MS);
  updateAutoButton();
}
function resumeAutoAfterChoice(){
  const mode = resumeAutoMode || activeAutoMode();
  resumeAutoMode = null;
  restartAutoTimer(mode);
}
function resumeAutoIfPaused(){
  if(modalOpen || autoTimer || !S || S.dead) return;
  const mode = resumeAutoMode || activeAutoMode();
  if(mode) restartAutoTimer(mode);
}

function tickEffects(){
  const ef=S.player.effects||{};
  Object.keys(ef).forEach(k=>{ if(ef[k]>0) ef[k]--; });
}

function isPlainBasicAttack(strong, opts={}){
  if(strong) return false;
  if(opts.basicRanged) return true;
  return Object.keys(opts||{}).every(k=>!opts[k]);
}
function addBasicAttackFx(e, strong, opts={}){
  if(!e || !S || !S.player || !isPlainBasicAttack(strong, opts)) return;
  const p=S.player;
  if(p.classId==='warrior' || p.classId==='rogue'){
    const color = p.classId==='rogue' ? '#c084fc' : '#dbeafe';
    const spark = p.classId==='rogue' ? '#f0abfc' : '#93c5fd';
    addFx({kind:'stab', x1:p.x, y1:p.y, x2:e.x, y2:e.y, color, spark, dur:170});
    addFx({kind:'slash', x:e.x, y:e.y, color, dur:210, angle:Math.atan2(e.y-p.y, e.x-p.x)});
    return;
  }
  if(p.classId==='mage'){
    addFx({kind:'projectile', shape:'magicOrb', x1:p.x, y1:p.y, x2:e.x, y2:e.y, color:'#8b5cf6', spark:'#e9d5ff', core:'#f5d0fe', dur:340});
    return;
  }
  if(p.classId==='hunter'){
    addFx({kind:'projectile', shape:'arrow', x1:p.x, y1:p.y, x2:e.x, y2:e.y, color:'#bef264', spark:'#ecfccb', dur:180});
  }
}
function playerAttack(e, strong, opts={}){
  const p=S.player; const st=calcStats();
  addBasicAttackFx(e, strong, opts);
  let base = st.atk + rand(4) + (opts.bonusBase||0);
  if(strong) base = Math.floor(base*1.85 + 3);
  if(hasRelic('huntermark') && e.hp <= e.maxHp*.4) base = Math.floor(base*1.35);
  if(p.classId==='rogue' && p.effects?.shadow>0){ base = Math.floor(base*1.35 + 2); opts.critBonus = (opts.critBonus||0) + 20; p.effects.shadow=0; addLog('그림자 기습이 발동했다.'); }
  if(p.classId==='hunter' && p.effects?.focus>0 && opts.ranged){ base = Math.floor(base*1.3 + 2); p.effects.focus=0; addLog('집중 사격이 강화되었다.'); }
  let critChance = st.crit + (p.classId==='rogue' && p.turn<6 ? 15 : 0) + (opts.critBonus||0);
  let crit = opts.forceCrit || chance(critChance/100);
  let effectiveDef = Math.max(0, e.def*(opts.ignoreDef!=null ? (1-opts.ignoreDef) : .65));
  let dmg = Math.max(1, Math.floor(base - effectiveDef));
  if(crit) dmg = Math.floor(dmg * (opts.critMult || p.critDmg || 1.8));
  if(strong && p.classId==='warrior') dmg = Math.floor(dmg*1.25);
  if(opts.mult) dmg = Math.floor(dmg*opts.mult);
  e.hp -= dmg;
  addLog(`${crit?'<span class="warntxt">치명!</span> ':''}${e.name}에게 <b>${dmg}</b> 피해.`);
  const burnTurns = opts.burnTurns || ((crit && hasRelic('ember')) ? 2 : 0);
  if(burnTurns){ e.burn = Math.max(e.burn||0, burnTurns); addLog(`${e.name}에게 화상이 붙었다.`); }
  if(hasRelic('storm') && chance(.18)) chainDamage(e, Math.max(2,Math.floor(dmg*.45)));
  if(p.hitHeal && chance(p.hitHeal)){ p.hp=clamp(p.hp+2,1,st.maxHp); addLog('흡혈 훈련으로 HP 2 회복.'); }
  if(e.hp<=0) killEnemy(e);
  return dmg;
}
function chainDamage(origin, dmg){
  const victims = S.enemies.filter(e=>e.hp>0 && e!==origin && Math.abs(e.x-origin.x)+Math.abs(e.y-origin.y)<=3).slice(0,3);
  victims.forEach(v=>{v.hp-=dmg; addLog(`폭풍이 ${v.name}에게 ${dmg} 연쇄 피해.`); if(v.hp<=0) killEnemy(v);});
}
function killEnemy(e){
  if(e.dead) return; e.dead=true; e.hp=0;
  const p=S.player; p.kills++; meta.totalKills++; saveMeta();
  const xp = Math.floor(e.xp*xpRate()*floorModRewardMult('xp')); const gold = Math.floor(e.gold*goldRate()*floorModRewardMult('gold'));
  p.xp += xp; p.gold += gold;
  p.soulsRun += e.boss ? 4 + Math.floor(p.floor/2) : (e.elite ? 1 : 0);
  addLog(`<span class="goodtxt">${e.name} 처치</span> +${xp}XP +${gold}G${e.boss?' +영혼':''}`);
  if(hasRelic('bloodfang')){ const heal=Math.ceil(calcStats().maxHp*.08); p.hp=clamp(p.hp+heal,1,calcStats().maxHp); addLog(`피의 송곳니로 HP ${heal} 회복.`); }
  updateBounty(e);
  if(chance(e.boss?.8:.08)) S.items.push({x:e.x,y:e.y,type:'chest'});
  if(chance(.12)) S.items.push({x:e.x,y:e.y,type:'potion'});
  if(chance(.035)) S.items.push({x:e.x,y:e.y,type:'skillgem'});
  if(chance(.045)) S.items.push({x:e.x,y:e.y,type:'soul',amount:1});
}

function enemyTurn(){
  const p=S.player; const st=calcStats();
  for(const e of S.enemies){
    if(e.hp<=0) continue;
    if(e.burn){ e.burn--; const bd=3+Math.floor(p.floor/3); e.hp-=bd; addLog(`${e.name} 화상 ${bd} 피해.`); if(e.hp<=0){killEnemy(e); continue;} }
    const acts = e.fast && chance(.55) ? 2 : 1;
    for(let a=0;a<acts;a++){
      if(e.hp<=0 || S.dead) break;
      const d=dist(e,p);
      if(d===1 || (e.ranged && d<=5 && clearLine(e.x,e.y,p.x,p.y))){ enemyAttack(e, st); }
      else if(d<=12){ moveEnemyToward(e,p.x,p.y); }
      else if(chance(.16)){ const [dx,dy]=one(DIRS); if(passable(e.x+dx,e.y+dy)&&!enemyAt(e.x+dx,e.y+dy)&&(p.x!==e.x+dx||p.y!==e.y+dy)){e.x+=dx;e.y+=dy;} }
    }
  }
}
function enemyAttack(e, st){
  const p=S.player;
  if(chance(st.eva/100)){ addLog(`${e.name}의 공격을 회피.`); return; }
  let dmg = Math.max(1, Math.floor(e.atk - st.def*.55 + rand(4) + Math.floor(S.player.floor/6) + st.taken - st.flatReduce));
  p.hp -= dmg;
  addLog(`<span class="badtxt">${e.name}</span>에게 ${dmg} 피해를 받음.`);
  if(hasRelic('thorn')){ const rd=Math.max(1,Math.floor(dmg*.35)); e.hp-=rd; addLog(`가시 반사 ${rd} 피해.`); if(e.hp<=0) killEnemy(e); }
  if(p.hp<=0) gameOver(false);
}
function clearLine(x1,y1,x2,y2){
  if(x1!==x2 && y1!==y2) return false;
  const dx=Math.sign(x2-x1), dy=Math.sign(y2-y1); let x=x1+dx,y=y1+dy;
  while(x!==x2 || y!==y2){ if(S.map[y][x]==='#') return false; x+=dx; y+=dy; }
  return true;
}
function moveEnemyToward(e,tx,ty){
  const opts = DIRS.map(([dx,dy])=>({dx,dy,d:Math.abs(e.x+dx-tx)+Math.abs(e.y+dy-ty)})).sort((a,b)=>a.d-b.d);
  for(const o of opts){
    const nx=e.x+o.dx, ny=e.y+o.dy;
    if(passable(nx,ny) && !enemyAt(nx,ny) && !(S.player.x===nx&&S.player.y===ny)){ e.x=nx;e.y=ny; return; }
  }
}
function cleanup(){S.enemies=S.enemies.filter(e=>e.hp>0);}

function pickupCheck(){
  const p=S.player;
  const it = itemAt(p.x,p.y);
  if(!it) return;
  S.items = S.items.filter(x=>x!==it);
  if(it.type==='gold'){ p.gold += it.amount; recordInventory('gold','골드',it.amount,`${it.amount}G`, {source:'dungeon', amount:it.amount}); addLog(`골드 ${it.amount} 획득.`); }
  if(it.type==='potion'){
    const cap = 5 + (calcStats().potionCap||0);
    if(p.potions>=cap){ p.gold += 8; recordInventory('gold','물약 전환 골드',8,'물약 한도 초과', {source:'potion_over_cap', amount:8}); addLog('물약 보유 한도 초과. 8골드로 전환.'); }
    else { p.potions++; recordInventory('potion','물약',1,'던전 습득', {source:'dungeon'}); addLog(`물약 획득. (${p.potions}/${cap})`); }
  }
  if(it.type==='chest'){ p.opened++; recordInventory('chest','장비 상자',1,'개봉', {reward:'equipment_choice', choices:3}); showEquipmentChoice(); }
  if(it.type==='relic'){ recordInventory('relic','유물 선택권',1,'발견', {reward:'relic_choice', choices:3}); showRelicChoice(); }
  if(it.type==='shrine'){ recordInventory('shrine','심연 제단',1,'이용', {choices:['피의 계약','금화의 제단','정화']}); showShrineChoice(); }
  if(it.type==='merchant'){ recordInventory('merchant','떠돌이 상인',1,'조우', {service:'shop'}); showMerchant(); }
  if(it.type==='skillgem'){ recordInventory('skillgem','기술 파편',1,'스킬 강화 재료', {effect:'random_skill_level'}); grantRandomSkillLevel('기술 파편'); }
  if(it.type==='soul'){ const a=it.amount||1; p.soulsRun+=a; recordInventory('soul','영혼 조각',a,'원정 영혼', {amount:a}); addLog(`영혼 조각 ${a}개 획득.`); }
  if(it.type==='camp'){ recordInventory('camp','야영지',1,'이용', {choices:['휴식','정비','명상']}); showCampChoice(); }
  if(it.type==='vault'){ recordInventory('vault','비밀 금고',1,'개방', {choices:['무기고','금고','봉인 유물']}); showVaultChoice(); }
  if(it.type==='oracle'){ recordInventory('oracle','예언자의 석판',1,'예지 선택', {choices:['전투 예지','생존 예지','탐험 예지']}); showOracleChoice(); }
}

function nextFloor(){
  const p=S.player;
  p.soulsRun += 1 + Math.floor(p.floor/4);
  meta.bestFloor = Math.max(meta.bestFloor, p.floor+1); meta.bestLevel=Math.max(meta.bestLevel,p.level); saveMeta();
  generateFloor(p.floor+1, false);
  reveal(); renderAll(); saveRun();
}

function checkLevelUp(){
  const p=S.player;
  const st=calcStats();
  if(p.hp>st.maxHp) p.hp=st.maxHp;
  if(p.mp>st.maxMp) p.mp=st.maxMp;
  if(p.xp >= p.nextXp && !modalOpen){
    p.xp -= p.nextXp; p.level++; p.nextXp = Math.floor(p.nextXp*1.28 + 14);
    p.hp=st.maxHp; p.mp=st.maxMp;
    meta.bestLevel = Math.max(meta.bestLevel, p.level); saveMeta();
    showLevelChoice();
  }
}

function usePotion(){
  if(!canAct()) return;
  const p=S.player; const st=calcStats();
  if(p.potions<=0){toast('물약이 없다.'); return;}
  const cd = Math.max(2, 7 - (p.potionCdBonus||0));
  if(p.cd.potion>0){toast(`물약 재사용 ${p.cd.potion}턴`); return;}
  p.potions--; p.cd.potion=cd;
  const heal = Math.floor(st.maxHp*(.28 + (st.potionPower||0)) + 5);
  p.hp = clamp(p.hp+heal,1,st.maxHp);
  addFx({kind:'heal', x:p.x, y:p.y, color:'#22c55e', dur:360});
  addLog(`물약 사용. HP ${heal} 회복.`);
  afterPlayerAction();
}
function canPierceWalls(skillKey){ return skillLv(skillKey)>=15; }
function hasRangedPath(x1,y1,x2,y2,pierce=false){

function nearestEnemy(maxRange, filterFn){

function rangedEnemy(maxRange, skillKey='smash', filterFn){

function directionalRangedEnemy(dx,dy){

  }

  }

function equipCompareHtml(old,it){
  if(!old) return '';
  const rows=[['공격','atk',''],['방어','def',''],['HP','maxHp',''],['MP','maxMp',''],['치명','crit','%'],['회피','eva','%']]
    .map(([name,k,suf])=>{ const a=old[k]||0, b=it[k]||0; if(a===0 && b===0) return ''; const d=b-a; const cls=d>0?'plus':d<0?'minus':'zero'; const sign=d>0?'+':''; return `<tr><td>${name}</td><td>${a}${suf}</td><td>${b}${suf}</td><td class="${cls}">${sign}${d}${suf}</td></tr>`; })
    .filter(Boolean).join('');

  return `<table class="compareTable"><thead><tr><th>옵션</th><th>기존</th><th>신규</th><th>차이</th></tr></thead><tbody>${rows}</tbody></table>`;
}
function classEquipPool(cls, slot){
  const pools={
    warrior:{
      weapon:['대검','전투도끼','장검'], armor:['판금방어구','수호갑주','전투흉갑'], gloves:['완력장갑','철갑건틀릿','전투장갑'], boots:['강철군화','돌격장화','수호군화'], accessory:['수호휘장','힘의인장','강철부적']
    },
    rogue:{
      weapon:['단검','쌍검','암살검'], armor:['그림자방어구','가죽전투복','은신복'], gloves:['암살장갑','독니손싸개','그림자장갑'], boots:['은신장화','기습신발','그림자부츠'], accessory:['암살부적','그림자인장','민첩부적']
    },
    mage:{
      weapon:['지팡이','마도서','수정봉'], armor:['마법로브','현자로브','비전망토'], gloves:['마력장갑','주문매듭','비전손싸개'], boots:['마도사의신발','현자샌들','비전장화'], accessory:['마력부적','현자의인장','비전보석']
    },
    hunter:{
      weapon:['장궁','석궁','사냥활'], armor:['가죽방어구','추적자복','사냥망토'], gloves:['궁수장갑','조준손싸개','추적장갑'], boots:['추적장화','사냥신발','바람부츠'], accessory:['매눈부적','사냥꾼휘장','정밀인장']
    }
  };
  return ((pools[cls]||pools.warrior)[slot] || pools.warrior[slot] || pools.warrior.weapon);
}
function makeEquip(){
  ensureRunFields();
  const floor=S.player.floor; const cls=S.player.classId;
  const slot=one(EQUIP_SLOTS);
  let luck = (S.player.lootLuck||0) + Math.floor(floor/7);
  let r = 0;
  if(chance(.50 + luck*.02)) r=1;
  if(chance(.22 + luck*.025)) r=2;
  if(chance(.08 + luck*.018)) r=3;
  if(chance(.018 + luck*.008)) r=4;
  r = clamp(r,0,4);
  const mult = RARITY_MULT[r];
  const tier = Math.floor(floor/2)+1;
  const prefix = ['낡은','단단한','빛나는','심연의','고대의'][r];
  const baseType = one(classEquipPool(cls,slot));
  let it = {slot, baseType, job:cls, jobName:(classes[cls]||classes.warrior).name, rarity:r, atk:0, def:0, maxHp:0, maxMp:0, crit:0, eva:0, value:Math.floor((8+tier*4)*mult)};
  it.name = `${prefix} ${baseType} +${tier}`;
  if(slot==='weapon'){
    it.atk=Math.floor((3+tier*1.65)*mult);
    if(cls==='warrior'){ it.def = r>=2 ? 1+Math.floor(r/2) : 0; }
    if(cls==='rogue'){ it.crit = 4+r*2+rand(3); it.eva = r>=2?2+r:0; }
    if(cls==='mage'){ it.maxMp = Math.floor((4+tier*1.8)*mult); it.crit = 2+r*2; }
    if(cls==='hunter'){ it.crit = 3+r*2+rand(3); }
    if(cls==='warrior' || cls==='hunter') it.crit += r>=2 ? 2+r : rand(2);
  }
  if(slot==='armor'){
    it.def=Math.floor((2+tier*.95)*mult);
    if(cls==='warrior'){ it.maxHp=Math.floor((14+tier*4.4)*mult); it.def += r; }
    if(cls==='rogue'){ it.maxHp=Math.floor((7+tier*2.3)*mult); it.eva=3+r*2; it.crit=r>=2?2+r:0; }
    if(cls==='mage'){ it.maxMp=Math.floor((12+tier*4.2)*mult); it.def += r>=2?1:0; it.eva=r>=2?2+r:0; }
    if(cls==='hunter'){ it.maxHp=Math.floor((9+tier*3.2)*mult); it.eva=2+r*2; it.crit=r>=2?2+r:0; }
  }
  if(slot==='gloves'){
    it.atk=Math.floor((1+tier*.95)*mult);
    if(cls==='warrior'){ it.def=1+r; it.crit=r>=2?2+r:0; }
    if(cls==='rogue'){ it.crit=5+r*3; it.eva=2+r; }
    if(cls==='mage'){ it.maxMp=Math.floor((5+tier*2.2)*mult); it.crit=3+r*2; }
    if(cls==='hunter'){ it.crit=5+r*3; it.atk+=Math.floor(r/2); }
  }
  if(slot==='boots'){
    if(cls==='warrior'){ it.def=1+r; it.maxHp=Math.floor((7+tier*2.2)*mult); it.eva=r>=3?1+r:0; }
    if(cls==='rogue'){ it.eva=5+r*3; it.crit=2+r; }
    if(cls==='mage'){ it.eva=2+r*2; it.maxMp=Math.floor((5+tier*2)*mult); }
    if(cls==='hunter'){ it.eva=4+r*3; it.maxHp=Math.floor((5+tier*1.8)*mult); }
  }
  if(slot==='accessory'){
    if(cls==='warrior'){ it.atk=Math.floor((1+tier*.85)*mult); it.def=1+r; it.maxHp=Math.floor((8+tier*2.1)*mult); }
    if(cls==='rogue'){ it.atk=Math.floor((1+tier*.9)*mult); it.crit=6+r*3; it.eva=3+r; }
    if(cls==='mage'){ it.atk=Math.floor((1+tier*.75)*mult); it.maxMp=Math.floor((10+tier*3.3)*mult); it.crit=5+r*2; }
    if(cls==='hunter'){ it.atk=Math.floor((1+tier*.9)*mult); it.crit=5+r*3; it.eva=2+r; it.maxMp=Math.floor((4+tier*1.5)*mult); }
  }
  Object.keys(it).forEach(k=>{if(typeof it[k]==='number') it[k]=Math.floor(it[k]);});
  return it;
}

function equipBaseKey(it){ return (it&&it.baseType) || (it&&it.name ? it.name.replace(/^(낡은|단단한|빛나는|심연의|고대의) /,'').replace(/ \+\d+$/,'') : ''); }
function isSameEquipLine(a,b){ return !!a && !!b && a.slot===b.slot && equipBaseKey(a)===equipBaseKey(b); }
function itemScore(it){ return (it.atk||0)*4 + (it.def||0)*5 + (it.maxHp||0)*.55 + (it.maxMp||0)*.35 + (it.crit||0)*1.6 + (it.eva||0)*1.8 + (it.rarity||0)*4; }
function statLine(it){
  return ([['공격',it.atk],['방어',it.def],['HP',it.maxHp],['MP',it.maxMp],['치명',it.crit?'+'+it.crit+'%':0],['회피',it.eva?'+'+it.eva+'%':0]].filter(x=>x[1]).map(x=>`${x[0]} ${x[1]}`).join(' · ') || '특수 효과 없음');
}
function equipItem(it){
  ensureRunFields();
  const p=S.player; const old=p.equip[it.slot];
  if(old){ const sale = Math.floor((old.value||5)*.55); p.gold+=sale; addLog(`${old.name} 판매 +${sale}G.`); }
  delete it.enhance;
  p.equip[it.slot]=it;
  recordInventory('equip', it.name, 1, `${SLOT_KO[it.slot]} · ${it.jobName||p.className||'직업 전용'} · ${RARITY[it.rarity]} · 전투력 ${Math.round(itemScore(it))} · ${statLine(it)}`, {equip:it});
  addLog(`<span class="goodtxt">${it.name}</span> 장착.`);
  const st=calcStats(); p.hp=clamp(p.hp,1,st.maxHp); p.mp=clamp(p.mp,0,st.maxMp);
}

function mapCellClass(x,y){
  const p=S?.player;
  if(!S || !S.seen || !S.seen[y] || !S.seen[y][x]) return '';
  if(p && p.x===x && p.y===y) return 'player';
  if(S.enemies && S.enemies.some(e=>e.hp>0&&e.x===x&&e.y===y)) return 'enemy';
  if(S.items && S.items.some(i=>i.x===x&&i.y===y&&i.type==='merchant')) return 'merchant';
  if(S.items && S.items.some(i=>i.x===x&&i.y===y)) return 'item';
  if(S.exit && S.exit.x===x && S.exit.y===y) return 'exit';
  return S.map[y][x]==='#' ? 'wall' : 'floor';
}

  if(lv>=20){ toast('이미 최대 강화다.'); return; }
  const info=skillCostInfo(lv);
  if(p.gold<info.cost){ toast('골드가 부족하다.'); return; }
  p.gold-=info.cost;
  const roll=rand(100)+1;
  let result='유지';
  if(roll<=info.s){ p.skillEnhance[k]=lv+1; result='성공'; }
  else if(roll>info.s+info.k){ p.skillEnhance[k]=Math.max(0,lv-1); result='하락'; }
  addLog(`${skillNameByKey(k)} 강화 ${result}. 현재 +${p.skillEnhance[k]}.`);
  renderAll(); saveRun(); showSkillMenu();
}

function cloudEscape(v){
  return String(v||'').replace(/[&<>"']/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function modalTitleText(html){
  const m = String(html||'').match(/<h[12][^>]*>([\s\S]*?)<\/h[12]>/i);
  if(!m) return '';
  return m[1].replace(/<[^>]+>/g,'').replace(/&[^;]+;/g,'').trim();
}
function modalAllowsX(html, locked){
  if(locked) return false;
  const title = modalTitleText(html);
  if(/^레벨 \d+$/.test(title)) return false;
  return !['심연 로그','영혼 강화','원정 종료','귀환 완료','장비 상자','유물 선택','심연 제단'].includes(title);
}
function showModal(html, locked){
  modal.classList.remove('startPage');
  modal.removeAttribute('data-start-mode');
  const x = modalAllowsX(html, locked) ? '<button class="modalCloseX" id="modalCloseX" aria-label="닫기">×</button>' : '';
  modalCard.innerHTML = x + html;
  const xb=$('modalCloseX'); if(xb) xb.onclick=()=>{ hideModal(); renderAll(); };
  modal.classList.add('show');
  modalOpen = true;
  if(!locked){ modal.onclick = e=>{ if(e.target===modal){} }; }
}
function hideModal(){ modal.classList.remove('show','startPage'); modal.removeAttribute('data-start-mode'); modalOpen=false; modal.onclick=null; setTimeout(resumeAutoIfPaused,0); }

const PROC_SPRITE_CACHE = {};
function cloneRows(rows){ return rows.map(r=>r.split('')); }
function buildProcSprite(id){
  if(PROC_SPRITE_CACHE[id]) return PROC_SPRITE_CACHE[id];
  let sprite=null;
  if(/^m\d+$/.test(id)){
    const idx=parseInt(id.slice(1),10);
    const fam=MONSTER_FAMILY_DEFS[Math.floor(idx/9)%MONSTER_FAMILY_DEFS.length];
    const v=idx%9;
    const rows=cloneRows(MONSTER_PATTERNS[v]);
    if(idx%2===1 && rows[1][1]==='0') rows[1][1]='1';
    if(idx%3===1 && rows[6][6]==='0') rows[6][6]='1';
    if(idx%4===2 && rows[2][5] && rows[2][5]!=='0') rows[2][5]='3';
    if(idx%5===3 && rows[4][2] && rows[4][2]!=='0') rows[4][2]='3';
    sprite={palette:{b:fam.colors[0],c:fam.colors[1],d:fam.colors[2]}, rows:rows.map(r=>r.join(''))};
  } else if(/^boss\d+$/.test(id)){
    const idx=parseInt(id.slice(4),10)%BOSS_DEFS.length;
    const b=BOSS_DEFS[idx];
    const rows=cloneRows(BOSS_PATTERNS[idx]);
    sprite={palette:{b:b.colors[0],c:b.colors[1],d:b.colors[2],f:'#ffffff',e:'#fde68a'}, rows:rows.map(r=>r.join(''))};
  }
  if(sprite) PROC_SPRITE_CACHE[id]=sprite;
  return sprite;
}
function getSpriteDef(id){
  const key=(id||'').replace(/^elite_/, '');

}
function render(){
  if(!S){ drawTitle(); return; }
  const p=S.player;
  const ox = p.x - Math.floor(VIEW/2), oy = p.y - Math.floor(VIEW/2);
  ctx.fillStyle='#05070b'; ctx.fillRect(0,0,canvas.width,canvas.height);
  for(let vy=0;vy<VIEW;vy++) for(let vx=0;vx<VIEW;vx++){
    const x=ox+vx,y=oy+vy, px=vx*TILE, py=vy*TILE;
    if(!inMap(x,y)){ drawTile(px,py,'void'); continue; }
    const seen=S.seen[y][x];
    if(!seen){ drawTile(px,py,'unknown'); continue; }
    drawTile(px,py,S.map[y][x]==='#'?'wall':'floor');
    if(S.map[y][x]==='>') drawSprite('exit',px,py);
  }
  for(const it of S.items){
    if(!inView(it.x,it.y,ox,oy) || !S.seen[it.y][it.x]) continue;
    drawSprite(it.type,(it.x-ox)*TILE,(it.y-oy)*TILE);
  }
  for(const e of S.enemies){
    if(e.hp<=0 || !inView(e.x,e.y,ox,oy) || !S.seen[e.y][e.x]) continue;
    const px=(e.x-ox)*TILE, py=(e.y-oy)*TILE;
    drawSprite(e.sprite,px,py);

function drawTile(px,py,type){

function drawSprite(id,px,py){
  const s=getSpriteDef(id);
  const h=s.rows.length, w=Math.max(...s.rows.map(r=>r.length));
  const scale=Math.max(2, Math.min(3, Math.floor(24/Math.max(w,h)) || 2));
  const ox=px+Math.floor((TILE-w*scale)/2), oy=py+Math.floor((TILE-h*scale)/2);
  for(let y=0;y<s.rows.length;y++) for(let x=0;x<s.rows[y].length;x++){
    const ch=s.rows[y][x]; if(ch==='0') continue;
    const key = ch==='1' ? 'b' : ch==='2' ? 'c' : ch==='3' ? 'd' : ch;
    const col=s.palette[key]; if(!col) continue;
    ctx.fillStyle=col; ctx.fillRect(ox+x*scale,oy+y*scale,scale,scale);
  }

function autoResolveAwaitAim(enemies){
  const p=S.player;
  if(!p.awaitAim) return false;
  const t = (enemies||S.enemies.filter(e=>e.hp>0)).slice().sort((a,b)=>dist(a,p)-dist(b,p)||a.hp-b.hp)[0];
  if(t){
    const dx=Math.sign(t.x-p.x), dy=Math.sign(t.y-p.y);
    resolveAimedSkill(Math.abs(dx)>=Math.abs(dy)?dx:0, Math.abs(dy)>Math.abs(dx)?dy:0);

    p.awaitAim=''; renderAll(); saveRun();
  }
  return true;
}

  if(close){ playerAttack(close,false); addLog('기본공격.'); afterPlayerAction(); return true; }
  const rangedBasic = basicRangedEnemy();
  if(rangedBasic){ basicRangedAttack(rangedBasic); addLog(`${p.className} 원거리 기본공격.`); afterPlayerAction(); return true; }
  return false;
}
function tryAutoSkillPriority(opts={}){
  const p=S.player, st=calcStats();
  const enemies=S.enemies.filter(e=>e.hp>0);
  if(!enemies.length) return false;
  const allowGapClose = !!opts.allowGapClose;
  const nearest=enemies.slice().sort((a,b)=>dist(a,p)-dist(b,p)||a.hp-b.hp)[0];
  const nearestDist=nearest?dist(nearest,p):999;
  const danger=enemies.filter(e=>dist(e,p)<=3).length;
  const lowHp=p.hp<=st.maxHp*.65;

  // 1번 공격 스킬: 쿨타임이 없고 타깃이 있으면 기본공격보다 먼저 사용한다.
  if(p.cd.smash<=0){
    if((p.classId==='warrior'||p.classId==='rogue') && enemies.some(e=>dist(e,p)<=1)){ skillSmash(); return true; }
    if(p.classId==='mage' && p.mp>=5 && rangedEnemy(5+skillRangeBonus('smash'),'smash')){ skillMage1(); return true; }
    if(p.classId==='hunter' && lineEnemy(6+skillRangeBonus('smash'),'smash')){ skillHunter1(); return true; }
  }

  // 2번 스킬: 공격/접근 가능한 상황이면 기본공격보다 먼저 사용한다.
  if(p.cd.dash<=0){
    if(p.classId==='mage' && p.mp>=10 && enemies.some(e=>dist(e,p)<=2+Math.floor(skillLv('dash')/10)&&hasRangedPath(p.x,p.y,e.x,e.y,canPierceWalls('dash')))){ skillMage2(); return true; }
    if(allowGapClose && nearestDist>1 && nearestDist<=3 && (p.classId==='warrior'||p.classId==='rogue'||p.classId==='hunter')){ skillDash(); return true; }
  }

  // 3번 스킬: 공격형은 우선 사용하고, 회복/버프형은 전투 중 필요한 경우에만 사용한다.
  if(p.cd.heal<=0){
    if(p.classId==='hunter' && p.mp>=10 && enemies.some(e=>dist(e,p)<=5+skillRangeBonus('heal')&&hasRangedPath(p.x,p.y,e.x,e.y,canPierceWalls('heal')))){ skillHunter3(); return true; }
    if(p.classId==='warrior' && p.mp>=8 && danger>=1 && ((!p.effects.fury || p.effects.fury<=0) || lowHp)){ skillWarrior3(); return true; }
    if(p.classId==='rogue' && p.mp>=8 && danger>=1 && (!p.effects.smoke || p.effects.smoke<=0)){ skillRogue3(); return true; }
    if(p.classId==='mage' && p.mp>=12 && p.hp<=st.maxHp*.72){ skillMage3(); return true; }
  }

  return false;
}
function autoExplore(){
  if(!canAct()) return;
  const p=S.player;
  const enemies=S.enemies.filter(e=>e.hp>0);
  if(autoResolveAwaitAim(enemies)) return;
  if(enemies.length && tryAutoSkillPriority({allowGapClose:false})) return;
  if(autoBasicAttack()) return;
  if(enemies.some(e=>e.hp>0&&dist(e,p)<=4)){ stopAuto(); toast('근처에 적이 있어 안전오토 정지.'); return; }
  const target = nearestTarget();
  if(!target){ stopAuto(); toast('탐험할 목표가 없습니다.'); return; }
  const step = autoStepToward(target.x,target.y);
  if(step){ playerMove(step.dx, step.dy); return; }
  waitTurn();
}
function autoFullExplore(){
  if(!canAct()) return;
  ensureRunFields();
  const p=S.player;
  const st=calcStats();
  const enemies=S.enemies.filter(e=>e.hp>0);
  if(autoResolveAwaitAim(enemies)) return;
  if(p.potions>0 && p.cd.potion<=0 && p.hp <= st.maxHp*.42){ usePotion(); return; }

  // 오토 전투 우선순위: 스킬 사용 가능 → 기본공격 → 접근/탐색.
  if(enemies.length && tryAutoSkillPriority({allowGapClose:true})) return;
  if(autoBasicAttack()) return;

  const nearbyEnemy = enemies.filter(e=>dist(e,p)<=7 || S.seen[e.y]?.[e.x]).sort((a,b)=>dist(a,p)-dist(b,p)||a.hp-b.hp)[0];
  if(nearbyEnemy){
    const step = autoStepToAdjacent(nearbyEnemy.x, nearbyEnemy.y);
    if(step){ playerMove(step.dx, step.dy); return; }
  }

  const itemTarget = S.items.slice().sort((a,b)=>dist(a,p)-dist(b,p))[0];
  if(itemTarget){ const step=autoStepToward(itemTarget.x,itemTarget.y); if(step){ playerMove(step.dx, step.dy); return; } }

  const enemyTarget = enemies.sort((a,b)=>dist(a,p)-dist(b,p)||a.hp-b.hp)[0];
  if(enemyTarget){
    const step = autoStepToAdjacent(enemyTarget.x, enemyTarget.y);
    if(step){ playerMove(step.dx, step.dy); return; }
  }

  if(!S.enemies.some(e=>e.hp>0) && !S.items.length && S.exit){
    const step=autoStepToward(S.exit.x,S.exit.y);
    if(step){ playerMove(step.dx, step.dy); return; }
    if(p.x===S.exit.x && p.y===S.exit.y){ nextFloor(); return; }
  }
  const target = nearestTarget();
  if(target){ const step=autoStepToward(target.x,target.y); if(step){ playerMove(step.dx, step.dy); return; } }
  waitTurn();
}
function tryFullAutoSkill(){
  return tryAutoSkillPriority({allowGapClose:true});
}
function nextStepToAdjacent(tx,ty){
  const p=S.player;
  if(Math.abs(p.x-tx)+Math.abs(p.y-ty)<=1) return null;
  const candidates=DIRS.map(([dx,dy])=>({x:tx+dx,y:ty+dy})).filter(c=>passable(c.x,c.y)&&!enemyAt(c.x,c.y));
  candidates.sort((a,b)=>dist(a,p)-dist(b,p));
  for(const c of candidates){ const step=nextStepToward(c.x,c.y); if(step) return step; }
  return null;
}
function nearestTarget(){
  const p=S.player;
  const visibleItems = S.items.filter(i=>S.seen[i.y][i.x]).sort((a,b)=>dist(a,p)-dist(b,p));
  if(visibleItems.length) return visibleItems[0];
  if(S.seen[S.exit.y][S.exit.x] && !S.enemies.some(e=>e.hp>0) && !S.items.length) return S.exit;
  let best=null,bd=999;
  for(let y=0;y<MAPH;y++) for(let x=0;x<MAPW;x++){
    if(S.map[y][x]==='#') continue;
    const nearUnseen = DIRS.some(([dx,dy])=>inMap(x+dx,y+dy)&&!S.seen[y+dy][x+dx]);
    if(nearUnseen){ const d=Math.abs(x-p.x)+Math.abs(y-p.y); if(d<bd){bd=d;best={x,y};} }
  }
  return best;
}
function nextStepToward(tx,ty){
  const p=S.player;
  const q=[{x:p.x,y:p.y,first:null}], seen=new Set([key(p.x,p.y)]);
  for(let qi=0;qi<q.length && qi<1800;qi++){
    const cur=q[qi];
    if(cur.x===tx&&cur.y===ty) return cur.first;
    for(const [dx,dy] of DIRS){
      const nx=cur.x+dx, ny=cur.y+dy, k=key(nx,ny);
      if(seen.has(k)||!passable(nx,ny)||enemyAt(nx,ny)) continue;
      seen.add(k); q.push({x:nx,y:ny,first:cur.first||{dx,dy}});
    }
  }
  return null;
}
function adjacentWallCount(x,y){ let n=0; for(const [dx,dy] of DIRS){ const nx=x+dx, ny=y+dy; if(!inMap(nx,ny) || S.map[ny][nx]==='#') n++; } return n; }
function frontierScore(x,y){ let n=0; for(const [dx,dy] of DIRS){ const nx=x+dx, ny=y+dy; if(inMap(nx,ny) && !S.seen[ny][nx]) n++; } return n; }
function unstickStep(target=null){
  const p=S.player;
  const cand=DIRS.map(([dx,dy])=>({dx,dy,nx:p.x+dx,ny:p.y+dy})).filter(c=>passable(c.nx,c.ny)&&!enemyAt(c.nx,c.ny));
  if(!cand.length) return null;
  cand.sort((a,b)=>{
    const ad=target?Math.abs(a.nx-target.x)+Math.abs(a.ny-target.y):999;
    const bd=target?Math.abs(b.nx-target.x)+Math.abs(b.ny-target.y):999;
    const af=frontierScore(a.nx,a.ny), bf=frontierScore(b.nx,b.ny);
    const aw=adjacentWallCount(a.nx,a.ny), bw=adjacentWallCount(b.nx,b.ny);
    return ad-bd || bf-af || aw-bw || (Math.random()-.5);
  });
  return {dx:cand[0].dx, dy:cand[0].dy};
}
function autoStepToward(tx,ty){ return nextStepToward(tx,ty) || unstickStep({x:tx,y:ty}); }
function autoStepToAdjacent(tx,ty){ return nextStepToAdjacent(tx,ty) || unstickStep({x:tx,y:ty}); }

function analogDirectionFromEvent(e){
  const pad=$('analogPad'); const r=pad.getBoundingClientRect();
  const x=e.clientX-(r.left+r.width/2), y=e.clientY-(r.top+r.height/2);
  const mag=Math.hypot(x,y);
  if(mag<22) return {dx:0,dy:0,wait:true,sx:0,sy:0};
  const sx=clamp(x,-34,34), sy=clamp(y,-34,34);
  if(Math.abs(x)>Math.abs(y)) return {dx:x>0?1:-1,dy:0,sx,sy};
  return {dx:0,dy:y>0?1:-1,sx,sy};
}
let analogHold=null, analogPointer=null, analogLast={dx:0,dy:0,wait:true,sx:0,sy:0};
function analogAct(){

}
function analogSetVisual(d){
  const pad=$('analogPad'); if(!pad) return;
  pad.style.setProperty('--stick-x',(d.sx||0)+'px'); pad.style.setProperty('--stick-y',(d.sy||0)+'px'); pad.classList.add('active');
}
function analogStop(){
  if(analogHold){clearInterval(analogHold); analogHold=null;}
  const pad=$('analogPad'); if(pad){pad.classList.remove('active'); pad.style.setProperty('--stick-x','0px'); pad.style.setProperty('--stick-y','0px');}
  analogPointer=null;
}
const analogPad=$('analogPad');
if(analogPad){
  analogPad.addEventListener('pointerdown',e=>{
    e.preventDefault(); analogPointer=e.pointerId; analogPad.setPointerCapture?.(e.pointerId);
    analogLast=analogDirectionFromEvent(e); analogSetVisual(analogLast); analogAct();
    if(analogHold) clearInterval(analogHold); analogHold=setInterval(analogAct, 165);
  });
  analogPad.addEventListener('pointermove',e=>{ if(analogPointer!==e.pointerId) return; e.preventDefault(); analogLast=analogDirectionFromEvent(e); analogSetVisual(analogLast); });
  analogPad.addEventListener('pointerup',e=>{ if(analogPointer===e.pointerId) analogStop(); });
  analogPad.addEventListener('pointercancel',analogStop);
}
function bindShortLongPress(btn, shortFn, longFn, holdMs=520){
  if(!btn) return;
  let timer=null, longDone=false, pointerId=null;
  const clear=()=>{ if(timer){ clearTimeout(timer); timer=null; } };
  btn.addEventListener('pointerdown', e=>{
    e.preventDefault(); e.stopPropagation();
    pointerId=e.pointerId; longDone=false;
    btn.setPointerCapture?.(e.pointerId);
    clear();
    timer=setTimeout(()=>{ longDone=true; clear(); longFn?.(); }, holdMs);
  });
  btn.addEventListener('pointerup', e=>{
    if(pointerId!==null && e.pointerId!==pointerId) return;
    e.preventDefault(); e.stopPropagation();
    clear();
    pointerId=null;
    if(!longDone) shortFn?.();
  });
  btn.addEventListener('pointercancel', ()=>{ clear(); pointerId=null; });
  btn.addEventListener('lostpointercapture', ()=>{ clear(); pointerId=null; });
  btn.onclick=e=>{ e.preventDefault(); e.stopPropagation(); };
}

let activeLoginMode = 'none';

let cloudCharacterSaveTimer = null;

function normalizeCharacterSlots(slots, count){
  const arr = Array.isArray(slots) ? slots.slice(0,count) : [];
  while(arr.length<count) arr.push(null);
  return arr.map(ch=>{
    if(!ch || typeof ch !== 'object') return null;
    if(ch.run && ch.run.player){
      const p = ch.run.player;
      return {
        nickname: ch.nickname || p.name || p.className || '이름 없음',
        classId: ch.classId || p.classId || 'warrior',
        className: ch.className || p.className || (classes[ch.classId||p.classId]||classes.warrior).name,
        level: Number(ch.level || p.level || 1),
        floor: Number(ch.floor || p.floor || 1),
        updatedAt: ch.updatedAt || new Date().toISOString(),
        run: ch.run
      };
    }
    return null;
  });
}
function currentSlotLimit(mode){
  return mode === 'kakao' ? 3 : 1;
}
function getSlotsForMode(mode){
  return mode === 'kakao' ? cloudCharacterSlots : guestCharacterSlots;
}
function setSlotsForMode(mode, slots){
  if(mode === 'kakao') cloudCharacterSlots = normalizeCharacterSlots(slots, 3);
  else guestCharacterSlots = normalizeCharacterSlots(slots, 1);
}
function escapeText(v){
  return String(v ?? '').replace(/[&<>"']/g, ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}
function compactDate(v){
  if(!v) return '-';
  const d = new Date(v);
  if(Number.isNaN(d.getTime())) return '-';
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
}
function characterSummary(ch){
  if(!ch || !ch.run || !ch.run.player) return '';
  const p = ch.run.player;
  return `<p>직업 <b>${escapeText(ch.className || p.className)}</b> · Lv.${Number(p.level||1)} · ${Number(p.floor||1)}층</p>
          <p class="muted">최근 저장: ${compactDate(ch.updatedAt)}</p>`;
}
function syncActiveCharacterFromRun(){
  if(!S || !S.player || activeCharacterSlot == null) return;
  const mode = S.loginMode || activeLoginMode || 'guest';
  const limit = currentSlotLimit(mode);
  const slots = normalizeCharacterSlots(getSlotsForMode(mode), limit);
  const p = S.player;

  };
  setSlotsForMode(mode, slots);
}
async function loadCloudCharacterProfile(){
  const client = getCloudClient();
  if(!client) throw new Error('Supabase 연결 정보가 필요하다.');
  const user = await currentCloudUser();
  if(!user) return false;
  const {data,error} = await client.from('game_saves').select('save_data, meta_data, updated_at').eq('user_id', user.id).maybeSingle();
  if(error) throw error;

  if(data && data.meta_data){
    meta = normalizeMeta(data.meta_data || {});
  }else{
    meta = normalizeMeta({souls:0,bestFloor:1,bestLevel:1,totalKills:0,runs:0,upgrades:{hp:0,atk:0,def:0,crit:0,xp:0,gold:0}});
  }

  if(data && data.save_data && Array.isArray(data.save_data.characters)){
    cloudCharacterSlots = normalizeCharacterSlots(data.save_data.characters, 3);
  }else if(data && data.save_data && data.save_data.player){
    const p = data.save_data.player;
    cloudCharacterSlots = normalizeCharacterSlots([{
      nickname:p.name || p.className || '이전 캐릭터',
      classId:p.classId || 'warrior',
      className:p.className || (classes[p.classId]||classes.warrior).name,
      level:p.level || 1,
      floor:p.floor || 1,
      updatedAt:data.updated_at || new Date().toISOString(),
      run:data.save_data
    }], 3);
  }else{
    cloudCharacterSlots = [null,null,null];
  }
  return true;
}
async function saveCloudCharacterProfile(){
  if(activeLoginMode !== 'kakao') return false;
  const client = getCloudClient();
  if(!client) return false;
  const user = await currentCloudUser();
  if(!user) return false;

  const slots = normalizeCharacterSlots(cloudCharacterSlots, 3);
  const active = activeCharacterSlot != null ? slots[activeCharacterSlot] : slots.find(Boolean);
  const {error} = await client.from('game_saves').upsert({
    user_id:user.id,
    nickname:active ? active.nickname : null,
    save_data:{version:2, characters:slots},
    meta_data:meta || {},
    updated_at:new Date().toISOString()
  }, {onConflict:'user_id'});
  if(error) throw error;
  return true;
}
function queueCharacterCloudSave(){
  if(activeLoginMode !== 'kakao') return;
  clearTimeout(cloudCharacterSaveTimer);
  cloudCharacterSaveTimer = setTimeout(()=>{
    saveCloudCharacterProfile().catch(e=>console.warn('character cloud save error:', e.message));
  }, 1200);
}

};

async function deleteSupabaseAccountPermanently(){
  const client = getCloudClient();
  if(!client) throw new Error('Supabase 연결 정보가 없습니다.');
  const user = await currentCloudUser();
  if(!user) throw new Error('로그인된 Supabase 계정이 없습니다.');

  clearTimeout(cloudSaveTimer);
  clearTimeout(cloudCharacterSaveTimer);

  let rpcError = null;
  if(typeof client.rpc === 'function'){
    const {error} = await client.rpc('delete_current_user');
    rpcError = error || null;
    if(!rpcError){
      try{ await client.auth.signOut(); }catch(e){}
      finishLocalAccountWithdrawal();
      return true;
    }
  }

  let functionError = null;
  if(client.functions && typeof client.functions.invoke === 'function'){
    const {error} = await client.functions.invoke('delete-account', {body:{confirm:'회원탈퇴'}});
    functionError = error || null;
    if(!functionError){
      try{ await client.auth.signOut(); }catch(e){}
      finishLocalAccountWithdrawal();
      return true;
    }
  }

  const detail = rpcError ? rpcError.message : (functionError ? functionError.message : '삭제 함수를 찾을 수 없습니다.');
  throw new Error(`Supabase 계정 삭제 함수가 필요합니다. delete_current_user RPC 또는 delete-account Edge Function을 설정하세요. (${detail})`);
}
function finishLocalAccountWithdrawal(){
  clearTimeout(cloudSaveTimer);
  clearTimeout(cloudCharacterSaveTimer);
  localStorage.removeItem(SAVE_KEY);
  localStorage.removeItem(META_KEY);
  S = null;
  activeLoginMode = 'guest';
  activeCharacterSlot = null;
  cloudCharacterSlots = [null,null,null];
  guestCharacterSlots = [null];
  guestMetaState = normalizeMeta({souls:0,bestFloor:1,bestLevel:1,totalKills:0,runs:0,upgrades:{hp:0,atk:0,def:0,crit:0,xp:0,gold:0}});
  meta = normalizeMeta({souls:0,bestFloor:1,bestLevel:1,totalKills:0,runs:0,upgrades:{hp:0,atk:0,def:0,crit:0,xp:0,gold:0}});
}

/* ===== 요청 반영: 닉네임 HUD + 전투력/랭킹 + 게스트 닉네임 제한 + 스킬 글자 이동 ===== */
function playerNickname(p){
  if(!p) return '-';
  return String(p.name || p.nickname || p.className || '이름 없음');
}
function calcStatsForRun(run, metaObj){
  const p = run && run.player ? run.player : null;
  const m = normalizeMeta(metaObj || meta || {});
  if(!p) return {maxHp:1,maxMp:0,atk:0,def:0,crit:0,eva:0,goldRate:0,xpRate:0,potionCap:0};
  let st = {maxHp:p.maxHpBase||1, maxMp:p.maxMpBase||0, atk:p.baseAtk||0, def:p.baseDef||0, crit:p.crit||0, eva:p.eva||0, taken:0, flatReduce:0, goldRate:0, xpRate:0, potionPower:0, potionCap:0, dashCd:0};
  Object.values(p.equip||{}).forEach(it=>{
    if(!it) return;
    ['maxHp','maxMp','atk','def','crit','eva'].forEach(k=>st[k]=(st[k]||0)+(it[k]||0));
  });
  (p.relics||[]).forEach(r=>{
    if(r && r.stats) Object.entries(r.stats).forEach(([k,v])=>st[k]=(st[k]||0)+v);
  });
  st.xpRate += (m.upgrades?.xp||0)*.04;
  st.goldRate += (m.upgrades?.gold||0)*.05;
  if(p.classId==='hunter') st.goldRate += .15;
  if(p.effects){
    if(p.effects.guard>0) st.def += 2;
    if(p.effects.fury>0) st.atk += 3;
    if(p.effects.smoke>0) st.eva += 25;
    if(p.effects.shadow>0) st.eva += 8;
    if(p.effects.focus>0) st.crit += 8;
  }
  st.maxHp = Math.max(1, Math.floor(st.maxHp));
  st.maxMp = Math.max(0, Math.floor(st.maxMp));
  st.crit = clamp(st.crit,0,75);
  st.eva = clamp(st.eva,0,65);
  return st;
}
function combatPowerForRun(run, metaObj){
  const p = run && run.player ? run.player : null;
  if(!p) return 0;
  const st = calcStatsForRun(run, metaObj);
  return Math.max(0, Math.floor(
    (p.level||1)*95 +
    (p.floor||1)*130 +
    st.maxHp*1.8 +
    st.maxMp*1.1 +
    st.atk*18 +
    st.def*15 +
    st.crit*9 +
    st.eva*7 +
    (p.relics?.length||0)*65 +
    Object.values(p.skillLv||{}).reduce((a,b)=>a+(Number(b)||0),0)*22
  ));
}
function rankingScoreForRun(run, metaObj){
  const p = run && run.player ? run.player : null;
  if(!p) return 0;
  const power = combatPowerForRun(run, metaObj);
  return Math.max(0, Math.floor(
    power +
    (p.floor||1)*900 +
    (p.level||1)*160 +
    (p.kills||0)*24 +
    (p.soulsRun||0)*35 +
    (p.opened||0)*18
  ));
}
function currentCombatPower(){
  return S && S.player ? combatPowerForRun(S, meta) : 0;
}
function currentRankingScore(){
  return S && S.player ? rankingScoreForRun(S, meta) : 0;
}
function buildRankRecordFromCharacter(ch, metaObj, fallbackNick){
  if(!ch || !ch.run || !ch.run.player) return null;
  const p = ch.run.player;
  const nick = ch.nickname || fallbackNick || p.name || p.className || '이름 없음';
  return {
    nickname:nick,
    className:ch.className || p.className || (classes[p.classId]||classes.warrior).name,
    level:Number(p.level || ch.level || 1),
    floor:Number(p.floor || ch.floor || 1),
    combatPower:Number(ch.combatPower || combatPowerForRun(ch.run, metaObj)),
    score:Number(ch.score || rankingScoreForRun(ch.run, metaObj)),
    updatedAt:ch.updatedAt || new Date().toISOString()
  };
}

  const mode = S.loginMode || activeLoginMode || 'guest';

  const power = combatPowerForRun(S, meta);
  const score = rankingScoreForRun(S, meta);
  slots[activeCharacterSlot] = {
    nickname: mode === 'guest' ? '게스트' : (p.name || S.characterNickname || p.className || '이름 없음'),
    classId: p.classId || S.characterClassId || 'warrior',

    level: Number(p.level || 1),
    floor: Number(p.floor || 1),
    combatPower: power,
    score: score,
    updatedAt: new Date().toISOString(),
    run: deepClone(S)
  };
  setSlotsForMode(mode, slots);
};
normalizeCharacterSlots = function(slots, count){
  const arr = Array.isArray(slots) ? slots.slice(0,count) : [];
  while(arr.length<count) arr.push(null);
  return arr.map(ch=>{
    if(!ch || typeof ch !== 'object') return null;
    if(ch.run && ch.run.player){
      const p = ch.run.player;
      const metaForPower = meta || {};
      return {
        nickname: ch.nickname || p.name || p.className || '이름 없음',
        classId: ch.classId || p.classId || 'warrior',
        className: ch.className || p.className || (classes[ch.classId||p.classId]||classes.warrior).name,
        level: Number(ch.level || p.level || 1),
        floor: Number(ch.floor || p.floor || 1),
        combatPower: Number(ch.combatPower || combatPowerForRun(ch.run, metaForPower)),
        score: Number(ch.score || rankingScoreForRun(ch.run, metaForPower)),
        updatedAt: ch.updatedAt || new Date().toISOString(),
        run: ch.run
      };
    }
    return null;
  });
};

/* 요청 반영: 닉네임 중복 방지 */
function normalizeNicknameForCheck(nick){
  return String(nick || '').trim().replace(/\s+/g, ' ').toLowerCase();
}
function nicknameMatchesForCheck(a, b){
  return !!a && !!b && normalizeNicknameForCheck(a) === normalizeNicknameForCheck(b);
}
function characterNicknameListFromSaveRow(row){
  const names = [];
  const save = row && row.save_data ? row.save_data : {};
  if(row && row.nickname) names.push(row.nickname);
  if(save && save.player){
    if(save.player.name) names.push(save.player.name);
    if(save.player.nickname) names.push(save.player.nickname);
    if(save.player.nick) names.push(save.player.nick);
  }
  if(save && Array.isArray(save.characters)){
    save.characters.forEach(ch=>{
      if(!ch || typeof ch !== 'object') return;
      if(ch.nickname) names.push(ch.nickname);
      if(ch.name) names.push(ch.name);
      if(ch.run && ch.run.player){
        if(ch.run.player.name) names.push(ch.run.player.name);
        if(ch.run.player.nickname) names.push(ch.run.player.nickname);
        if(ch.run.player.nick) names.push(ch.run.player.nick);
      }
    });
  }
  return names;
}
async function isNicknameAlreadyUsed(nickname, mode, slotIndex){
  const key = normalizeNicknameForCheck(nickname);
  if(!key) return false;
  if(key === normalizeNicknameForCheck('게스트')) return true;

  const localSlots = normalizeCharacterSlots(getSlotsForMode(mode), currentSlotLimit(mode));
  for(let i=0;i<localSlots.length;i++){
    if(i === slotIndex) continue;
    const ch = localSlots[i];
    if(ch && nicknameMatchesForCheck(ch.nickname, key)) return true;
  }

  if(mode !== 'kakao') return false;
  const client = getCloudClient();
  if(!client) throw new Error('Supabase 연결 정보가 필요합니다.');

  const {data,error} = await client
    .from('game_saves')
    .select('nickname, save_data')
    .limit(1000);
  if(error) throw error;

  return (data || []).some(row=>characterNicknameListFromSaveRow(row).some(name=>nicknameMatchesForCheck(name, key)));
}
async function assertNicknameAvailable(nickname, mode, slotIndex){
  const clean = String(nickname || '').trim().replace(/\s+/g, ' ');
  if(!clean) throw new Error('닉네임을 입력하세요.');
  if(clean.length > 12) throw new Error('닉네임은 12자 이하로 입력하세요.');
  if(await isNicknameAlreadyUsed(clean, mode, slotIndex)){
    throw new Error('이미 닉네임이 존재합니다.');
  }
  return clean;
}

async function collectRankingRecords(){
  const records = [];
  if(activeLoginMode === 'kakao'){
    const client = getCloudClient();
    const user = await currentCloudUser();
    if(client && user){
      const {data,error} = await client.from('game_saves').select('nickname, save_data, meta_data, updated_at').limit(100);
      if(!error && Array.isArray(data)){
        data.forEach(row=>{
          const metaRow = normalizeMeta(row.meta_data || {});
          const save = row.save_data || {};
          if(Array.isArray(save.characters)){
            save.characters.forEach(ch=>{
              const rec = buildRankRecordFromCharacter(ch, metaRow, row.nickname);
              if(rec) records.push(rec);
            });
          }else if(save.player){
            const p = save.player;
            const rec = buildRankRecordFromCharacter({
              nickname:row.nickname || p.name || p.className,
              classId:p.classId,
              className:p.className,
              level:p.level,
              floor:p.floor,
              updatedAt:row.updated_at,
              run:save
            }, metaRow, row.nickname);
            if(rec) records.push(rec);
          }
        });
      }
    }
  }
  if(activeLoginMode === 'kakao'){
    normalizeCharacterSlots(cloudCharacterSlots,3).forEach(ch=>{
      const rec = buildRankRecordFromCharacter(ch, meta);
      if(rec) records.push(rec);
    });
  }
  const dedup = new Map();
  records.forEach(r=>{
    const key = `${r.nickname}|${r.className}|${r.level}|${r.floor}`;
    const prev = dedup.get(key);
    if(!prev || r.score > prev.score) dedup.set(key, r);
  });
  return Array.from(dedup.values()).sort((a,b)=>(b.score-a.score)||(b.combatPower-a.combatPower)||(b.floor-a.floor)||(b.level-a.level)).slice(0,50);
}

  }
  if(typeof renderMapPanel === 'function') renderMapPanel();
  if(typeof updateLogChatButton === 'function') updateLogChatButton();
}
const originalStartNewCharacterRestoreDefaultLog = startNewCharacter;
startNewCharacter = function(mode, slotIndex, clsId, nickname){
  originalStartNewCharacterRestoreDefaultLog(mode, slotIndex, clsId, nickname);
  restoreDefaultLogPanel();
};
const originalStartSavedCharacterRestoreDefaultLog = startSavedCharacter;
startSavedCharacter = function(mode, slotIndex){
  originalStartSavedCharacterRestoreDefaultLog(mode, slotIndex);
  restoreDefaultLogPanel();
};


/* 상단 HUD 표기 최종 보정 */
const originalUpdateUiForTopHudFormat = updateUi;
updateUi = function(){
  originalUpdateUiForTopHudFormat();
  if(!S || !S.player) return;
  const p = S.player;
  const nickEl = $('nickText');
  const levelEl = $('levelText');
  const jobEl = $('jobText');
  const floorEl = $('floorText');
  const goldEl = $('goldText');
  const soulEl = $('soulText');
  if(nickEl){
    const rawNick = (typeof playerNickname === 'function') ? playerNickname(p) : (p.name || p.className || '-');
    nickEl.innerHTML = `<span class="nickMarqueeInner">${escapeText(rawNick || '-')}</span>`;
  }
  if(levelEl) levelEl.textContent = 'Lv.' + Number(p.level || 1);
  if(jobEl) jobEl.textContent = p.className || '-';
  if(floorEl) floorEl.textContent = Number(p.floor || 1) + '층';
  if(goldEl) goldEl.textContent = Number(p.gold || 0).toLocaleString() + ' GOLD';
  if(soulEl) soulEl.textContent = Number(p.soulsRun || 0).toLocaleString() + ' SOUL';
};


/* 요청 반영: 긴 닉네임도 스킬 버튼처럼 흐름 애니메이션 처리 */
function refreshNicknameMarquee(){
  requestAnimationFrame(()=>{
    const nickEl = $('nickText');
    if(!nickEl) return;

    let rawText = '';
    const innerOld = nickEl.querySelector('.nickMarqueeInner');
    if(innerOld) rawText = innerOld.textContent || '';
    else rawText = nickEl.textContent || '';
    rawText = rawText || '-';

    nickEl.classList.remove('scrollText');
    nickEl.style.removeProperty('--skill-text-shift');
    nickEl.style.removeProperty('max-width');
    nickEl.style.removeProperty('flex-basis');
    nickEl.innerHTML = `<span class="nickMarqueeInner">${escapeText(rawText)}</span>`;

    const inner = nickEl.querySelector('.nickMarqueeInner');
    if(!inner) return;

    const available = Math.max(24, Math.floor(nickEl.clientWidth || nickEl.getBoundingClientRect().width || 0));
    const overflow = inner.scrollWidth - available;
    if(overflow > 2){
      nickEl.style.setProperty('--skill-text-shift', `-${overflow}px`);
      nickEl.classList.add('scrollText');
    }
  });
}const originalUpdateUiForNicknameMarquee = updateUi;
updateUi = function(){
  originalUpdateUiForNicknameMarquee();
  refreshNicknameMarquee();
};
window.addEventListener('resize', refreshNicknameMarquee);


initStartPage();
render();

})();
</script>
