  const user = await currentCloudUser();
  if(!user) return false;
  const {data,error} = await client.from('game_saves').select('save_data, meta_data, updated_at').eq('user_id', user.id).maybeSingle();
  if(error) throw error;

  if(data && data.meta_data){
    meta = normalizeMeta(data.meta_data || {});
  }else{
    meta = normalizeMeta({souls:0,bestFloor:1,bestLevel:1,totalKills:0,runs:0,upgrades:{hp:0,atk:0,def:0,crit:0,xp:0,gold:0}});
  }

  if(data && data.save_data && Array.isArray(data.save_data.characters)){
    cloudCharacterSlots = normalizeCharacterSlots(data.save_data.characters, 3);
  }else if(data && data.save_data && data.save_data.player){
    const p = data.save_data.player;
    cloudCharacterSlots = normalizeCharacterSlots([{
      nickname:p.name || p.className || '이전 캐릭터',
      classId:p.classId || 'warrior',
      className:p.className || (classes[p.classId]||classes.warrior).name,
      level:clamp(Number(p.level || 1), 1, MAX_LEVEL),
      floor:p.floor || 1,
      updatedAt:data.updated_at || new Date().toISOString(),
      run:data.save_data
    }], 3);
  }else{
    cloudCharacterSlots = [null,null,null];
  }
  return true;
}
async function saveCloudCharacterProfile(){
  if(!isCloudLoginMode(activeLoginMode)) return false;
  const client = getCloudClient();
  if(!client) return false;
  const user = await currentCloudUser();
  if(!user) return false;

  const slots = normalizeCharacterSlots(cloudCharacterSlots, 3);
  const active = activeCharacterSlot != null ? slots[activeCharacterSlot] : slots.find(Boolean);
  const {error} = await client.from('game_saves').upsert({
    user_id:user.id,
    nickname:active ? active.nickname : null,
    save_data:{version:2, characters:slots},
    meta_data:meta || {},
    updated_at:new Date().toISOString()
  }, {onConflict:'user_id'});
  if(error) throw error;
  return true;
}

function currentSoulPoolMode(mode){
  return mode || activeLoginMode || (S && S.loginMode) || 'guest';
}
function slotSoulTotal(mode){
  const safeMode = currentSoulPoolMode(mode);
  const slots = normalizeCharacterSlots(getSlotsForMode(safeMode), currentSlotLimit(safeMode));
  return slots.reduce((sum,ch)=>{
    const p = ch && ch.run && ch.run.player ? ch.run.player : null;
    if(!p || ch.run.dead) return sum;
    return sum + Math.max(0, Number(p.soulsRun || 0));
  }, 0);
}
function totalSoulAvailable(mode){
  return Math.max(0, Number(meta && meta.souls || 0)) + slotSoulTotal(mode);
}
function writeBackSoulSlots(mode, slots){
  const safeMode = currentSoulPoolMode(mode);
  setSlotsForMode(safeMode, slots);
  if(S && S.player && activeLoginMode === safeMode && activeCharacterSlot != null){
    const active = slots[activeCharacterSlot];
    if(active && active.run && active.run.player){
      S.player.soulsRun = Math.max(0, Number(active.run.player.soulsRun || 0));
      syncActiveCharacterFromRun();
    }
  }
  if(isCloudLoginMode(safeMode)) queueCharacterCloudSave();
}
function spendPooledSouls(cost, mode){
  const safeMode = currentSoulPoolMode(mode);
  cost = Math.max(0, Number(cost || 0));
  if(totalSoulAvailable(safeMode) < cost) return false;
  let remain = cost;
  const metaUse = Math.min(Math.max(0, Number(meta.souls || 0)), remain);
  meta.souls = Math.max(0, Number(meta.souls || 0) - metaUse);
  remain -= metaUse;
  if(remain > 0){
    const slots = normalizeCharacterSlots(getSlotsForMode(safeMode), currentSlotLimit(safeMode));
    for(const ch of slots){
      if(remain <= 0) break;
      const p = ch && ch.run && ch.run.player ? ch.run.player : null;
      if(!p || ch.run.dead) continue;
      const have = Math.max(0, Number(p.soulsRun || 0));
      if(have <= 0) continue;
      const use = Math.min(have, remain);
      p.soulsRun = have - use;
      ch.run.player.soulsRun = p.soulsRun;
      ch.updatedAt = new Date().toISOString();
      remain -= use;
    }
    writeBackSoulSlots(safeMode, slots);
  }
  saveMeta();
  return true;
}
function clearPooledSlotSouls(mode){
  const safeMode = currentSoulPoolMode(mode);
  const slots = normalizeCharacterSlots(getSlotsForMode(safeMode), currentSlotLimit(safeMode));
  slots.forEach(ch=>{
    const p = ch && ch.run && ch.run.player ? ch.run.player : null;
    if(p) p.soulsRun = 0;
  });
  writeBackSoulSlots(safeMode, slots);
}
function markActiveSlotSoulsCollected(){
  const safeMode = currentSoulPoolMode();
  if(activeCharacterSlot == null) return;
  const slots = normalizeCharacterSlots(getSlotsForMode(safeMode), currentSlotLimit(safeMode));
  const ch = slots[activeCharacterSlot];
  if(ch && ch.run && ch.run.player){
    ch.run.player.soulsRun = 0;
    ch.updatedAt = new Date().toISOString();
    setSlotsForMode(safeMode, slots);
    if(isCloudLoginMode(safeMode)) queueCharacterCloudSave();
  }
}

  if(!client) throw new Error('Supabase 연결 정보가 없습니다.');

  if(!user) throw new Error('로그인된 Supabase 계정이 없습니다.');

  clearTimeout(cloudSaveTimer);
  clearTimeout(cloudCharacterSaveTimer);

  let rpcError = null;
  if(typeof client.rpc === 'function'){
    const {error} = await client.rpc('delete_current_user');
    rpcError = error || null;
    if(!rpcError){
      try{ await client.auth.signOut(); }catch(e){}
      finishLocalAccountWithdrawal();
      return true;
    }
  }

  let functionError = null;
  if(client.functions && typeof client.functions.invoke === 'function'){
    const {error} = await client.functions.invoke('delete-account', {body:{confirm:'회원탈퇴'}});
    functionError = error || null;
    if(!functionError){
      try{ await client.auth.signOut(); }catch(e){}
      finishLocalAccountWithdrawal();
      return true;
    }
  }

  const detail = rpcError ? rpcError.message : (functionError ? functionError.message : '삭제 함수를 찾을 수 없습니다.');
  throw new Error(`Supabase 계정 삭제 함수가 필요합니다. delete_current_user RPC 또는 delete-account Edge Function을 설정하세요. (${detail})`);
}

function playerNickname(p){
  if(!p) return '-';
  return String(p.name || p.nickname || p.className || '이름 없음');
}
function calcStatsForRun(run, metaObj){
  const p = run && run.player ? run.player : null;
  const m = normalizeMeta(metaObj || meta || {});
  if(!p) return {maxHp:1,maxMp:0,atk:0,def:0,crit:0,eva:0,goldRate:0,xpRate:0,potionCap:0};
  let st = {maxHp:p.maxHpBase||1, maxMp:p.maxMpBase||0, atk:p.baseAtk||0, def:p.baseDef||0, crit:p.crit||0, eva:p.eva||0, taken:0, flatReduce:0, goldRate:0, xpRate:0, potionPower:0, potionCap:0, dashCd:0};
  Object.values(p.equip||{}).forEach(it=>{
    if(!it) return;
    ['maxHp','maxMp','atk','def','crit','eva'].forEach(k=>st[k]=(st[k]||0)+(it[k]||0));
  });
  (p.relics||[]).forEach(r=>{
    if(r && r.stats) Object.entries(r.stats).forEach(([k,v])=>st[k]=(st[k]||0)+v);
  });
  st.xpRate += (m.upgrades?.xp||0)*.04;
  st.goldRate += (m.upgrades?.gold||0)*.05;
  if(p.classId==='hunter') st.goldRate += .15;
  if(p.effects){
    if(p.effects.guard>0) st.def += 2;
    if(p.effects.fury>0) st.atk += 3;
    if(p.effects.smoke>0) st.eva += 25;
    if(p.effects.shadow>0) st.eva += 8;
    if(p.effects.focus>0) st.crit += 8;
  }
  st.maxHp = Math.max(1, Math.floor(st.maxHp));
  st.maxMp = Math.max(0, Math.floor(st.maxMp));
  st.crit = clamp(st.crit,0,75);
  st.eva = clamp(st.eva,0,65);
  return st;
}
function combatPowerForRun(run, metaObj){
  const p = run && run.player ? run.player : null;
  if(!p) return 0;
  const st = calcStatsForRun(run, metaObj);
  return Math.max(0, Math.floor(
    (p.level||1)*95 +
    (p.floor||1)*130 +
    st.maxHp*1.8 +
    st.maxMp*1.1 +
    st.atk*18 +
    st.def*15 +
    st.crit*9 +
    st.eva*7 +
    (p.relics?.length||0)*65 +
    Object.values(p.skillLv||{}).reduce((a,b)=>a+(Number(b)||0),0)*22
  ));
}
function rankingScoreForRun(run, metaObj){
  const p = run && run.player ? run.player : null;
  if(!p) return 0;
  const power = combatPowerForRun(run, metaObj);
  return Math.max(0, Math.floor(
    power +
    (p.floor||1)*900 +
    (p.level||1)*160 +
    (p.kills||0)*24 +
    (p.soulsRun||0)*35 +
    (p.opened||0)*18
  ));
}
function currentCombatPower(){
  return S && S.player ? combatPowerForRun(S, meta) : 0;
}
function currentRankingScore(){
  return S && S.player ? rankingScoreForRun(S, meta) : 0;
}
function buildRankRecordFromCharacter(ch, metaObj, fallbackNick){
  if(!ch || !ch.run || !ch.run.player) return null;
  const p = ch.run.player;
  const nick = ch.nickname || fallbackNick || p.name || p.className || '이름 없음';
  return {
    nickname:nick,
    className:ch.className || p.className || (classes[p.classId]||classes.warrior).name,
    level:Number(p.level || ch.level || 1),
    floor:Number(p.floor || ch.floor || 1),
    combatPower:Number(ch.combatPower || combatPowerForRun(ch.run, metaObj)),
    score:Number(ch.score || rankingScoreForRun(ch.run, metaObj)),
    updatedAt:ch.updatedAt || new Date().toISOString()
  };
}

  };

normalizeCharacterSlots = function(slots, count){
  const arr = Array.isArray(slots) ? slots.slice(0,count) : [];
  while(arr.length<count) arr.push(null);
  return arr.map(ch=>{
    if(!ch || typeof ch !== 'object') return null;
    if(ch.run && ch.run.player){
      const p = ch.run.player;
      const metaForPower = meta || {};
      return {
        nickname: ch.nickname || p.name || p.className || '이름 없음',
        classId: ch.classId || p.classId || 'warrior',
        className: ch.className || p.className || (classes[ch.classId||p.classId]||classes.warrior).name,
        level: Number(ch.level || p.level || 1),
        floor: Number(ch.floor || p.floor || 1),
        combatPower: Number(ch.combatPower || combatPowerForRun(ch.run, metaForPower)),
        score: Number(ch.score || rankingScoreForRun(ch.run, metaForPower)),
        updatedAt: ch.updatedAt || new Date().toISOString(),
        run: ch.run
      };
    }
    return null;
  });
};

function normalizeNicknameForCheck(nick){
  return String(nick || '').trim().replace(/\s+/g, ' ').toLowerCase();
}
function nicknameMatchesForCheck(a, b){
  return !!a && !!b && normalizeNicknameForCheck(a) === normalizeNicknameForCheck(b);
}
function characterNicknameListFromSaveRow(row){
  const names = [];
  const save = row && row.save_data ? row.save_data : {};
  if(row && row.nickname) names.push(row.nickname);
  if(save && save.player){
    if(save.player.name) names.push(save.player.name);
    if(save.player.nickname) names.push(save.player.nickname);
    if(save.player.nick) names.push(save.player.nick);
  }
  if(save && Array.isArray(save.characters)){
    save.characters.forEach(ch=>{
      if(!ch || typeof ch !== 'object') return;
      if(ch.nickname) names.push(ch.nickname);
      if(ch.name) names.push(ch.name);
      if(ch.run && ch.run.player){
        if(ch.run.player.name) names.push(ch.run.player.name);
        if(ch.run.player.nickname) names.push(ch.run.player.nickname);
        if(ch.run.player.nick) names.push(ch.run.player.nick);
      }
    });
  }
  return names;
}
async function isNicknameAlreadyUsed(nickname, mode, slotIndex){
  const key = normalizeNicknameForCheck(nickname);
  if(!key) return false;
  if(key === normalizeNicknameForCheck('게스트')) return true;

  const localSlots = normalizeCharacterSlots(getSlotsForMode(mode), currentSlotLimit(mode));
  for(let i=0;i<localSlots.length;i++){
    if(i === slotIndex) continue;
    const ch = localSlots[i];
    if(ch && nicknameMatchesForCheck(ch.nickname, key)) return true;
  }

  if(!isCloudLoginMode(mode)) return false;
  const client = getCloudClient();
  if(!client) throw new Error('Supabase 연결 정보가 필요합니다.');

  const {data,error} = await client
    .from('game_saves')
    .select('nickname, save_data')
    .limit(1000);
  if(error) throw error;

  return (data || []).some(row=>characterNicknameListFromSaveRow(row).some(name=>nicknameMatchesForCheck(name, key)));
}
async function assertNicknameAvailable(nickname, mode, slotIndex){
  const clean = String(nickname || '').trim().replace(/\s+/g, ' ');
  if(!clean) throw new Error('닉네임을 입력하세요.');
  if(clean.length > 12) throw new Error('닉네임은 12자 이하로 입력하세요.');
  if(await isNicknameAlreadyUsed(clean, mode, slotIndex)){
    throw new Error('이미 닉네임이 존재합니다.');
  }
  return clean;
}

async function collectRankingRecords(){
  const records = [];
  if(isCloudLoginMode(activeLoginMode)){
    const client = getCloudClient();
    const user = await currentCloudUser();
    if(client && user){
      const {data,error} = await client.from('game_saves').select('nickname, save_data, meta_data, updated_at').limit(100);
      if(!error && Array.isArray(data)){
        data.forEach(row=>{
          const metaRow = normalizeMeta(row.meta_data || {});
          const save = row.save_data || {};
          if(Array.isArray(save.characters)){
            save.characters.forEach(ch=>{
              const rec = buildRankRecordFromCharacter(ch, metaRow, row.nickname);
              if(rec) records.push(rec);
            });
          }else if(save.player){
            const p = save.player;
            const rec = buildRankRecordFromCharacter({
              nickname:row.nickname || p.name || p.className,
              classId:p.classId,
              className:p.className,
              level:clamp(Number(p.level || 1), 1, MAX_LEVEL),
              floor:p.floor,
              updatedAt:row.updated_at,
              run:save
            }, metaRow, row.nickname);
            if(rec) records.push(rec);
          }
        });
      }
    }
  }
  if(isCloudLoginMode(activeLoginMode)){
    normalizeCharacterSlots(cloudCharacterSlots,3).forEach(ch=>{
      const rec = buildRankRecordFromCharacter(ch, meta);
      if(rec) records.push(rec);
    });
  }
  const dedup = new Map();
  records.forEach(r=>{
    const key = `${r.nickname}|${r.className}|${r.level}|${r.floor}`;
    const prev = dedup.get(key);
    if(!prev || r.score > prev.score) dedup.set(key, r);
  });
  return Array.from(dedup.values()).sort((a,b)=>(b.floor-a.floor)||(b.level-a.level)||(b.combatPower-a.combatPower)||(b.score-a.score)).slice(0,50);
}

    }
    u.hash = '';
    ['code','state','error','error_code','error_description'].forEach(k=>u.searchParams.delete(k));

const ONLINE_PRESENCE_CHANNEL = 'life-rpg-online-presence-v1';
const ONLINE_CLIENT_ID = (()=>{
  try{
    const k='life_rpg_online_client_id_v1';
    let v=localStorage.getItem(k);
    if(!v){
      v='online_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,9);
      localStorage.setItem(k,v);
    }
    return v;
  }catch(e){
    return 'online_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,9);
  }
})();
let onlineChannel = null;
let onlinePresenceStateCache = {};
let onlinePresenceSignature = '';
let onlineLastTrackAt = 0;
let onlineBadgeBound = false;

function onlineSelfInfo(){
  const p = S && S.player ? S.player : null;
  const nick = p ? ((typeof playerNickname === 'function') ? playerNickname(p) : (p.name || p.className || '이름 없음')) : '대기 중';
  return {
    id: ONLINE_CLIENT_ID,
    nickname: String(nick || '이름 없음'),
    className: p ? String(p.className || '-') : '-',
    level: p ? Number(p.level || 1) : 0,
    floor: p ? Number(p.floor || 1) : 0,
    mode: activeLoginMode || 'local',
    slot: activeCharacterSlot == null ? '-' : String(activeCharacterSlot + 1),
    updatedAt: Date.now()
  };
}
function normalizeOnlineList(){
  let state = onlinePresenceStateCache;
  try{
    if(onlineChannel && typeof onlineChannel.presenceState === 'function') state = onlineChannel.presenceState() || state;
  }catch(e){}
  const byId = new Map();
  Object.values(state || {}).forEach(arr=>{
    (Array.isArray(arr) ? arr : []).forEach(v=>{
      if(!v) return;
      const id = String(v.id || v.onlineId || v.presence_ref || Math.random());
      const old = byId.get(id);
      if(!old || Number(v.updatedAt||0) >= Number(old.updatedAt||0)) byId.set(id, v);
    });
  });
  if(!byId.size){
    const self = onlineSelfInfo();
    byId.set(self.id, self);
  }
  return Array.from(byId.values()).sort((a,b)=>String(a.nickname||'').localeCompare(String(b.nickname||''),'ko'));
}
function updateOnlineBadge(){
  const badge = $('onlineBadge');
  if(!badge) return;
  const count = Math.max(1, normalizeOnlineList().length);
  badge.textContent = `온라인 ${count}명`;
}
function bindOnlineBadge(){
  const badge = $('onlineBadge');
  if(!badge || onlineBadgeBound) return;
  onlineBadgeBound = true;

  updateOnlineBadge();
}
function showOnlineListModal(){
  const list = normalizeOnlineList();
  const rows = list.map(u=>{
    const nick = escapeText(u.nickname || '이름 없음');
    const cls = escapeText(u.className || '-');
    const lv = Number(u.level || 0) ? `Lv.${Number(u.level||1)}` : '-';
    const floor = Number(u.floor || 0) ? `${Number(u.floor||1)}층` : '-';
    const mode = escapeText(u.mode || 'local');
    const slot = escapeText(u.slot == null ? '-' : String(u.slot));
    return `<div class="onlineUserCard"><h4>${nick}</h4><p>${lv} / ${floor} · ${cls}</p><p>접속: ${mode} · 슬롯 ${slot}</p></div>`;
  }).join('') || '<p class="muted">현재 표시할 접속자가 없습니다.</p>';
  showModal(`<h2>온라인 접속 인원</h2><p class="muted">현재 온라인 ${list.length}명</p><div class="onlineListBox">${rows}</div>${makeCloseBar()}`, false);
}
async function syncOnlinePresence(force=false){
  bindOnlineBadge();
  const now = Date.now();
  if(!force && now - onlineLastTrackAt < 12000) return;
  onlineLastTrackAt = now;
  const self = onlineSelfInfo();
  onlinePresenceStateCache = onlinePresenceStateCache || {};
  onlinePresenceStateCache[ONLINE_CLIENT_ID] = [self];
  updateOnlineBadge();
  const client = getCloudClient && getCloudClient();
  if(!client || typeof client.channel !== 'function') return;
  const sig = (cloudClientSignature || '') + '|' + ONLINE_CLIENT_ID;
  try{
    if(!onlineChannel || onlinePresenceSignature !== sig){
      if(onlineChannel && typeof client.removeChannel === 'function'){
        try{ await client.removeChannel(onlineChannel); }catch(e){}
      }
      onlinePresenceSignature = sig;
      onlineChannel = client.channel(ONLINE_PRESENCE_CHANNEL, {config:{presence:{key:ONLINE_CLIENT_ID}}});
      onlineChannel.on('presence', {event:'sync'}, ()=>{
        try{ onlinePresenceStateCache = onlineChannel.presenceState() || onlinePresenceStateCache; }catch(e){}
        updateOnlineBadge();
      });
      onlineChannel.subscribe(async status=>{
        if(status === 'SUBSCRIBED'){
          try{ await onlineChannel.track(onlineSelfInfo()); }catch(e){}
          try{ onlinePresenceStateCache = onlineChannel.presenceState() || onlinePresenceStateCache; }catch(e){}
          updateOnlineBadge();
        }
      });
    }else if(onlineChannel && typeof onlineChannel.track === 'function'){
      await onlineChannel.track(self);
    }
  }catch(e){
    updateOnlineBadge();
  }
}
try{
  window.addEventListener('beforeunload', ()=>{
    try{ if(onlineChannel && typeof onlineChannel.untrack === 'function') onlineChannel.untrack(); }catch(e){}
  });
  setInterval(()=>syncOnlinePresence(true), 15000);
}catch(e){}

function normalizeStoredRankRecord(rec, fallbackNick){
  if(!rec || typeof rec !== 'object') return null;
  const nick = rec.nickname || fallbackNick || '이름 없음';
  const cls = rec.className || '-';
  const level = Number(rec.level || 1);
  const floor = Number(rec.floor || 1);
  const combatPower = Number(rec.combatPower || 0);
  const score = Number(rec.score || 0);
  if(!score && !combatPower && floor <= 1 && level <= 1) return null;
  return {
    nickname:String(nick),
    className:String(cls),
    level:clamp(Math.max(1, level), 1, MAX_LEVEL),
    floor:Math.max(1, floor),
    combatPower:Math.max(0, combatPower),
    score:Math.max(0, score),
    updatedAt:rec.updatedAt || new Date().toISOString()
  };
}
function compareRankRecords(a,b){
  const ar = normalizeStoredRankRecord(a) || {score:0,combatPower:0,floor:0,level:0};
  const br = normalizeStoredRankRecord(b) || {score:0,combatPower:0,floor:0,level:0};
  return (ar.score-br.score) || (ar.combatPower-br.combatPower) || (ar.floor-br.floor) || (ar.level-br.level);
}
function rankRecordFromRun(run, metaObj, fallbackNick){
  const p = run && run.player ? run.player : null;
  if(!p) return null;
  return {
    nickname:String(fallbackNick || p.name || p.className || '이름 없음'),
    className:String(p.className || (classes[p.classId]||classes.warrior).name),
    level:clamp(Number(p.level || 1), 1, MAX_LEVEL),
    floor:Number(p.floor || 1),
    combatPower:Number(combatPowerForRun(run, metaObj || meta || {})),
    score:Number(rankingScoreForRun(run, metaObj || meta || {})),
    updatedAt:new Date().toISOString()
  };
}
function chooseBestRankRecord(prev, current){
  const p = normalizeStoredRankRecord(prev);
  const c = normalizeStoredRankRecord(current);
  if(!p) return c;
  if(!c) return p;
  return compareRankRecords(c,p) > 0 ? c : p;
}
buildRankRecordFromCharacter = function(ch, metaObj, fallbackNick){
  if(!ch || typeof ch !== 'object') return null;
  const savedBest = normalizeStoredRankRecord(ch.bestRank || ch.rankRecord, ch.nickname || fallbackNick);
  const current = ch.run && ch.run.player ? rankRecordFromRun(ch.run, metaObj, ch.nickname || fallbackNick) : null;
  return chooseBestRankRecord(savedBest, current);
};
normalizeCharacterSlots = function(slots, count){
  const arr = Array.isArray(slots) ? slots.slice(0,count) : [];
  while(arr.length < count) arr.push(null);
  return arr.map(ch=>{
    if(!ch || typeof ch !== 'object') return null;
    const run = ch.run || null;
    const p = run && run.player ? run.player : null;
    if(!p && !(ch.bestRank || ch.rankRecord)) return null;
    const clsId = ch.classId || (p && p.classId) || 'warrior';
    const cls = classes[clsId] || classes.warrior;
    const nickname = ch.nickname || (p && p.name) || (ch.bestRank && ch.bestRank.nickname) || cls.name || '이름 없음';
    const current = p ? rankRecordFromRun(run, meta || {}, nickname) : null;
    const bestRank = chooseBestRankRecord(ch.bestRank || ch.rankRecord, current);
    return {
      nickname,
      classId:clsId,
      className:ch.className || (p && p.className) || cls.name,
      level:Number((p && p.level) || ch.level || 1),
      floor:Number((p && p.floor) || ch.floor || 1),
      combatPower:Number((current && current.combatPower) || ch.combatPower || 0),
      score:Number((current && current.score) || ch.score || 0),
      updatedAt:ch.updatedAt || (bestRank && bestRank.updatedAt) || new Date().toISOString(),
      bestRank,
      run
    };
  });
};

function soulUpgradeZeroState(){

function soulUpgradeSpentFor(id, lv){
  const d = metaDefs.find(x=>x.id===id);
  const n = Math.max(0, Number(lv || 0));
  if(!d) return 0;
  let total = 0;
  for(let i=0;i<n;i++) total += Math.floor(d.base * Math.pow(1.55, i));
  return total;
}
function totalSoulSpentForUpgrades(upgrades){
  const u = upgrades || (meta && meta.upgrades) || {};
  return metaDefs.reduce((sum,d)=>sum + soulUpgradeSpentFor(d.id, u[d.id] || 0), 0);
}
function soulUpgradeRefundAmount(upgrades){
  return Math.floor(totalSoulSpentForUpgrades(upgrades) / 2);
}
function soulUpgradeBonusInfo(upgrades){

  const hp = Number(u.hp || 0) * 5;
  const atk = Number(u.atk || 0);

  const crit = Number(u.crit || 0) * 2;

  const spent = totalSoulSpentForUpgrades(meta.upgrades);
  const refund = soulUpgradeRefundAmount(meta.upgrades);
  const rows = metaDefs.map(d=>{
    const lv=meta.upgrades[d.id]||0; const cost=metaCost(d.id); const full=lv>=d.max;
    const used=soulUpgradeSpentFor(d.id, lv);
    return `<div class="metaRow"><div><h4>${d.name} <span class="muted">Lv.${lv}/${d.max}</span></h4><p>${d.desc}</p><p class="muted">사용 영혼 ${used.toLocaleString()} · 초기화 환급 예상 ${Math.floor(used/2).toLocaleString()}</p></div><button class="btn smallbtn ${full?'':'good'}" data-up="${d.id}" ${full?'disabled':''}>${full?'완료':cost+' 영혼'}</button></div>`;
  }).join('');
  showModal(`<h2>영혼 강화</h2>
    <p class="muted">슬롯 캐릭터들이 보유한 영혼까지 합산해서 강화합니다. 현재 통합 영혼: <b class="legend">${totalSoulAvailable(soulMode).toLocaleString()}</b></p>
    <p class="muted">누적 사용 영혼: <b>${spent.toLocaleString()}</b> · 초기화 시 환급: <b class="legend">${refund.toLocaleString()}</b></p>
    ${rows}
    <div class="grid2" style="margin-top:12px"><button class="btn" id="backStart">캐릭터 슬롯</button><button class="btn bad" id="resetMeta">강화 초기화</button></div>`, true);
  modalCard.querySelectorAll('[data-up]').forEach(btn=>btn.onclick=()=>{
    const id=btn.dataset.up; const d=metaDefs.find(x=>x.id===id); const lv=meta.upgrades[id]||0; const cost=metaCost(id);
    if(lv>=d.max) return;
    if(totalSoulAvailable(soulMode)<cost){toast('영혼이 부족합니다.'); return;}
    if(!spendPooledSouls(cost, soulMode)){toast('영혼이 부족합니다.'); return;}
    meta.upgrades[id]=lv+1;
    saveMeta();
    showMeta();
  });
  $('backStart').onclick=()=>showCharacterSlots(isCloudLoginMode(soulMode) ? soulMode : 'guest');
  $('resetMeta').onclick=()=>{
    if(resetSoulUpgradesWithHalfRefund()) showMeta();
  };
};

const CONTROL_LAYOUT_KEY = 'abyss_control_layout_v3';
const GAME_ZOOM_KEY = 'abyss_game_zoom_v1';
const DEFAULT_ACTION_ORDER = ['skill1','skill2','skill3','potionBtn','attackBtn'];
const DEFAULT_MENU_ORDER = ['statMenuBtn','equipMenuBtn','bagMenuBtn','skillMenuBtn','autoBtn','mapMenuBtn','codexMenuBtn','logChatBtn','rankingMenuBtn','menuMenuBtn'];

function clampGameZoom(v){
  return Math.max(0.85, Math.min(1.85, Number(v)||1));
}
let gameZoomValue = clampGameZoom(localStorage.getItem(GAME_ZOOM_KEY) || 1);
function applyGameZoom(){
  document.documentElement.style.setProperty('--gameZoom', String(clampGameZoom(gameZoomValue).toFixed(2)));
}
function setGameZoom(v){
  gameZoomValue = clampGameZoom(v);
  localStorage.setItem(GAME_ZOOM_KEY, String(gameZoomValue.toFixed(2)));
  applyGameZoom();
}
function normalizedOrder(saved, defaults){
  const arr = Array.isArray(saved) ? saved.filter(id=>defaults.includes(id)) : [];
  defaults.forEach(id=>{ if(!arr.includes(id)) arr.push(id); });
  return arr;
}
function loadControlLayout(){
  let data = null;
  try{ data = JSON.parse(localStorage.getItem(CONTROL_LAYOUT_KEY) || 'null'); }catch(e){}
  if(!data){
    try{ data = JSON.parse(localStorage.getItem('abyss_control_layout_v2') || 'null'); }catch(e){}
  }
  return {
    analog: data?.analog === 'right' ? 'right' : 'left',
    actionOrder: normalizedOrder(data?.actionOrder, DEFAULT_ACTION_ORDER),
    menuOrder: normalizedOrder(data?.menuOrder, DEFAULT_MENU_ORDER)
  };
}
function saveControlLayout(layout){
  localStorage.setItem(CONTROL_LAYOUT_KEY, JSON.stringify({
    analog: layout.analog === 'right' ? 'right' : 'left',
    actionOrder: normalizedOrder(layout.actionOrder, DEFAULT_ACTION_ORDER),
    menuOrder: normalizedOrder(layout.menuOrder, DEFAULT_MENU_ORDER)
  }));
}
function applyControlLayout(){
  const layout = loadControlLayout();
  const app = $('app');
  if(app) app.classList.toggle('layoutAnalogRight', layout.analog === 'right');
  const skillBar = document.querySelector('.skillbar');
  if(skillBar){
    layout.actionOrder.forEach(id=>{
      const el = $(id);
      if(el && el.parentElement === skillBar) skillBar.appendChild(el);
    });
  }
  const menuBar = document.querySelector('.menubar');
  if(menuBar){
    layout.menuOrder.forEach(id=>{
      const el = $(id);
      if(el && el.parentElement === menuBar) menuBar.appendChild(el);
    });
  }
  const menuBtn = $('menuMenuBtn');
  if(menuBtn){
    const b = menuBtn.querySelector('b');
    if(b) b.textContent = '설정';
  }
}

  const layout = loadControlLayout();
  showModal(`<h2>키맵핑</h2>${renderKeymapPreview(layout)}`, false);
  bindKeymapModalHandlers();
}
function bindKeymapModalHandlers(){
  const getLayout = () => loadControlLayout();
  const setSide = side => {
    const layout = getLayout();
    layout.analog = side === 'right' ? 'right' : 'left';
    saveControlLayout(layout);
    applyControlLayout();
    showKeymapMenu();
  };
  const leftBtn = $('keymapAnalogLeftBtn');
  const rightBtn = $('keymapAnalogRightBtn');
  const resetBtn = $('keymapResetBtn');
  const doneBtn = $('keymapDoneBtn');
  if(leftBtn) leftBtn.onclick = () => setSide('left');
  if(rightBtn) rightBtn.onclick = () => setSide('right');
  if(resetBtn) resetBtn.onclick = () => {
    saveControlLayout({analog:'left', actionOrder:[...DEFAULT_ACTION_ORDER], menuOrder:[...DEFAULT_MENU_ORDER]});
    applyControlLayout();
    showKeymapMenu();
  };
  if(doneBtn) doneBtn.onclick = () => { hideModal(); renderAll(); };

  const analog = $('keymapAnalogPreview');
  if(analog){
    let startX=0, startY=0, pid=null;
    analog.addEventListener('pointerdown', e=>{
      pid=e.pointerId; startX=e.clientX; startY=e.clientY;
      analog.setPointerCapture?.(pid);
      analog.classList.add('dragging');
      analog.style.transition='none';
      e.preventDefault();
    });
    analog.addEventListener('pointermove', e=>{
      if(pid!==e.pointerId) return;
      const dx=e.clientX-startX, dy=e.clientY-startY;
      analog.style.transform=`translate(${dx}px,${dy}px) scale(1.04)`;
    });
    const finish=e=>{
      if(pid!==e.pointerId) return;
      const side = e.clientX > window.innerWidth/2 ? 'right' : 'left';
      analog.style.transition='transform .18s ease';
      analog.style.transform='';
      analog.classList.remove('dragging');
      pid=null;
      setTimeout(()=>setSide(side), 80);
    };
    analog.addEventListener('pointerup', finish);
    analog.addEventListener('pointercancel', ()=>{ analog.style.transition=''; analog.style.transform=''; analog.classList.remove('dragging'); pid=null; });
  }

  function bindSortableList(listId, orderKey){
    const list = $(listId);
    if(!list) return;

    const animateReflow = (mutate)=>{
      const moving = [...list.querySelectorAll('.keymapBtnItem:not(.dragging)')];
      const first = new Map(moving.map(el=>[el, el.getBoundingClientRect()]));
      mutate();
      requestAnimationFrame(()=>{
        moving.forEach(el=>{
          const a = first.get(el);
          if(!a || !el.isConnected) return;
          const b = el.getBoundingClientRect();
          const dx = a.left - b.left;
          const dy = a.top - b.top;
          if(Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
          el.classList.add('moving');
          el.style.transition = 'none';
          el.style.transform = `translate(${dx}px,${dy}px)`;
          requestAnimationFrame(()=>{
            el.style.transition = 'transform .16s ease';
            el.style.transform = '';
            setTimeout(()=>{ el.classList.remove('moving'); el.style.transition=''; }, 180);
          });
        });
      });
    };

    let dragId=null, dragEl=null, placeholder=null, pid=null, grabX=0, grabY=0;
    const defaults = orderKey === 'menuOrder' ? DEFAULT_MENU_ORDER : DEFAULT_ACTION_ORDER;
    const clearDrop = ()=>list.querySelectorAll('.keymapBtnItem').forEach(x=>x.classList.remove('dropTarget'));
    const cleanupDrag = ()=>{
      if(dragEl){
        dragEl.classList.remove('dragging');
        dragEl.style.left=''; dragEl.style.top=''; dragEl.style.width=''; dragEl.style.height='';
        dragEl.style.setProperty('--drag-w',''); dragEl.style.setProperty('--drag-h','');
        dragEl.style.zIndex=''; dragEl.style.pointerEvents=''; dragEl.style.transform=''; dragEl.style.transition='';
      }
      if(placeholder && placeholder.parentNode) placeholder.remove();
      clearDrop();
      dragId=null; dragEl=null; placeholder=null; pid=null;
    };
    const readOrderFromDom = ()=>{
      const order=[];
      [...list.children].forEach(el=>{
        if(el === placeholder){ if(dragId) order.push(dragId); return; }
        if(el === dragEl) return;
        const id = el.dataset?.keymapBtn;
        if(id && defaults.includes(id) && !order.includes(id)) order.push(id);
      });
      defaults.forEach(id=>{ if(!order.includes(id)) order.push(id); });
      return order;
    };
    const movePlaceholderNear = (target, clientX, clientY)=>{
      if(!target || target === dragEl || target === placeholder || target.closest(`#${listId}`) !== list) return;
      const r = target.getBoundingClientRect();
      const horizontal = getComputedStyle(list).gridTemplateColumns.split(' ').length > 1;
      const before = horizontal ? clientX < r.left + r.width/2 : clientY < r.top + r.height/2;
      const nextNode = before ? target : target.nextSibling;
      if(nextNode === placeholder) return;
      animateReflow(()=>list.insertBefore(placeholder, nextNode));
    };

    list.querySelectorAll('.keymapBtnItem').forEach(item=>{
      item.addEventListener('pointerdown', e=>{
        dragId = item.dataset.keymapBtn;
        if(!dragId) return;
        dragEl = item;
        pid = e.pointerId;
        const rect = item.getBoundingClientRect();
        grabX = e.clientX - rect.left;
        grabY = e.clientY - rect.top;
        placeholder = document.createElement('div');
        placeholder.className = 'keymapBtnItem keymapPlaceholder';
        placeholder.textContent = '빈자리';
        placeholder.style.minHeight = rect.height + 'px';
        list.insertBefore(placeholder, item.nextSibling);
        item.setPointerCapture?.(pid);
        item.style.setProperty('--drag-w', rect.width + 'px');
        item.style.setProperty('--drag-h', rect.height + 'px');
        item.style.left = rect.left + 'px';
        item.style.top = rect.top + 'px';
        item.classList.add('dragging');
        e.preventDefault();
        e.stopPropagation();
      });

      item.addEventListener('pointermove', e=>{
        if(!dragId || dragEl!==item || pid!==e.pointerId) return;
        item.style.left = (e.clientX - grabX) + 'px';
        item.style.top = (e.clientY - grabY) + 'px';
        const under = document.elementFromPoint(e.clientX, e.clientY)?.closest?.('.keymapBtnItem');
        clearDrop();
        if(under && under !== item && under !== placeholder && under.closest(`#${listId}`) === list){
          under.classList.add('dropTarget');
          movePlaceholderNear(under, e.clientX, e.clientY);
        }
        e.preventDefault();
      });

      const finish = e=>{
        if(!dragId || dragEl!==item || pid!==e.pointerId) return;
        const layout = getLayout();
        layout[orderKey] = normalizedOrder(readOrderFromDom(), defaults);
        saveControlLayout(layout);
        applyControlLayout();
        cleanupDrag();
        setTimeout(showKeymapMenu, 70);
        e.preventDefault();
        e.stopPropagation();
      };

      item.addEventListener('pointerup', finish);
      item.addEventListener('pointercancel', cleanupDrag);
      item.addEventListener('lostpointercapture', ()=>{
        if(dragEl === item) cleanupDrag();
      });
    });
  }
  bindSortableList('keymapActionList', 'actionOrder');
  bindSortableList('keymapMenuList', 'menuOrder');
}

function bindGamePinchZoom(){
  applyGameZoom();
  const panel = $('gamePanel');
  if(!panel || panel.dataset.pinchBound === '1') return;
  panel.dataset.pinchBound = '1';
  const points = new Map();
  let startDist = 0;
  let startZoom = gameZoomValue;
  const dist = (a,b)=>Math.hypot(a.x-b.x, a.y-b.y);
  const resetStart = ()=>{
    const arr=[...points.values()];
    if(arr.length>=2){
      startDist = dist(arr[0], arr[1]) || 1;
      startZoom = gameZoomValue;
    }
  };
  panel.addEventListener('pointerdown', e=>{
    if(modal && modal.classList.contains('show')) return;
    points.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(points.size===2) resetStart();
  }, {passive:false});
  panel.addEventListener('pointermove', e=>{
    if(!points.has(e.pointerId)) return;
    points.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(points.size>=2){
      e.preventDefault();
      const arr=[...points.values()];
      const d = dist(arr[0],arr[1]) || startDist || 1;
      setGameZoom(startZoom * (d / (startDist || d || 1)));
    }
  }, {passive:false});
  ['pointerup','pointercancel','pointerleave'].forEach(type=>{
    panel.addEventListener(type, e=>{
      points.delete(e.pointerId);
      if(points.size<2){ startDist=0; startZoom=gameZoomValue; }
      else resetStart();
    }, {passive:false});
  });
  window.addEventListener('blur', ()=>points.clear());
}

function animateKeymapLiveReflow(mutate){
  const els = keymapLiveElements().filter(el=>el.isConnected);
  const first = new Map(els.map(el=>[el, el.getBoundingClientRect()]));
  mutate();
  requestAnimationFrame(()=>{
    els.forEach(el=>{
      if(!el.isConnected) return;
      const a=first.get(el);
      if(!a) return;
      const b=el.getBoundingClientRect();
      const dx=a.left-b.left;
      const dy=a.top-b.top;
      if(Math.abs(dx)<1 && Math.abs(dy)<1) return;
      el.classList.add('keymapLiveMoving');
      const prevTransition=el.style.transition;
      const prevTransform=el.style.transform;
      el.style.transition='none';
      el.style.transform=`translate(${dx}px,${dy}px)`;
      requestAnimationFrame(()=>{
        el.style.transition='transform .18s ease';
        el.style.transform=prevTransform || '';
        setTimeout(()=>{
          el.classList.remove('keymapLiveMoving');
          el.style.transition=prevTransition || '';
        }, 210);
      });
    });
  });
}

function bindGameZoomResetTouch(){
  const panel=$('gamePanel');
  if(!panel || panel.dataset.zoomResetBound==='1') return;
  panel.dataset.zoomResetBound='1';
  let started=false, startAt=0, lastResetTap=0, sx=0, sy=0;
  panel.addEventListener('touchstart', e=>{
    if(e.touches && e.touches.length===2){
      started=true;
      startAt=Date.now();
      sx=(e.touches[0].clientX+e.touches[1].clientX)/2;
      sy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    }else{
      started=false;
    }
  }, {passive:true});
  panel.addEventListener('touchend', e=>{
    if(!started) return;
    const dt=Date.now()-startAt;
    started=false;
    if(dt>280) return;
    const now=Date.now();
    if(now-lastResetTap<520){
      setGameZoom(1);
      toast('화면 배율 100%');
      lastResetTap=0;
    }else{
      lastResetTap=now;
    }
  }, {passive:true});
}

    animateKeymapLiveReflow(()=>applyControlLayoutLive(keymapLiveSession.working));
  };

  document.addEventListener('pointermove', move, true);
  document.addEventListener('pointerup', finish, true);
  document.addEventListener('pointercancel', cancel, true);
  e.preventDefault();
  e.stopPropagation();
};

startLiveAnalogDrag = function(e){
  if(!keymapLiveSession) return;
  const pad = $('analogPad');
  if(!pad) return;
  const parent = pad.parentElement;
  if(!parent) return;

  const rect = pad.getBoundingClientRect();
  const grabX = e.clientX - rect.left;
  const grabY = e.clientY - rect.top;
  const startX = e.clientX;
  const startSide = keymapLiveSession.working.analog;
  let candidate = startSide;

  const placeholder = document.createElement('div');
  placeholder.className = 'controls keymapLivePlaceholder keymapAnalogPlaceholder';
  placeholder.setAttribute('aria-hidden','true');
  placeholder.style.width = rect.width + 'px';
  placeholder.style.height = rect.height + 'px';
  placeholder.style.minWidth = rect.width + 'px';
  placeholder.style.minHeight = rect.height + 'px';
  placeholder.style.maxWidth = rect.width + 'px';
  placeholder.style.maxHeight = rect.height + 'px';
  placeholder.style.flex = '0 0 ' + rect.width + 'px';

  const next = pad.nextSibling;
  parent.insertBefore(placeholder, next);
  document.body.appendChild(pad);

  pad.classList.add('keymapLiveDragging','keymapLiveTarget');
  pad.style.setProperty('--live-drag-w', rect.width + 'px');
  pad.style.setProperty('--live-drag-h', rect.height + 'px');
  pad.style.width = rect.width + 'px';
  pad.style.height = rect.height + 'px';
  pad.style.minWidth = rect.width + 'px';
  pad.style.minHeight = rect.height + 'px';
  pad.style.maxWidth = rect.width + 'px';
  pad.style.maxHeight = rect.height + 'px';
  pad.style.left = rect.left + 'px';
  pad.style.top = rect.top + 'px';
  pad.style.transform = 'none';

  let pid = e.pointerId;
  try{ pad.setPointerCapture?.(pid); }catch(err){}

  const decideSide = ev=>{
    const dx = ev.clientX - startX;
    if(startSide === 'left'){
      return (dx > 45 || ev.clientX > window.innerWidth * 0.53) ? 'right' : 'left';
    }
    return (dx < -45 || ev.clientX < window.innerWidth * 0.47) ? 'left' : 'right';
  };

  const move = ev=>{
    if(ev.pointerId !== pid) return;
    const left = ev.clientX - grabX;
    const top = ev.clientY - grabY;
    pad.style.left = left + 'px';
    pad.style.top = top + 'px';
    candidate = decideSide(ev);
    ev.preventDefault();
  };
  const cleanup = ()=>{
    document.removeEventListener('pointermove', move, true);
    document.removeEventListener('pointerup', finish, true);
    document.removeEventListener('pointercancel', cancel, true);
  };
  const restorePadInline = ()=>{
    pad.classList.remove('keymapLiveDragging','keymapLiveTarget');
    pad.style.left=''; pad.style.top='';
    pad.style.width=''; pad.style.height='';
    pad.style.minWidth=''; pad.style.minHeight='';
    pad.style.maxWidth=''; pad.style.maxHeight='';
    pad.style.flex='';
    pad.style.transition='';
    pad.style.transform='';
    pad.style.removeProperty('--live-drag-w');
    pad.style.removeProperty('--live-drag-h');
  };
  const finish = ev=>{
    if(ev.pointerId !== pid) return;
    cleanup();
    parent.insertBefore(pad, placeholder);
    placeholder.remove();
    restorePadInline();
    keymapLiveSession.working.analog = candidate;
    animateKeymapLiveReflow(()=>applyControlLayoutLive(keymapLiveSession.working));
    updateKeymapLiveWorkingFromDom();
    positionKeymapLiveBarAtLog();
    ev.preventDefault();
    ev.stopPropagation();
  };
  const cancel = ev=>{
    cleanup();
    parent.insertBefore(pad, placeholder);
    placeholder.remove();
    restorePadInline();
    animateKeymapLiveReflow(()=>applyControlLayoutLive(keymapLiveSession.working));
    positionKeymapLiveBarAtLog();
  };

  document.addEventListener('pointermove', move, true);
  document.addEventListener('pointerup', finish, true);
  document.addEventListener('pointercancel', cancel, true);
  e.preventDefault();
  e.stopPropagation();
};


function keymapActualRectSize(el){
  const r = el.getBoundingClientRect();
  return { w: Math.max(1, Math.round(r.width)), h: Math.max(1, Math.round(r.height)) };
}
function setLiveDragSizeVars(el, w, h){
  if(!el) return;
  el.style.setProperty('--live-drag-w', w + 'px');
  el.style.setProperty('--live-drag-h', h + 'px');
}
function lockLiveDragBox(el, w, h){
  if(!el) return;
  setLiveDragSizeVars(el, w, h);
  el.style.width = w + 'px';
  el.style.height = h + 'px';
  el.style.minWidth = w + 'px';
  el.style.maxWidth = w + 'px';
  el.style.minHeight = h + 'px';
  el.style.maxHeight = h + 'px';
  el.style.boxSizing = 'border-box';
  el.style.transform = 'none';
  el.style.transition = 'none';
}
function clearLiveDragBox(el){
  if(!el) return;
  el.style.left=''; el.style.top='';
  el.style.width=''; el.style.height='';
  el.style.minWidth=''; el.style.maxWidth='';
  el.style.minHeight=''; el.style.maxHeight='';
  el.style.boxSizing='';
  el.style.transform='';
  el.style.transition='';
  el.style.flex='';
  el.style.pointerEvents='';
  el.style.removeProperty('--live-drag-w');
  el.style.removeProperty('--live-drag-h');
}
function keymapSwapGroupElements(){
  return [$('analogPad'), document.querySelector('.rightui')].filter(Boolean);
}
function animateKeymapSwapAsBundle(mutate){
  const els = keymapSwapGroupElements().filter(el=>el.isConnected);
  const first = new Map(els.map(el=>[el, el.getBoundingClientRect()]));
  const rightui = document.querySelector('.rightui');
  const rightRect = rightui ? rightui.getBoundingClientRect() : null;
  if(rightui && rightRect && rightRect.width > 0){
    rightui.style.setProperty('--keymap-bundle-w', Math.round(rightRect.width) + 'px');
    rightui.classList.add('keymapBundleLocked');
  }
  mutate();
  requestAnimationFrame(()=>{
    els.forEach(el=>{
      if(!el.isConnected) return;
      const a = first.get(el);
      if(!a) return;
      const b = el.getBoundingClientRect();
      const dx = a.left - b.left;
      const dy = a.top - b.top;
      if(Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
      const prevTransition = el.style.transition;
      const prevTransform = el.style.transform;
      el.classList.add('keymapLiveMoving');
      el.style.transition = 'none';
      el.style.transform = `translate(${dx}px,${dy}px)`;
      requestAnimationFrame(()=>{
        el.style.transition = 'transform .18s ease';
        el.style.transform = prevTransform || '';
        setTimeout(()=>{
          el.classList.remove('keymapLiveMoving');
          el.style.transition = prevTransition || '';
        }, 210);
      });
    });
    setTimeout(()=>{
      if(rightui){
        rightui.classList.remove('keymapBundleLocked');
        rightui.style.removeProperty('--keymap-bundle-w');
      }
    }, 240);
  });
}

(function(){
  const KEYMAP_SMOOTH_MS = 340;
  const KEYMAP_SMOOTH_EASING = 'cubic-bezier(.22,1,.36,1)';
  const activeFlipAnims = new WeakMap();

  function cancelFlip(el){
    const prev = activeFlipAnims.get(el);
    if(prev){
      try{ prev.cancel(); }catch(e){}
      activeFlipAnims.delete(el);
    }
  }

  function smoothFlipElement(el, firstRect, duration){
    if(!el || !el.isConnected || !firstRect) return;
    const lastRect = el.getBoundingClientRect();
    const dx = firstRect.left - lastRect.left;
    const dy = firstRect.top - lastRect.top;
    if(Math.abs(dx) < 0.5 && Math.abs(dy) < 0.5) return;

    cancelFlip(el);
    el.classList.add('keymapLiveMoving');
    el.style.willChange = 'transform';

    if(typeof el.animate === 'function'){
      const anim = el.animate(
        [
          { transform:`translate3d(${dx}px,${dy}px,0)` },
          { transform:'translate3d(0,0,0)' }
        ],
        { duration, easing:KEYMAP_SMOOTH_EASING, fill:'none' }
      );
      activeFlipAnims.set(el, anim);
      anim.onfinish = anim.oncancel = ()=>{
        if(activeFlipAnims.get(el) === anim) activeFlipAnims.delete(el);
        el.classList.remove('keymapLiveMoving');
        el.style.willChange = '';
      };
      return;
    }

    const prevTransition = el.style.transition;
    const prevTransform = el.style.transform;
    el.style.transition = 'none';
    el.style.transform = `translate3d(${dx}px,${dy}px,0)`;
    requestAnimationFrame(()=>{
      el.style.transition = `transform ${duration}ms ${KEYMAP_SMOOTH_EASING}`;
      el.style.transform = prevTransform || '';
      setTimeout(()=>{
        el.classList.remove('keymapLiveMoving');
        el.style.transition = prevTransition || '';
        el.style.willChange = '';
      }, duration + 30);
    });
  }

  function collectLiveRects(elements){
    return new Map(elements.filter(el=>el && el.isConnected).map(el=>[el, el.getBoundingClientRect()]));
  }

  animateKeymapLiveReflow = function(mutate){
    const els = keymapLiveElements().filter(el=>el && el.isConnected && !el.classList.contains('keymapLiveDragging'));
    const first = collectLiveRects(els);
    mutate();
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        els.forEach(el=>smoothFlipElement(el, first.get(el), KEYMAP_SMOOTH_MS));
      });
    });
  };

  animateKeymapSwapAsBundle = function(mutate){
    const pad = $('analogPad');
    const rightui = document.querySelector('.rightui');
    const footer = document.querySelector('.footer');
    const els = [pad, rightui, footer].filter(el=>el && el.isConnected && !el.classList.contains('keymapLiveDragging'));
    const first = collectLiveRects(els);
    const rightRect = rightui ? rightui.getBoundingClientRect() : null;

    if(rightui && rightRect && rightRect.width > 0){
      rightui.style.setProperty('--keymap-bundle-w', Math.round(rightRect.width) + 'px');
      rightui.classList.add('keymapBundleLocked');
    }

    mutate();

    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        els.forEach(el=>smoothFlipElement(el, first.get(el), 380));
        setTimeout(()=>{
          if(rightui){
            rightui.classList.remove('keymapBundleLocked');
            rightui.style.removeProperty('--keymap-bundle-w');
          }
          if(typeof positionKeymapLiveBarAboveAnalog === 'function') positionKeymapLiveBarAboveAnalog();
        }, 430);
      });
    });
  };

  const keymapSmoothStyle = document.createElement('style');
  keymapSmoothStyle.textContent = `
    body.liveKeymapMode .footer,
    body.liveKeymapMode .rightui,
    body.liveKeymapMode #analogPad,
    body.liveKeymapMode .skillbar,
    body.liveKeymapMode .menubar,
    body.liveKeymapMode .skill,
    body.liveKeymapMode .menuBtn{
      transition:transform 340ms cubic-bezier(.22,1,.36,1), order 340ms cubic-bezier(.22,1,.36,1), opacity 180ms ease, box-shadow 180ms ease!important;
    }
    body.liveKeymapMode .keymapLiveMoving{
      will-change:transform!important;
    }
    body.liveKeymapMode .keymapLiveDragging{
      transition:none!important;
    }
  `;
  document.head.appendChild(keymapSmoothStyle);
})();

function handleDesktopShortcut(e){
  if(e.target && ['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return false;
  if(e.repeat) return false;
  const k = e.key.toLowerCase();
  const block = ()=>{ e.preventDefault(); e.stopImmediatePropagation(); return true; };
  if(k==='e' && e.shiftKey){
    block();
    if(autoMode==='full') stopAuto(); else startFullAuto();
    return true;
  }
  if(k==='escape'){
    if(modalOpen && !document.body.classList.contains('startScreen')){ block(); hideModal(); renderAll(); return true; }
    return false;
  }
  if(modalOpen || !S) return false;
  if(k==='m' && e.shiftKey){ block(); showMapMenu(); return true; }
  if(k==='m'){ block(); toggleMiniMap(); return true; }
  if(k==='i' || k==='b'){ block(); showBagMenu(); return true; }
  if(k==='k'){ block(); showSkillMenu(); return true; }
  if(k==='c'){ block(); showStatsMenu(); return true; }
  if(k==='l'){ block(); toggleLogChatPanel(); return true; }
  if(k==='r'){ block(); showRankingMenu(); return true; }
  if(k==='o'){ block(); showSystemMenu(); return true; }
  if(k==='h'){ block(); showHelpMenu(); return true; }
  return false;
}
document.addEventListener('keydown', handleDesktopShortcut, true);

function canvasTileFromMouseEvent(e){
  const rect = canvas.getBoundingClientRect();
  if(!rect.width || !rect.height) return null;
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;
  if(x<0 || y<0 || x>1 || y>1) return null;
  return {tx:Math.floor(x*VIEW), ty:Math.floor(y*VIEW)};
}
function handlePcCanvasPointer(e){
  if(e.pointerType && e.pointerType !== 'mouse') return;
  if(isPhoneTabletLandscapeBlocked()) return;
  if(e.button===2){
    e.preventDefault();
    basicAttackButton();
    return;
  }
  if(e.button!==0 || !S || modalOpen) return;
  const tile = canvasTileFromMouseEvent(e);
  if(!tile) return;
  const center = Math.floor(VIEW/2);
  const rawDx = tile.tx - center;
  const rawDy = tile.ty - center;
  e.preventDefault();
  if(rawDx===0 && rawDy===0){ waitTurn(); return; }
  let dx=0, dy=0;
  if(Math.abs(rawDx) >= Math.abs(rawDy)) dx = rawDx>0 ? 1 : -1;
  else dy = rawDy>0 ? 1 : -1;
  if(S.player.awaitAim){ handleMove(dx,dy); return; }
  const targetX=S.player.x+dx, targetY=S.player.y+dy;
  const eTarget = enemyAt(targetX,targetY);
  if(eTarget){
    faceToward(eTarget.x,eTarget.y);
    playerAttack(eTarget,false);
    addLog('마우스 기본공격.');
    afterPlayerAction();
    return;
  }
  handleMove(dx,dy);
}
canvas.addEventListener('pointerdown', handlePcCanvasPointer);

}

function cloudUserProviderIds(user){
  const ids = [];
  try{
    const app = user && user.app_metadata ? user.app_metadata : {};
    if(app.provider) ids.push(String(app.provider));
    if(Array.isArray(app.providers)) app.providers.forEach(v=>ids.push(String(v)));
    if(Array.isArray(user.identities)){
      user.identities.forEach(it=>{
        if(it && it.provider) ids.push(String(it.provider));
        if(it && it.identity_data && it.identity_data.provider) ids.push(String(it.identity_data.provider));
      });
    }
  }catch(e){}
  return ids.map(v=>v.toLowerCase());
}
function cloudUserMatchesLoginMode(user, mode){
  const key = cloudProviderModeKey(mode);
  const ids = cloudUserProviderIds(user);
  if(key === 'naver') return ids.includes('custom:naver') || ids.includes('naver');
  return ids.includes('kakao');
}

  const mode = cloudProviderModeKey(activeLoginMode || localStorage.getItem(OAUTH_PENDING_MODE_KEY) || 'kakao');
  const {data,error} = await client.from('game_saves').select('save_data, meta_data, updated_at').eq('user_id', user.id).maybeSingle();
  if(error) throw error;

  const save = data && data.save_data ? data.save_data : {};
  const profiles = readProviderProfilesFromSave(save);

  ['kakao','naver'].forEach(key=>{
    const profile = profiles[key];
    const profileSlots = normalizeProviderProfileSlots(profile);
    if(profileSlots) cloudCharacterSlotsByMode[key] = profileSlots;
  });

  const activeProfile = providerProfileFromSave(save, mode);
  const activeProfileSlots = normalizeProviderProfileSlots(activeProfile);

  if(activeProfileSlots){

    cloudCharacterSlotsByMode.kakao = normalizeCharacterSlots(save.characters, 3);

      run:save
    }], 3);
  }else{
    cloudCharacterSlotsByMode[mode] = emptyCloudProviderSlots();

  const profileMeta = activeProfile && (activeProfile.meta_data || activeProfile.metaData || activeProfile.meta);
  if(profileMeta){
    meta = normalizeMeta(profileMeta || {});
  }else if(mode === 'kakao' && data && data.meta_data){
    meta = normalizeMeta(data.meta_data || {});
  }else{
    meta = emptyCloudProviderMeta();
  }

  syncCurrentCloudSlotsPointer(mode);
  return true;
};
saveCloudCharacterProfile = async function(){

function soulTrackingModeKey(mode){
  return isCloudLoginMode(mode) ? mode : 'guest';
}
function soulTrackingSlotKey(slotIndex){
  return String(Math.max(0, Number(slotIndex || 0)));
}
function ensureSoulContributionTracking(){
  if(!meta) meta = normalizeMeta({});
  if(!meta.soulSourceBySlot || typeof meta.soulSourceBySlot !== 'object') meta.soulSourceBySlot = {};
  if(!meta.soulSpentBySlot || typeof meta.soulSpentBySlot !== 'object') meta.soulSpentBySlot = {};
  ['guest','kakao','naver'].forEach(mode=>{
    if(!meta.soulSourceBySlot[mode] || typeof meta.soulSourceBySlot[mode] !== 'object') meta.soulSourceBySlot[mode] = {};
    if(!meta.soulSpentBySlot[mode] || typeof meta.soulSpentBySlot[mode] !== 'object') meta.soulSpentBySlot[mode] = {};
  });
}
function addSoulSourceForSlot(mode, slotIndex, amount){
  ensureSoulContributionTracking();
  const m = soulTrackingModeKey(mode);
  const k = soulTrackingSlotKey(slotIndex);
  const v = Math.max(0, Number(amount || 0));
  if(v <= 0) return;
  meta.soulSourceBySlot[m][k] = Math.max(0, Number(meta.soulSourceBySlot[m][k] || 0)) + v;
}
function addSoulSpentForSlot(mode, slotIndex, amount){
  ensureSoulContributionTracking();
  const m = soulTrackingModeKey(mode);
  const k = soulTrackingSlotKey(slotIndex);
  const v = Math.max(0, Number(amount || 0));
  if(v <= 0) return;
  meta.soulSpentBySlot[m][k] = Math.max(0, Number(meta.soulSpentBySlot[m][k] || 0)) + v;
}
function consumeTrackedMetaSouls(mode, amount){
  ensureSoulContributionTracking();
  const m = soulTrackingModeKey(mode);
  let remain = Math.max(0, Number(amount || 0));
  const source = meta.soulSourceBySlot[m] || {};
  Object.keys(source).sort((a,b)=>Number(a)-Number(b)).forEach(k=>{
    if(remain <= 0) return;
    const have = Math.max(0, Number(source[k] || 0));
    if(have <= 0) return;
    const use = Math.min(have, remain);
    source[k] = have - use;
    addSoulSpentForSlot(m, k, use);
    remain -= use;
  });
}
function lastSoulUpgradeCost(id, lv){
  const d = metaDefs.find(x=>x.id===id);
  if(!d || lv <= 0) return 0;
  return Math.floor(d.base * Math.pow(1.55, lv - 1));
}
function removeSoulUpgradesBySpentSoul(amount){
  let remain = Math.max(0, Number(amount || 0));
  let removed = 0;
  if(remain <= 0) return 0;
  meta.upgrades = Object.assign({hp:0, atk:0, def:0, crit:0, xp:0, gold:0}, meta.upgrades || {});
  while(remain > 0){
    let picked = null;
    let pickedCost = 0;
    metaDefs.forEach(d=>{
      const lv = Math.max(0, Number(meta.upgrades[d.id] || 0));
      const c = lastSoulUpgradeCost(d.id, lv);
      if(lv > 0 && c >= pickedCost){
        picked = d.id;
        pickedCost = c;
      }
    });
    if(!picked || pickedCost <= 0) break;
    meta.upgrades[picked] = Math.max(0, Number(meta.upgrades[picked] || 0) - 1);
    removed += pickedCost;
    remain -= pickedCost;
  }
  return removed;
}
function removeDeletedCharacterSoulImpact(mode, slotIndex){
  ensureSoulContributionTracking();
  const m = soulTrackingModeKey(mode);
  const k = soulTrackingSlotKey(slotIndex);
  const slots = normalizeCharacterSlots(getSlotsForMode(m), currentSlotLimit(m));
  const ch = slots[Number(k)] || null;
  const p = ch && ch.run && ch.run.player ? ch.run.player : null;
  const currentSlotSoul = p ? Math.max(0, Number(p.soulsRun || 0)) : 0;
  const unspentTracked = Math.max(0, Number((meta.soulSourceBySlot[m] || {})[k] || 0));
  const spentTracked = Math.max(0, Number((meta.soulSpentBySlot[m] || {})[k] || 0));

  if(unspentTracked > 0){
    meta.souls = Math.max(0, Number(meta.souls || 0) - unspentTracked);
    meta.soulSourceBySlot[m][k] = 0;
  }

  const removedUpgradeSoul = removeSoulUpgradesBySpentSoul(spentTracked);
  if(meta.soulSpentBySlot[m]) meta.soulSpentBySlot[m][k] = 0;
  if(meta.soulSourceBySlot[m]) meta.soulSourceBySlot[m][k] = 0;

  saveMeta();
  return {currentSlotSoul, unspentTracked, spentTracked, removedUpgradeSoul};
}
const previousSpendPooledSoulsForDeleteSoulTracking = spendPooledSouls;
spendPooledSouls = function(cost, mode){
  const safeMode = currentSoulPoolMode(mode);
  cost = Math.max(0, Number(cost || 0));
  if(totalSoulAvailable(safeMode) < cost) return false;
  let remain = cost;
  const metaUse = Math.min(Math.max(0, Number(meta.souls || 0)), remain);
  meta.souls = Math.max(0, Number(meta.souls || 0) - metaUse);
  consumeTrackedMetaSouls(safeMode, metaUse);
  remain -= metaUse;
  if(remain > 0){
    const slots = normalizeCharacterSlots(getSlotsForMode(safeMode), currentSlotLimit(safeMode));
    for(let i=0;i<slots.length;i++){
      if(remain <= 0) break;
      const ch = slots[i];
      const p = ch && ch.run && ch.run.player ? ch.run.player : null;
      if(!p || ch.run.dead) continue;
      const have = Math.max(0, Number(p.soulsRun || 0));
      if(have <= 0) continue;
      const use = Math.min(have, remain);
      p.soulsRun = have - use;
      ch.run.player.soulsRun = p.soulsRun;
      ch.updatedAt = new Date().toISOString();
      addSoulSpentForSlot(safeMode, i, use);
      remain -= use;
    }
    writeBackSoulSlots(safeMode, slots);
  }
  saveMeta();
  return true;
};
const previousGameOverForSoulSourceTracking = gameOver;
gameOver = function(retire){

  const slot = activeCharacterSlot != null ? activeCharacterSlot : ((S && S.characterSlotIndex != null) ? S.characterSlotIndex : null);
  const beforeSoul = Math.max(0, Number(meta && meta.souls || 0));
  const result = previousGameOverForSoulSourceTracking(retire);
  const afterSoul = Math.max(0, Number(meta && meta.souls || 0));
  const gained = Math.max(0, afterSoul - beforeSoul);
  if(slot != null && gained > 0){
    addSoulSourceForSlot(mode, slot, gained);
    saveMeta();
    if(isCloudLoginMode(mode)) queueCharacterCloudSave();
  }
  return result;
};

function lockedDoorAt(x,y, includeOpened=false){
  if(!S || !Array.isArray(S.lockedRooms)) return null;

const LOCKED_DOOR_ASSET_PATH = './assets/icons/object/door.png?v=door-clean-1';

function lockedRoomCells(room){
  return room && Array.isArray(room.cells)
    ? room.cells.filter(c=>c && Number.isFinite(c.x) && Number.isFinite(c.y))
    : [];
}

function lockedRoomBounds(room){
  const cells = lockedRoomCells(room);
  if(!cells.length) return null;

  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  cells.forEach(c=>{
    if(c.x<minX) minX=c.x;
    if(c.y<minY) minY=c.y;
    if(c.x>maxX) maxX=c.x;
    if(c.y>maxY) maxY=c.y;
  });

  return {minX,minY,maxX,maxY};
}

function forLockedRoomRect(room, fn){
  const b = lockedRoomBounds(room);
  if(!b) return;
  for(let y=b.minY; y<=b.maxY; y++){
    for(let x=b.minX; x<=b.maxX; x++){
      fn(x,y,b);
    }
  }
}

function pointInLockedRoomRect(room,x,y){
  const b = lockedRoomBounds(room);
  return !!(b && x>=b.minX && x<=b.maxX && y>=b.minY && y<=b.maxY);
}

function lockedRoomAtRect(x,y, includeOpened=true){
  if(!S || !Array.isArray(S.lockedRooms)) return null;
  return S.lockedRooms.find(r=>r && (includeOpened || !r.opened) && pointInLockedRoomRect(r,x,y)) || null;
}

function lockedRoomBoundaryCell(room,x,y){
  const b = lockedRoomBounds(room);
  if(!b) return false;
  return x===b.minX || x===b.maxX || y===b.minY || y===b.maxY;
}

function lockedRoomDoorInnerCell(room){
  if(!room || !room.door) return null;
  const b = lockedRoomBounds(room);
  if(!b) return null;

  const d = room.door;

  if(d.x < b.minX) return {x:b.minX, y:clamp(d.y,b.minY,b.maxY)};
  if(d.x > b.maxX) return {x:b.maxX, y:clamp(d.y,b.minY,b.maxY)};
  if(d.y < b.minY) return {x:clamp(d.x,b.minX,b.maxX), y:b.minY};
  if(d.y > b.maxY) return {x:clamp(d.x,b.minX,b.maxX), y:b.maxY};

  return lockedRoomCells(room).find(c=>Math.abs(c.x-d.x)+Math.abs(c.y-d.y)===1) || null;
}

function lockedRoomDoorInnerAt(room,x,y){
  const c = lockedRoomDoorInnerCell(room);
  return !!(c && c.x===x && c.y===y);
}

function lockedRoomOpenCell(room,x,y){
  if(!room || !room.opened) return false;
  if(lockedRoomDoorInnerAt(room,x,y)) return true;
  return !lockedRoomBoundaryCell(room,x,y);
}

function lockedRoomCellAt(x,y){
  if(!S || !Array.isArray(S.lockedRooms)) return null;
  return S.lockedRooms.find(r=>r && !r.opened && pointInLockedRoomRect(r,x,y)) || null;
}

function normalizeLockedRoomsSolid(){
  if(!S || !Array.isArray(S.lockedRooms) || !Array.isArray(S.map)) return;

  S.lockedRooms.forEach(room=>{
    if(!room || !lockedRoomBounds(room)) return;

    if(!room.opened){
      forLockedRoomRect(room,(x,y)=>{
        if(!inMap(x,y)) return;

        // 닫힌 문방: 외곽은 벽, 내부는 검은 장막 아래 바닥 데이터.
        // 실제 이동은 passable/blocked에서 닫힌 방 전체를 막는다.
        S.map[y][x] = lockedRoomBoundaryCell(room,x,y) ? '#' : '.';
        if(S.seen && S.seen[y]) S.seen[y][x] = false;
      });

      if(room.door && inMap(room.door.x,room.door.y)){
        S.map[room.door.y][room.door.x] = 'D';
      }
      return;
    }

    forLockedRoomRect(room,(x,y)=>{
      if(!inMap(x,y)) return;
      const open = lockedRoomOpenCell(room,x,y);
      S.map[y][x] = open ? '.' : '#';
      if(S.seen && S.seen[y]) S.seen[y][x] = true;
    });

    if(room.door && inMap(room.door.x,room.door.y)){
      S.map[room.door.y][room.door.x] = '.';
      if(S.seen && S.seen[room.door.y]) S.seen[room.door.y][room.door.x] = true;
    }
  });
}

function hideLockedRoomSeenCells(){
  if(!S || !S.seen || !Array.isArray(S.lockedRooms)) return;
  S.lockedRooms.forEach(room=>{
    if(!room || room.opened) return;
    forLockedRoomRect(room,(x,y)=>{
      if(inMap(x,y) && S.seen[y]) S.seen[y][x]=false;
    });
  });
}

function revealLockedRoom(room){
  if(!S || !room) return;

  room.opened = true;

  forLockedRoomRect(room,(x,y)=>{
    if(!inMap(x,y)) return;
    const open = lockedRoomOpenCell(room,x,y);
    S.map[y][x] = open ? '.' : '#';
    if(S.seen && S.seen[y]) S.seen[y][x] = true;
  });

  if(room.door && inMap(room.door.x, room.door.y)){
    S.map[room.door.y][room.door.x]='.';
    if(S.seen && S.seen[room.door.y]) S.seen[room.door.y][room.door.x]=true;
  }
}

function adjacentLockedDoor(){
  if(!S || !S.player) return null;
  const p=S.player;
  for(const [dx,dy] of DIRS){

}

const passableBeforeLockedDoor = passable;
passable = function(x,y){
  if(lockedDoorAt(x,y,false)) return false;

  const room = lockedRoomAtRect(x,y,true);
  if(room){
    if(!room.opened) return false;
    if(!lockedRoomOpenCell(room,x,y)) return false;
  }

  return passableBeforeLockedDoor(x,y);
};

const blockedBeforeLockedDoor = blocked;
blocked = function(x,y){
  if(lockedDoorAt(x,y,false)) return true;

  const room = lockedRoomAtRect(x,y,true);
  if(room){
    if(!room.opened) return true;
    if(!lockedRoomOpenCell(room,x,y)) return true;
  }

  return blockedBeforeLockedDoor(x,y);
};

const clearLineBeforeLockedDoor = clearLine;
clearLine = function(x1,y1,x2,y2){
  if(x1!==x2 && y1!==y2) return false;

  const dx=Math.sign(x2-x1), dy=Math.sign(y2-y1);
  let x=x1+dx, y=y1+dy;

  while(x!==x2 || y!==y2){
    if(S.map[y][x]==='#' || lockedDoorAt(x,y,false) || lockedRoomCellAt(x,y)) return false;
    x+=dx; y+=dy;
  }

  return true;
};

const revealBeforeLockedRooms = reveal;
reveal = function(){
  revealBeforeLockedRooms();
  normalizeLockedRoomsSolid();
  hideLockedRoomSeenCells();
};

function canPlaceLockedRoomRect(rx,ry,w,h){
  if(rx<2 || ry<2 || rx+w>=MAPW-2 || ry+h>=MAPH-2) return false;

  for(let y=ry;y<ry+h;y++){
    for(let x=rx;x<rx+w;x++){
      if(!inMap(x,y) || S.map[y][x] !== '#') return false;
      if(Array.isArray(S.lockedRooms) && S.lockedRooms.some(r=>!r.opened && pointInLockedRoomRect(r,x,y))) return false;
    }
  }

  return true;
}

function lockedRoomRectForDoor(door, dir){
  const w=4+rand(3), h=4+rand(3);
  let rx=0, ry=0;

  if(dir.dx===1){
    rx=door.x+1;
    ry=door.y-rand(h);
  }else if(dir.dx===-1){
    rx=door.x-w;
    ry=door.y-rand(h);
  }else if(dir.dy===1){
    rx=door.x-rand(w);
    ry=door.y+1;
  }else{
    rx=door.x-rand(w);
    ry=door.y-h;
  }

  return {rx,ry,w,h};
}

function findLockedRoomCandidate(){
  const dirs=[{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
  const candidates=[];

  for(let y=2;y<MAPH-2;y++){
    for(let x=2;x<MAPW-2;x++){
      if(S.map[y][x] !== '.') continue;
      if(S.exit && S.exit.x===x && S.exit.y===y) continue;

      dirs.forEach(d=>{
        const door={x:x+d.dx,y:y+d.dy};
        if(!inMap(door.x,door.y) || S.map[door.y][door.x] !== '#') return;

        for(let tries=0;tries<3;tries++){
          const rect=lockedRoomRectForDoor(door,d);
          if(canPlaceLockedRoomRect(rect.rx,rect.ry,rect.w,rect.h)) candidates.push({door,dir:d,rect});
        }
      });
    }
  }

  return candidates.length ? one(candidates) : null;
}

function lockedRoomSafeRewardCells(room){
  const cells=[];
  forLockedRoomRect(room,(x,y)=>{
    if(!lockedRoomBoundaryCell(room,x,y) || lockedRoomDoorInnerAt(room,x,y)) cells.push({x,y});
  });
  return cells.length ? cells : lockedRoomCells(room);
}

function placeLockedRoomItem(room, type, data={}){
  const cells=lockedRoomSafeRewardCells(room).slice();

  for(let tries=0;tries<80 && cells.length;tries++){
    const c=one(cells);
    if(S.items.some(i=>i.x===c.x&&i.y===c.y) || S.enemies.some(e=>e.hp>0&&e.x===c.x&&e.y===c.y)) continue;
    S.items.push(Object.assign({x:c.x,y:c.y,type}, data));
    return true;
  }

  return false;
}

function populateLockedRoom(room, floor){
  const rewardCells=lockedRoomSafeRewardCells(room);
  const typeRoll=rand(100);

  room.rewardType = typeRoll<42 ? 'monster' : (typeRoll<78 ? 'treasure' : 'event');

  if(room.rewardType==='monster'){
    const n=5+rand(6)+Math.floor(floor/4);
    for(let i=0;i<n;i++){
      const c=one(rewardCells);
      if(S.enemies.some(e=>e.hp>0&&e.x===c.x&&e.y===c.y)) continue;
      S.enemies.push(makeEnemy(c.x,c.y,floor,false));
    }
    if(chance(.45)) placeLockedRoomItem(room,'chest',{source:'elite'});
  }else if(room.rewardType==='treasure'){
    for(let i=0;i<5+rand(5);i++) placeLockedRoomItem(room,'gold',{amount:Math.floor((20+rand(40)+floor*5)*goldRate())});
    for(let i=0;i<2+rand(3);i++) placeLockedRoomItem(room,'chest',{source:chance(.35)?'elite':'normal'});
    if(chance(.05)) placeLockedRoomItem(room,'skillgem',{});
    if(chance(.22)) placeLockedRoomItem(room,'relic',{});
    if(chance(.28)) placeLockedRoomItem(room,'soul',{amount:1+Math.floor(floor/8)});
  }else{
    ['vault','oracle','camp','shrine','chest'].forEach(t=>{
      if(chance(.72)) placeLockedRoomItem(room,t,t==='chest'?{source:'elite'}:{});
    });
    if(chance(.06)) placeLockedRoomItem(room,'skillgem',{});
    for(let i=0;i<2+rand(4);i++){
      const c=one(rewardCells);
      if(!S.enemies.some(e=>e.hp>0&&e.x===c.x&&e.y===c.y)) S.enemies.push(makeEnemy(c.x,c.y,floor,false));
    }
  }
}

function installLockedRoomsForFloor(floor){
  if(!S || !Array.isArray(S.map)) return;

  S.lockedRooms = [];

  const count = chance(.72) ? (floor>=8 && chance(.45) ? 2 : 1) : 0;

  for(let i=0;i<count;i++){
    const cand=findLockedRoomCandidate();
    if(!cand) break;

    const {door,rect}=cand;
    const cells=[];

    for(let y=rect.ry;y<rect.ry+rect.h;y++){
      for(let x=rect.rx;x<rect.rx+rect.w;x++){
        S.map[y][x]='#';
        S.seen[y][x]=false;
        cells.push({x,y});
      }
    }

    S.map[door.y][door.x]='D';
    S.seen[door.y][door.x]=false;

    const room={id:'locked_'+floor+'_'+i+'_'+Date.now().toString(36), door, cells, opened:false};
    populateLockedRoom(room, floor);
    S.lockedRooms.push(room);
  }

  normalizeLockedRoomsSolid();
  reveal();
}

function drawLockedDoorSprite(px,py){
  const img = LOCKED_DOOR_IMAGE;

  if(img && img.complete && img.naturalWidth){
    ctx.save();
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(img,px,py,TILE,TILE);
    ctx.restore();
    return;
  }

  ctx.save();
  ctx.fillStyle='#111827';
  ctx.fillRect(px,py,TILE,TILE);
  ctx.fillStyle='#1f2937';
  ctx.fillRect(px+2,py+2,TILE-4,TILE-4);
  ctx.restore();
}


function drawLockedRoomInteriorShroud(px,py){
  ctx.save();

  // 내부 시야 차단용 검은 장막. 벽 경계에는 이 함수를 호출하지 않는다.
  ctx.fillStyle='rgba(0,0,0,.96)';
  ctx.fillRect(px,py,TILE,TILE);

  ctx.fillStyle='rgba(2,6,23,.90)';
  ctx.fillRect(px+1,py+1,TILE-2,TILE-2);

  ctx.fillStyle='rgba(15,23,42,.30)';
  ctx.beginPath();
  ctx.arc(px+TILE*.34,py+TILE*.32,TILE*.22,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle='rgba(0,0,0,.35)';
  ctx.beginPath();
  ctx.arc(px+TILE*.72,py+TILE*.72,TILE*.25,0,Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function drawLockedDoorAndShroudOverlay(){
  if(!S || !S.player || !Array.isArray(S.lockedRooms)) return;

  normalizeLockedRoomsSolid();

  const p=S.player;
  const ox=p.x-Math.floor(VIEW/2), oy=p.y-Math.floor(VIEW/2);

  for(const room of S.lockedRooms){
    if(!room || room.opened) continue;

    forLockedRoomRect(room,(x,y)=>{
      if(!inView(x,y,ox,oy)) return;
      const px=(x-ox)*TILE, py=(y-oy)*TILE;

      if(lockedRoomBoundaryCell(room,x,y)){
        drawTile(px,py,'wall');
      }else{
        // 검은 장막은 내부 칸에만 그린다. 벽타일 위에는 덮지 않는다.
        drawTile(px,py,'floor');
        drawLockedRoomInteriorShroud(px,py);
      }
    });

    const d=room.door;
    if(d && inView(d.x,d.y,ox,oy)){
      const px=(d.x-ox)*TILE, py=(d.y-oy)*TILE;
      drawTile(px,py,'wall');
      drawLockedDoorSprite(px,py);
    }
  }
}

const mapCellClassBeforeLockedRooms = mapCellClass;
mapCellClass = function(x,y){
  const room = lockedRoomAtRect(x,y,true);

  if(room){
    if(!room.opened) return 'wall';
    if(!lockedRoomOpenCell(room,x,y)) return 'wall';
  }

  if(lockedDoorAt(x,y,false)) return 'wall';

  return mapCellClassBeforeLockedRooms(x,y);
};

  while(q.length < 3) q.push(['smash','dash','heal'][q.length] || 'smash');
  S.player.skillQuickSlots = q.map(k=>['smash','dash','heal','openDoor'].includes(k) ? k : 'smash');

function skillSmallTextByKey(k){

  return map[k] || '스킬';
}
function skillFunctionByKey(k){
  if(k === 'openDoor') return useOpenDoorSkill;
  if(k === 'smash') return skillSmash;
  if(k === 'dash') return skillDash;
  if(k === 'heal') return skillHeal;

function skillCooldownByKey(k){
  if(!S || !S.player) return 0;
  if(k === 'openDoor') return 0;
  if(k==='smash'||k==='dash'||k==='heal') return skillCooldownLeft(k);
  return Math.max(0, Number(S.player.cd && S.player.cd[k] || 0));

function quickSlotSkillKey(slotIndex){

}
function quickSlotUsesClassCooldown(key){

function canUseQuickSlotSkillKey(key){

function executeQuickSlotSkillKey(key){

(function(){
  function safeOpenDoorRangeCells(){
    if(!window.S || !S.player || !Array.isArray(window.DIRS)) return [];
    const p = S.player;
    return DIRS.map(([dx,dy])=>({x:p.x+dx,y:p.y+dy})).filter(c=>typeof inMap === 'function' && inMap(c.x,c.y));
  }

  if(typeof window.setSkillRangePreview === 'function' && typeof window.render === 'function'){
    const oldSetSkillRangePreview = window.setSkillRangePreview;
    window.setSkillRangePreview = function(key, dur=1100){
      if(key === 'openDoor'){
        window.skillRangePreview = {key:'openDoor', until:nowMs()+dur};
        render();
        return;
      }
      return oldSetSkillRangePreview(key, dur);
    };
  }

  if(typeof window.renderSkillRangePreview === 'function'){
    const oldRenderSkillRangePreview = window.renderSkillRangePreview;
    window.renderSkillRangePreview = function(ox, oy){
      if(window.skillRangePreview && window.skillRangePreview.key === 'openDoor'){
        if(nowMs() > window.skillRangePreview.until){
          window.skillRangePreview = null;
          return;
        }
        safeOpenDoorRangeCells().forEach(c=>{
          if(typeof inView !== 'function' || !inView(c.x,c.y,ox,oy)) return;
          const px=(c.x-ox)*TILE, py=(c.y-oy)*TILE;
          ctx.save();
          ctx.globalAlpha=.58;
          ctx.fillStyle='rgba(250,204,21,.30)';
          ctx.fillRect(px+3,py+3,TILE-6,TILE-6);
          ctx.strokeStyle='rgba(250,204,21,.95)';
          ctx.lineWidth=2;
          ctx.strokeRect(px+4,py+4,TILE-8,TILE-8);
          ctx.restore();
        });
        return;
      }
      return oldRenderSkillRangePreview(ox, oy);
    };
  }

  if(typeof window.useOpenDoorSkill === 'function'){
    const oldUseOpenDoorSkill = window.useOpenDoorSkill;
    window.useOpenDoorSkill = function(){
      if(!window.S || !S.player) return oldUseOpenDoorSkill();
      const room = typeof adjacentLockedDoor === 'function' ? adjacentLockedDoor() : null;
      if(!room || !room.door){
        toast('사거리 1칸 안에 잠긴 문이 없습니다.');
        return;
      }
      const d = Math.abs(S.player.x - room.door.x) + Math.abs(S.player.y - room.door.y);
      if(d !== 1){
        toast('열쇠 사용 사거리는 1칸입니다.');
        return;
      }
      return oldUseOpenDoorSkill();
    };
  }
})();

(function(){
  function rankingRefreshModeKey(){
    return cloudProviderModeKey(activeLoginMode || (S && S.loginMode) || 'kakao');
  }

  const legacyPublicRankIdForRankingRefreshFix = publicRankIdFor;
  publicRankIdFor = function(userId, slotIndex, mode){
    const provider = cloudProviderModeKey(mode || activeLoginMode || (S && S.loginMode) || 'kakao');
    return `${userId}_${provider}_${slotIndex}`;
  };
  function legacyPublicRankId(userId, slotIndex){
    return legacyPublicRankIdForRankingRefreshFix(userId, slotIndex);
  }
  async function deletePublicRankById(client, rankId){
    try{
      await client.from(PUBLIC_RANKING_TABLE).delete().eq('rank_id', rankId);
    }catch(e){
      console.warn('public ranking delete skipped:', e && e.message ? e.message : e);
    }
  }

  syncPublicRankingRowsForCurrentUser = async function(){
    if(!isCloudLoginMode(activeLoginMode)) return false;
    const client = getCloudClient();
    const user = await currentCloudUser();
    if(!client || !user) return false;

    const mode = rankingRefreshModeKey();
    const slots = normalizeCharacterSlots(getSlotsForMode(mode), 3);
    const rows = [];
    slots.forEach((ch, i)=>{
      const rec = buildRankRecordFromCharacter(ch, meta);
      if(!rec) return;
      rows.push({
        rank_id:publicRankIdFor(user.id, i, mode),
        user_id:user.id,
        slot_index:i,
        nickname:String(rec.nickname || '이름 없음'),
        class_name:String(rec.className || '-'),
        level:Number(rec.level || 1),
        floor:Number(rec.floor || 1),
        combat_power:Number(rec.combatPower || 0),
        score:Number(rec.score || 0),
        updated_at:new Date().toISOString()
      });
    });

    try{
      if(rows.length){
        const {error} = await client.from(PUBLIC_RANKING_TABLE).upsert(rows, {onConflict:'rank_id'});
        if(error) throw error;
      }
      for(let i=0;i<3;i++){
        // 예전 user_slot 형식으로 남아 있던 자기 랭킹은 중복/구버전 노출 방지를 위해 정리한다.
        await deletePublicRankById(client, legacyPublicRankId(user.id, i));
        if(!rows.some(r=>r.slot_index === i)){
          await deletePublicRankById(client, publicRankIdFor(user.id, i, mode));
        }
      }
      return true;
    }catch(e){
      console.warn('public ranking sync skipped:', e && e.message ? e.message : e);
      return false;
    }
  };

  const saveCloudCharacterProfileBeforeRankingRefreshFix = saveCloudCharacterProfile;
  saveCloudCharacterProfile = async function(){
    const result = await saveCloudCharacterProfileBeforeRankingRefreshFix.apply(this, arguments);
    await syncPublicRankingRowsForCurrentUser();
    return result;
  };

  collectRankingRecords = async function(){
    const records = [];
    let usedPublicTable = false;

    if(isCloudLoginMode(activeLoginMode)){
      const client = getCloudClient();
      const user = await currentCloudUser();
      if(client && user){
        await syncPublicRankingRowsForCurrentUser();
        try{
          const {data,error} = await client
            .from(PUBLIC_RANKING_TABLE)
            .select('rank_id,user_id,slot_index,nickname,class_name,level,floor,combat_power,score,updated_at')
            .order('score', {ascending:false})
            .limit(1000);
          if(error) throw error;
          if(Array.isArray(data)){
            usedPublicTable = true;
            data.forEach(row=>{
              const rec = rankRecordFromPublicRow(row);
              if(rec) records.push(rec);
            });
          }
        }catch(e){
          console.warn('public ranking table unavailable, fallback to game_saves:', e && e.message ? e.message : e);
        }
      }

      // public 테이블이 존재해도 stale row만 있는 경우가 있어서 game_saves/local 기록도 항상 병합한다.
      try{
        const fallback = await previousCollectRankingRecordsForPublicRank();
        if(Array.isArray(fallback)) fallback.forEach(r=>{ if(r) records.push(r); });
      }catch(e){
        console.warn('ranking fallback merge skipped:', e && e.message ? e.message : e);
      }
      normalizeCharacterSlots(getSlotsForMode(activeLoginMode), 3).forEach(ch=>{
        const rec = buildRankRecordFromCharacter(ch, meta);
        if(rec) records.push(rec);
      });
    }

    const dedup = new Map();
    records.forEach(r=>{
      const rec = normalizeStoredRankRecord(r);
      if(!rec) return;
      const key = `${rec.nickname}|${rec.className}`;
      const prev = dedup.get(key);
      if(!prev || compareRankRecords(rec, prev) > 0) dedup.set(key, rec);
    });
    const result = Array.from(dedup.values())
      .sort((a,b)=>(b.floor-a.floor)||(b.level-a.level)||(b.combatPower-a.combatPower)||(b.score-a.score))
      .slice(0,50);
    result._usedPublicTable = usedPublicTable;
    return result;
  };

  function bindRankingRefreshButton(){
    const table = document.querySelector('#modalCard .rankingTable');
    if(!table || $('rankingRefreshBtn')) return;
    const bar = document.createElement('div');

    bar.style.margin = '8px 0 4px';

    const note = modalCard.querySelector('p.muted');
